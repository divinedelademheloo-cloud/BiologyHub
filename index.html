        function viewPDF(id) {
            const pdfs = getPDFs();
            const pdf = pdfs.find(p => p.id === id);
            if (!pdf) { showToast('PDF not found', 'error'); return; }
            openModal(`
                <h3 class="text-xl font-bold mb-2">📄 ${pdf.title}</h3>
                <p class="text-sm text-slate-500 font-medium">${pdf.topic || 'General'} ${pdf.year ? '• ' + pdf.year : ''}</p>
                ${pdf.description ? `<p class="text-sm mt-1 text-slate-500 font-medium">${pdf.description}</p>` : ''}
                <div class="mt-4 pdf-viewer-container" id="pdfViewerContainer"><div id="pdfViewerLoading" class="text-center py-8 text-white font-medium">⏳ Loading PDF...</div><div id="pdfViewerContent"></div></div>
                <div class="mt-3 flex gap-2"><button onclick="downloadPDF('${pdf.id}')" class="btn-primary text-sm py-1.5 px-4">⬇️ Download</button><button onclick="closeModal()" class="btn-secondary text-sm py-1.5 px-4">Close</button></div>
            `);
            renderPDFInModal(pdf.data);
        }

        function renderPDFInModal(base64Data) {
            const container = document.getElementById('pdfViewerContent');
            const loading = document.getElementById('pdfViewerLoading');
            if (!container) return;
            try {
                const binaryString = atob(base64Data.split(',')[1]);
                const len = binaryString.length;
                const bytes = new Uint8Array(len);
                for (let i = 0; i < len; i++) { bytes[i] = binaryString.charCodeAt(i); }
                pdfjsLib.getDocument({ data: bytes }).promise.then(function(pdf) {
                    if (loading) loading.style.display = 'none';
                    const numPages = pdf.numPages;
                    let rendered = 0;
                    for (let i = 1; i <= Math.min(numPages, 10); i++) {
                        pdf.getPage(i).then(function(page) {
                            const scale = 1.0;
                            const viewport = page.getViewport({ scale: scale });
                            const canvas = document.createElement('canvas');
                            const context = canvas.getContext('2d');
                            canvas.height = viewport.height;
                            canvas.width = viewport.width;
                            canvas.style.maxWidth = '100%';
                            canvas.style.height = 'auto';
                            container.appendChild(canvas);
                            page.render({ canvasContext: context, viewport: viewport }).promise.then(
                            function() {
                                rendered++;
                                if (rendered === Math.min(numPages, 10) && numPages > 10) {
                                    const more = document.createElement('p');
                                    more.className = 'text-center text-white py-4 font-medium';
                                    more.textContent = `+ ${numPages - 10} more pages`;
                                    container.appendChild(more);
                                }
                            });
                        });
                    }
                }).catch(function(err) {
                    if (loading) { loading.textContent = '❌ Failed to load PDF: ' + err.message;
                        loading.className = 'text-center py-8 text-red-400 font-medium'; }
                });
            } catch (err) {
                if (loading) { loading.textContent = '❌ Error: ' + err.message;
                    loading.className = 'text-center py-8 text-red-400 font-medium'; }
            }
        }

        function downloadPDF(id) {
            const pdfs = getPDFs();
            const pdf = pdfs.find(p => p.id === id);
            if (!pdf) { showToast('PDF not found', 'error'); return; }
            const link = document.createElement('a');
            link.href = pdf.data;
            link.download = pdf.fileName || `${pdf.title}.pdf`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            showToast(`⬇️ Downloading "${pdf.title}"`, 'success');
        }

        function deletePDFFile(id) { if (!confirm('Delete this PDF?')) return;

        function applyNoteTemplate(id) {
            const tpl = NOTE_TEMPLATES.find(t => t.id === id);
            if (!tpl || !quillEditor) return;
            const title = document.getElementById('noteTitleRich').value || 'Untitled';
            const topic = document.getElementById('noteTopicRich').value || 'Topic';
            let content = `<h2>${tpl.structure.title.replace('{topic}', topic).replace('{experiment}', title)}</h2>`;
            tpl.structure.sections.forEach(s => { content += `<h3>${s}</h3><p><br></p>`; });
            quillEditor.root.innerHTML = content;
            showToast(`📋 Template "${tpl.name}" applied`, 'success');
        }

        function handleNoteSubmitRich() {
            const title = document.getElementById('noteTitleRich').value.trim();
            const topic = document.getElementById('noteTopicRich').value;
            const content = quillEditor ? quillEditor.root.innerHTML : '';
            if (!title) { showToast('Please enter a title', 'warning'); return; }
            if (!content || content === '<p><br></p>') { showToast('Please enter content', 'warning'); return; }
            const editId = document.getElementById('noteEditIdRich')?.textContent;
            if (editId) {
                updateNote(editId, { title, topic: topic || 'General', content, updatedAt: new Date().toISOString() });
                saveNoteVersion(editId, content, title);
                showToast('✅ Note updated!', 'success');
                document.getElementById('noteEditIdRich').textContent = '';
                document.querySelector('.card h3').textContent = '✏️ Create Biology Note';
                document.querySelector('.btn-pink').textContent = '💾 Save Note';
            } else {
                const note = { id: 'note_' + Date.now(), title, topic: topic || 'General', content, createdAt: new Date()

                saveNote(note);
                saveNoteVersion(note.id, content, title);
                showToast('✅ Note created!', 'success');
            }
            document.getElementById('noteTitleRich').value = '';
            document.getElementById('noteTopicRich').value = '';
            if (quillEditor) quillEditor.root.innerHTML = '';
            navigateTo('noteslibrary');
        }

            a.click();
            URL.revokeObjectURL(url);
            showToast('📊 CSV exported!', 'success');

        // ---------- Student Dashboard ----------
        async function renderStudentDashboard() {
            const student = currentStudent;
            if (!student) return '<p class="text-center py-8 text-slate-400 font-medium">Please log in again.</p>';

            const results = getResults().filter(r => r.studentId === student.id);
            const allQuizzes = getQuizzes();
            const completedIds = new Set(results.map(r => r.quizId));
            const now = new Date();

            const activeQuizzes = allQuizzes.filter(q => {
                if (completedIds.has(q.id)) return false;
                if (q.deadline && new Date(q.deadline) < now) return false;
                if (q.isScheduled && q.scheduledRelease && new Date(q.scheduledRelease) > now) return false;
                if (!q.questions || !q.questions.length) return false;
                return true;
            });

            const scored = results.filter(r => r.percentage !== undefined);
            const avg = scored.length ? Math.round(scored.reduce((a, b) => a + b.percentage, 0) / scored.length) : 0;
            const best = scored.length ? Math.max(...scored.map(r => r.percentage)) : 0;
            const streak = getStudyStreak(student.id);
            const achievements = getAchievements(student.id);

            const stats = [
                { label: 'Quizzes Taken', value: scored.length, icon: '📝', color: 'from-pink-500 to-rose-600' },
                { label: 'Average Score', value: scored.length ? avg + '%' : '—', icon: '🎯',
                    color: 'from-emerald-500 to-teal-600' },
                { label: 'Best Score', value: scored.length ? best + '%' : '—', icon: '🏆',
                    color: 'from-amber-500 to-orange-600' },
                { label: 'Day Streak', value: streak + ' 🔥', icon: '🔥', color: 'from-orange-500 to-red-600' },
                { label: 'Active Quizzes', value: activeQuizzes.length, icon: '🟢',
                    color: 'from-blue-500 to-indigo-600' },
                { label: 'Achievements', value: achievements.length, icon: '🏅', color: 'from-purple-500 to-pink-600' },
            ];

            const recentResults = scored.slice(0, 5);

            return `
                <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-3 mb-6">
                    ${stats.map(s => `
                        <div class="stat-card text-center">
                            <div class="w-10 h-10 mx-auto rounded-xl bg-gradient-to-br ${s.color} flex items-center justify-center text-xl text-white shadow-lg">${s.icon}</div>
                            <p class="text-2xl font-extrabold mt-2">${s.value}</p>
                            <p class="text-xs font-semibold text-slate-500">${s.label}</p>
                        </div>
                    `).join('')}
                </div>

                <div class="grid gap-6 lg:grid-cols-2 mb-6">
                    ${renderStudentActiveQuizzes(activeQuizzes)}
                    ${renderStudentAchievements(achievements)}

                <div class="grid gap-6 lg:grid-cols-2 mb-6">
                    ${renderStudentRecentResults(recentResults)}

                        <h3 class="text-lg font-bold mb-4">📈 Performance Trend</h3>
                        <canvas id="studentTrendChart" height="200"></canvas>
                    </div>
                </div>

                <div class="card">
                    <h3 class="text-lg font-bold mb-4">📡 Topic Mastery</h3>
                    <canvas id="studentTopicChart" height="180"></canvas>
                </div>

        function initStudentDashboard() {
            const student = currentStudent;
            if (!student) return;

            const results = getResults().filter(r => r.studentId === student.id);
            const sorted = [...results].sort((a, b) => new Date(a.submittedAt) - new Date(b.submittedAt));

            const trendCanvas = document.getElementById('studentTrendChart');
            if (trendCanvas && sorted.length) {
                const labels = sorted.map(r => r.quizTitle || 'Quiz');
                const data = sorted.map(r => r.percentage);
                new Chart(trendCanvas, {
                    type: 'line',
                    data: {
                        labels: labels.length ? labels : ['No Data'],
                        datasets: [{
                            label: 'Score %',
                            data: data.length ? data : [0],
                            borderColor: '#ec4899',
                            backgroundColor: 'rgba(236,72,153,0.1)',
                            fill: true,
                            tension: 0.4,
                            pointRadius: 5,
                            pointBackgroundColor: '#ec4899'
                        }]
                    },
                    options: {
                        plugins: { legend: { display: false } },
                        scales: { y: { beginAtZero: true, max: 100 } }
                    }
                });
            } else if (trendCanvas) {
                new Chart(trendCanvas, {
                    type: 'line',
                    data: { labels: ['No Data'], datasets: [{ label: 'Score %', data: [0], borderColor: '#94a3b8',
                            pointRadius: 0 }] },
                    options: { plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true,
                                max: 100 } } }
                });
            }

            const topicCanvas = document.getElementById('studentTopicChart');
            if (topicCanvas) {
                const topicData = {};
                results.forEach(r => {
                    const breakdown = r.topicBreakdown || {};
                    for (const [t, score] of Object.entries(breakdown)) {
                        if (!topicData[t]) topicData[t] = [];
                        topicData[t].push(score);
                    }
                });
                const labels = Object.keys(topicData);
                const values = labels.map(t => Math.round(topicData[t].reduce((a, b) => a + b, 0) / topicData[t]
                .length));
                const colors = ['#ec4899', '#14b8a6', '#8b5cf6', '#f59e0b', '#3b82f6', '#ef4444', '#22c55e', '#f97316'];

                if (labels.length) {
                    new Chart(topicCanvas, {
                        type: 'bar',
                        data: {
                            labels: labels,
                            datasets: [{
                                label: 'Mastery %',
                                data: values,
                                backgroundColor: labels.map((_, i) => colors[i % colors.length]),
                                borderRadius: 8
                            }]
                        },
                        options: {
                            plugins: { legend: { display: false } },
                            scales: { y: { beginAtZero: true, max: 100 } }
                        }
                    });
                } else {
                    new Chart(topicCanvas, {
                        type: 'bar',
                        data: { labels: ['No Data'], datasets: [{ label: 'Mastery %', data: [0],
                                backgroundColor: '#94a3b8' }] },
                        options: { plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true,
                                    max: 100 } } }
                    });
                }
            }
        }

        function openModal(html) {
            const overlay = document.createElement('div');
            overlay.className = 'fixed inset-0 z-[100] modal-overlay flex items-center justify-center p-4 fade-in';
            overlay.onclick = (e) => { if (e.target === overlay) closeModal(); };
            overlay.innerHTML =
                `<div class="modal-content relative p-6 lg:p-8"><button onclick="closeModal()" class="absolute top-4 right-4 text-2xl font-semibold" style="color:var(--text-secondary);">×</button>${html}</div>`;
            document.body.appendChild(overlay);
        }

        function closeModal() { const modal = document.querySelector('.fixed.inset-0.z-\\[100\\]'); if (modal) modal.remove(); }

        // ================================================================
        //  🔄 SIDEBAR TOGGLE
        // ================================================================

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('sidebarOverlay').classList.toggle('show');
        }

        function toggleStudentSidebar() {
            document.getElementById('studentSidebar').classList.toggle('open');
            document.getElementById('studentSidebarOverlay').classList.toggle('show');
        }

        // ================================================================
        //  🎓 STUDENT QUIZ ENGINE (unchanged)
        // ================================================================

        let quizState = { idx: 0, answers: {}, flags: [], timeLeft: 480, timer: null, started: false, quiz: null };

        function renderStudentQuizQuestion() {
            const q = quizState.quiz.questions[quizState.idx];
            const progress = ((quizState.idx + 1) / quizState.quiz.questions.length) * 100;
            const container = document.getElementById('quizContainer');
            const mm = String(Math.floor(quizState.timeLeft / 60)).padStart(2, '0');
            const ss = String(quizState.timeLeft % 60).padStart(2, '0');
            const isFlagged = quizState.flags.includes(quizState.idx);

            container.innerHTML = `
                <div class="rounded-3xl shadow-2xl p-6 md:p-8 fade-in" style="background:var(--bg-card);color:var(--text-primary);border:1px solid var(--border-color);">
                    <div class="flex justify-between items-center mb-6">
                        <span class="text-sm font-bold uppercase tracking-wide text-slate-500">Question ${quizState.idx + 1} of ${quizState.quiz.questions.length}</span>
                        <div class="flex items-center gap-3">
                            ${isFlagged ? '<span class="flag-badge">🚩 Flagged</span>' : ''}
                            <button onclick="toggleStudentFlag()" class="px-2 py-1 text-sm rounded-lg font-semibold" style="background:${isFlagged ? '#f59e0b' : 'var(--bg-slate-100)'};color:${isFlagged ? '#fff' : 'var(--text-secondary)'};">🚩</button>
                            <div class="flex items-center gap-2 px-4 py-2 rounded-full" style="background:var(--bg-slate-100);">
                                <span class="text-xl">⏱️</span>
                                <span id="studentTimerDisplay" class="font-mono text-lg font-bold ${quizState.timeLeft < 60 ? 'text-red-600 timer-warning' : ''}" style="color:var(--text-primary);">${mm}:${ss}</span>
                            </div>
                        </div>
                    </div>
                    <div class="w-full rounded-full h-2 mb-8" style="background:var(--bg-slate-100);"><div class="bg-teal-500 h-2 rounded-full transition-all duration-500" style="width: ${progress}%"></div></div>
                    <h2 class="text-xl md:text-2xl font-bold mb-8 leading-relaxed">${q.questionText}</h2>
                    <div class="space-y-3 mb-8">
                        ${q.options.map(o => `
                            <button onclick="selectStudentAnswer('${o.label}')" class="quiz-option w-full text-left p-4 md:p-5 rounded-xl flex items-center gap-4 ${quizState.answers[quizState.idx] === o.label ? 'selected' : ''}">
                                <span class="w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm ${quizState.answers[quizState.idx] === o.label ? 'bg-teal-500 text-white' : 'bg-slate-200 text-slate-600'}" style="background:${quizState.answers[quizState.idx] === o.label ? '#14b8a6' : 'var(--bg-slate-100)'};">${o.label}</span>
                                <span class="font-medium">${o.text}</span>
                            </button>
                        `).join('')}
                    </div>
                    <div class="flex justify-between pt-4 border-t" style="border-color:var(--border-color);">
                        <button onclick="prevStudentQuestion()" ${quizState.idx === 0 ? 'disabled' : ''} class="px-6 py-3 rounded-xl font-semibold disabled:opacity-30 disabled:cursor-not-allowed transition" style="color:var(--text-secondary);background:var(--bg-slate-100);">⬅ Previous</button>
                        ${quizState.idx === quizState.quiz.questions.length - 1 ? 
                            `<button onclick="submitStudentQuiz(false)" class="px-8 py-3 bg-teal-600 text-white rounded-xl font-bold shadow-lg hover:bg-teal-700 hover:shadow-xl transition transform hover:scale-105">Submit</button>` :
                            `<button onclick="nextStudentQuestion()" class="px-8 py-3 bg-teal-600 text-white rounded-xl font-bold shadow-lg hover:bg-teal-700 hover:shadow-xl transition transform hover:scale-105">Next ➡</button>`
                        }
                    </div>
                </div>
            `;
        }

        function selectStudentAnswer(label) { if (!quizState.started) quizState.started = true;
            quizState.answers[quizState.idx] = label;
            renderStudentQuizQuestion(); }

        function toggleStudentFlag() { const idx = quizState.idx; const pos = quizState.flags.indexOf(idx); if (pos > -1)
                quizState.flags.splice(pos, 1);
            else quizState.flags.push(idx);
            renderStudentQuizQuestion();
            showToast(pos > -1 ? '🚩 Flag removed' : '🚩 Flagged for review', 'info'); }

        function nextStudentQuestion() { if (quizState.idx < quizState.quiz.questions.length - 1) { quizState.idx++;
                renderStudentQuizQuestion(); } }

        function prevStudentQuestion() { if (quizState.idx > 0) { quizState.idx--;
                renderStudentQuizQuestion(); } }

        function updateStudentTimerDisplay() { const el = document.getElementById('studentTimerDisplay'); if (!el) return;
            const mm = String(Math.floor(quizState.timeLeft / 60)).padStart(2, '0');
            const ss = String(quizState.timeLeft % 60).padStart(2, '0');
            el.textContent = `${mm}:${ss}`; if (quizState.timeLeft < 60) { el.classList.add('text-red-600',
                'timer-warning'); } }

        function submitStudentQuiz(auto = false) {
            clearInterval(quizState.timer);
            const qs = quizState.quiz.questions;
            let score = 0;
            const topicScores = {},
                topicTotals = {};
            qs.forEach((q, i) => {
                const isCorrect = quizState.answers[i] === q.correctAnswer;
                if (isCorrect) score++;
                const t = q.topic || 'General';
                topicScores[t] = (topicScores[t] || 0) + (isCorrect ? 1 : 0);
                topicTotals[t] = (topicTotals[t] || 0) + 1;
            });
            const total = qs.length,
                percentage = Math.round((score / total) * 100),
                gradeInfo = getGrade(percentage);
            const topicBreakdown = {};
            for (const t in topicTotals) { topicBreakdown[t] = Math.round((topicScores[t] / topicTotals[t]) * 100); }
            const student = currentStudent || { id: 'guest', name: 'Guest' };
            const result = {
                id: 'r_' + Date.now(),
                studentId: student.id || 'guest_student',
                studentName: student.name || 'Guest Student',
                quizId: quizState.quiz.id || 'demo',
                quizTitle: quizState.quiz.title || 'Demo Quiz',
                quizTopic: quizState.quiz.topic || 'Mixed',
                score,
                total,
                percentage,
                grade: gradeInfo.grade,
                band: gradeInfo.band,
                timeUsed: ((quizState.quiz.duration || 8) * 60) - quizState.timeLeft,
                submittedAt: new Date().toISOString(),
                topicBreakdown: topicBreakdown,
                flagged: quizState.flags.length,
                answers: quizState.answers
            };
            const results = getResults();
            results.push(result);
            localStorage.setItem('bio_results', JSON.stringify(results));

            addNotification(`Student ${student.name} scored ${percentage}% on "${quizState.quiz.title || 'Quiz'}"`,
                'success', null, 'admin');

            const container = document.getElementById('quizContainer');
            const color = gradeInfo.color,
                icon = gradeInfo.icon;
            let topicHTML = '';
            const topics = Object.keys(topicBreakdown);
            if (topics.length) {
                topicHTML =
                    `<div class="mt-4 p-4 rounded-xl" style="background:var(--bg-slate-100);"><p class="text-sm font-semibold mb-2">📊 Topic Breakdown</p><div class="grid grid-cols-2 gap-2">${topics.map(t => `<div class="flex justify-between items-center p-2 rounded-lg" style="background:var(--bg-card);"><span class="text-xs text-slate-500 font-medium">${t}</span><span class="text-xs font-bold ${topicBreakdown[t] >= 70 ? 'text-emerald-600' : topicBreakdown[t] >= 50 ? 'text-amber-600' : 'text-rose-600'}">${topicBreakdown[t]}%</span></div>`).join('')}</div></div>`;
            }
            container.innerHTML = `
                <div class="rounded-3xl shadow-2xl p-8 md:p-12 text-center fade-in" style="background:var(--bg-card);border:2px solid ${gradeInfo.color === 'emerald' ? '#22c55e' : gradeInfo.color === 'blue' ? '#3b82f6' : gradeInfo.color === 'amber' ? '#f59e0b' : '#ef4444'};">
                    <div class="text-6xl mb-4">${icon}</div>
                    <h1 class="text-3xl md:text-4xl font-black mb-2">${gradeInfo.band}</h1>
                    <p class="text-7xl md:text-8xl font-black my-6">${percentage}%</p>
                    <p class="text-lg font-semibold text-slate-500">Score: ${score}/${total} • Grade: ${gradeInfo.grade}</p>
                    <p class="text-sm text-slate-500 font-medium">Time: ${Math.floor(result.timeUsed/60)}m ${result.timeUsed%60}s</p>
                    ${topicHTML}
                    ${auto ? '<p class="mt-4 text-sm font-bold text-red-600">⏰ Auto-submitted due to time expiration.</p>' : ''}
                    <button onclick="window.location.href='#/student'" class="mt-6 px-8 py-3 rounded-xl font-bold shadow-lg transition" style="background:var(--bg-slate-800);color:#fff;">🏠 Go to Dashboard</button>
                </div>
            `;
        }

        // ================================================================
        //  🚀 ROUTER
        // ================================================================

        function route() {
            const hash = location.hash;

            if (hash.startsWith('#/quiz/')) {
                const quizId = hash.slice(7);
                const quizzes = getQuizzes();
                const quiz = quizzes.find(q => q.id === quizId);
                if (!quiz) {
                    document.getElementById('authView').classList.add('hidden');
                    document.getElementById('mainApp').classList.add('hidden');
                    document.getElementById('studentApp').classList.add('hidden');
                    document.getElementById('studentQuizView').classList.remove('hidden');
                    document.getElementById('quizContainer').innerHTML = `
                        <div class="rounded-3xl shadow-2xl p-8 text-center" style="background:var(--bg-card);">
                            <div class="text-5xl mb-3">❌</div>
                            <h2 class="text-xl font-bold">Quiz Not Found</h2>
                            <button onclick="location.hash='';location.reload()" class="mt-4 px-6 py-2 bg-teal-600 text-white rounded-xl font-semibold">Go Back</button>
                        </div>
                    `;
                    return;
                }
                document.getElementById('authView').classList.add('hidden');
                document.getElementById('mainApp').classList.add('hidden');
                document.getElementById('studentApp').classList.add('hidden');
                document.getElementById('studentQuizView').classList.remove('hidden');
                quizState.quiz = { id: quiz.id, title: quiz.title, topic: quiz.topic, duration: quiz.duration || 8,
                    allowReview: quiz.allowReview, questions: quiz.questions.map(q => ({ id: q.id,
                        questionText: q.questionText, options: q.options, correctAnswer: q.correctAnswer,
                        topic: q.topic || 'General' })) };
                quizState.idx = 0;
                quizState.answers = {};
                quizState.flags = [];
                quizState.timeLeft = (quizState.quiz.duration || 8) * 60;
                quizState.started = false;
                if (quizState.timer) clearInterval(quizState.timer);
                renderStudentQuizQuestion();
                quizState.timer = setInterval(() => { quizState.timeLeft--;
                    updateStudentTimerDisplay(); if (quizState.timeLeft <= 0) submitStudentQuiz(true); }, 1000);
                return;
            }

            if (hash === '#/student' || hash.startsWith('#/student/')) {
                const savedStudent = localStorage.getItem('bio_current_student');
                if (savedStudent) {
                    try {
                        const student = JSON.parse(savedStudent);
                        currentStudent = student;
                        document.getElementById('authView').classList.add('hidden');
                        document.getElementById('mainApp').classList.add('hidden');
                        document.getElementById('studentApp').classList.remove('hidden');
                        document.getElementById('studentQuizView').classList.add('hidden');
                        enterStudentApp(student);
                        return;
                    } catch (e) { localStorage.removeItem('bio_current_student'); }
                }
                showLogin();
                return;
            }

            const savedUser = localStorage.getItem('bio_current_user');
            if (savedUser) {
                try {
                    const user = JSON.parse(savedUser);
                    currentUser = user;
                    document.getElementById('authView').classList.add('hidden');
                    document.getElementById('mainApp').classList.remove('hidden');
                    document.getElementById('studentApp').classList.add('hidden');
                    document.getElementById('studentQuizView').classList.add('hidden');
                    enterAdminApp(user);
                    return;
                } catch (e) { localStorage.removeItem('bio_current_user'); }
            }

            const savedStudent = localStorage.getItem('bio_current_student');
            if (savedStudent) {
                try {
                    const student = JSON.parse(savedStudent);
                    currentStudent = student;
                    document.getElementById('authView').classList.add('hidden');
                    document.getElementById('mainApp').classList.add('hidden');
                    document.getElementById('studentApp').classList.remove('hidden');
                    document.getElementById('studentQuizView').classList.add('hidden');
                    enterStudentApp(student);
                    return;
                } catch (e) { localStorage.removeItem('bio_current_student'); }
            }

            showLogin();
        }

        function showLogin() {
            document.getElementById('authView').classList.remove('hidden');
            document.getElementById('mainApp').classList.add('hidden');
            document.getElementById('studentApp').classList.add('hidden');
            document.getElementById('studentQuizView').classList.add('hidden');
            switchLoginTab('admin');
        }

        // ================================================================
        //  📦 EXPOSE GLOBALS
        // ================================================================

        window.navigateTo = navigateTo;
        window.studentNavigateTo = studentNavigateTo;
        window.toggleSidebar = toggleSidebar;
        window.toggleStudentSidebar = toggleStudentSidebar;
        window.logout = logout;
        window.logoutStudent = logoutStudent;
        window.togglePasswordVisibility = togglePasswordVisibility;
        window.switchLoginTab = switchLoginTab;
        window.showToast = showToast;
        window.openModal = openModal;
        window.closeModal = closeModal;

        window.handleStudentLogin = handleStudentLogin;

        window.exportQuizzesForStudents = exportQuizzesForStudents;
        window.exportMyResults = exportMyResults;

        window.importData = importData;
        window.renderAdminDashboard = renderAdminDashboard;
        window.renderStudentDashboard = renderStudentDashboard;
        window.renderStudentQuizLink = renderStudentQuizLink;
        window.renderStudentNotes = renderStudentNotes;
        window.renderStudentNotifications = renderStudentNotifications;
        window.renderStudentExport = renderStudentExport;
        window.initStudentDashboard = initStudentDashboard;
        window.initStudentQuizLink = initStudentQuizLink;
        window.initStudentNotes = initStudentNotes;
        window.initStudentNotifications = initStudentNotifications;
        window.selectStudentAnswer = selectStudentAnswer;
        window.nextStudentQuestion = nextStudentQuestion;
        window.prevStudentQuestion = prevStudentQuestion;
        window.submitStudentQuiz = submitStudentQuiz;
        window.toggleStudentFlag = toggleStudentFlag;
        window.viewPDF = viewPDF;
        window.downloadPDF = downloadPDF;
        window.deletePDFFile = deletePDFFile;
        window.handlePDFUpload = handlePDFUpload;
        window.handlePDFFileSelect = handlePDFFileSelect;
        window.editNote = editNote;
        window.deleteNoteFile = deleteNoteFile;
        window.handleNoteSubmitRich = handleNoteSubmitRich;
        window.applyNoteTemplate = applyNoteTemplate;
        window.showAddStudentModal = showAddStudentModal;
        window.addStudent = addStudent;
        window.deleteStudent = deleteStudent;
        window.renderStudentTable = renderStudentTable;
        window.bulkDeleteStudents = bulkDeleteStudents;

        window.toggleSelectAll = toggleSelectAll;

        window.downloadExcelTemplate = downloadExcelTemplate;

        window.addUserSubmit = addUserSubmit;

        window.showAddParentModal = showAddParentModal;

        window.sendWhatsAppLinks = sendWhatsAppLinks;
        window.sendSMSLinks = sendSMSLinks;

        window.showMostImproved = showMostImproved;
        window.initAnalytics = initAnalytics;

        window.getStudyStreak = getStudyStreak;

        window.markNotificationRead = markNotificationRead;
        window.markAllRead = markAllRead;
        window.clearNotifications = clearNotifications;
        window.updateNotificationBadge = updateNotificationBadge;
        window.toggleTheme = toggleTheme;
        window.initTheme = initTheme;
        window.selectAIModel = selectAIModel;
        window.generateAIQuestions = generateAIQuestions;
        window.sendAIQuestionsToBank = sendAIQuestionsToBank;
        window.clearAIQuestions = clearAIQuestions;
        window.handleAIFileSelect = handleAIFileSelect;
        window.shareQuizWhatsApp = shareQuizWhatsApp;
        window.shareQuizSMS = shareQuizSMS;
        window.shareQuizLink = shareQuizLink;
        window.filterTestBank = filterTestBank;
        window.deleteQuestion = deleteQuestion;
        window.regenerateAIQuestions = regenerateAIQuestions;

        // ================================================================
        //  🚀 INIT
        // ================================================================

        initTheme();
        window.addEventListener('hashchange', route);
        route();

        console.log('🧬 BIOLOGY HUB v17.1 — AI with expert improvements');
        console.log('🤖 AI models: Qwen, DeepSeek, ChatGPT, NaCCA Biology App');
        console.log('📤 Share quizzes via WhatsApp, SMS, or Link with notifications');
        console.log('📥 AI-generated questions can be sent to Quiz Bank');
        console.log('🗑️ Questions can be deleted from All Questions page (admin only)');
        console.log('🔍 AI response extraction & validation now robust');
    </script>
