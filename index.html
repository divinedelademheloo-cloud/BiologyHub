        /* ===========================================================
           SAVE BATCH WITH DUPLICATE BLOCKER (unchanged)
           =========================================================== */
        function saveGeneratedBatch(results, bank, year, section, topic) {
            let saved = 0,
                duplicates = 0;
            results.forEach(q => {
                const opts = q.options.map(o => o.replace(/^[A-D][.\)]\s*/, '').trim());
                const correctLetter = String(q.correct_answer || 'A').trim().toUpperCase();
                const correctIdx = ['A', 'B', 'C', 'D'].indexOf(correctLetter);
                const dokLevel = Number(q.dok_level) || 2;
                while (opts.length < 4) opts.push('Alternative ' + (opts.length + 1));
                const newQ = {
                    id: randId(),
                    year: year || 'Year 1',
                    section: section || 'General',
                    topic: topic || section || 'General',
                    dok: 'DoK ' + dokLevel,
                    question_text: String(q.question || q.question_text || '').trim(),
                    option_a: opts[0] || 'Option A',
                    option_b: opts[1] || 'Option B',
                    option_c: opts[2] || 'Option C',
                    option_d: opts[3] || 'Option D',
                    correct_index: correctIdx >= 0 ? correctIdx : 0,
                    created_by: currentUser()?.id || 2,
                    created_at: new Date().toISOString()
                };
                const isDup = bank.some(existing => {
                    const eOpts = [existing.option_a, existing.option_b, existing.option_c, existing
                    .option_d];
                    const nOpts = [newQ.option_a, newQ.option_b, newQ.option_c, newQ.option_d];
                    return existing.question_text.trim().toLowerCase() === newQ.question_text.trim()
                        .toLowerCase() &&
                        eOpts.every((opt, idx) => opt.trim().toLowerCase() === (nOpts[idx] || '').trim()
                        .toLowerCase());
                });
                if (isDup) { duplicates++; return; }
                bank.push(newQ);
                saved++;
            });
            setDB('questions', bank);
            const u = currentUser();
            if (u) logActivity(u.id, u.name, 'Generated Questions',
                `Saved ${saved} new (${duplicates} duplicates blocked) for ${year} - ${section}`);
            showToast(`✅ Generated ${saved} questions (${duplicates} duplicates blocked).`, 'success');
        }

        /* ===========================================================
           STRICT LOCAL GENERATOR (unchanged)
           =========================================================== */
        function generateStrictMockMCQs(text, count, year, section, d1, d2, d3) {
            const sentences = text.split(/[.!?]+/).filter(s => s.trim().length > 15 && s.trim().length < 300);
            const keywords = (text.match(/\b[A-Z][a-z]{2,}\b/g) || []);
            const uniqueWords = [...new Set(keywords)].slice(0, 30);
            const results = [];
            const total = Math.min(count, Math.max(3, sentences.length || 6));
            const dokDistribution = [];
            const c1 = Math.round((d1 / 100) * total);
            const c2 = Math.round((d2 / 100) * total);
            const c3 = total - c1 - c2;
            for (let i = 0; i < c1; i++) dokDistribution.push(1);
            for (let i = 0; i < c2; i++) dokDistribution.push(2);
            for (let i = 0; i < c3; i++) dokDistribution.push(3);
            for (let i = dokDistribution.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [dokDistribution[i], dokDistribution[j]] = [dokDistribution[j], dokDistribution[i]];
            }
            for (let i = 0; i < total; i++) {
                const s = sentences[i % sentences.length] || 'Biology concept related to ' + (uniqueWords[i % uniqueWords
                    .length] || 'life');
                const dok = dokDistribution[i] || 2;
                const stem = buildStem(s, dok, uniqueWords[i % uniqueWords.length]);
                const opts = buildOptions(s, dok, i);
                const correctLabel = ['A', 'B', 'C', 'D'][i % 4];
                const optsMapped = opts.map((textOpt, idx) => (String.fromCharCode(65 + idx) + '. ' + textOpt));
                results.push({ question: stem, options: optsMapped, correct_answer: correctLabel, dok_level: dok });
            }
            return results;
        }

        function buildStem(s, dok, keyword) {
            const short = s.substring(0, 120).trim();
            if (dok === 1) return `According to the text, what is the meaning of "${short}"?`;
            if (dok === 2) return `Based on the passage, which statement best explains "${short}"?`;
            return `Evaluate the scenario: Given that "${short}", what is the most likely strategic outcome?`;
        }

        function buildOptions(s, dok, seed) {
            const base = s.substring(0, 60);
            const alt1 = s.substring(10, 70) || base;
            const alt2 = s.substring(20, 80) || base;
            const alt3 = s.substring(5, 65) || base;
            const correct = base + ' (as described)';
            const pool = [correct, alt1 + ' (incorrect)', alt2 + ' (incorrect)', alt3 + ' (incorrect)'];
            for (let i = pool.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1) + seed) % pool.length;
                [pool[i], pool[j]] = [pool[j], pool[i]];
            }
            return pool;
        }

        /* ===========================================================
           MCQ IMPORT PARSER — strict copy (unchanged)
           =========================================================== */
        const DOK_CLASSIFICATION_SYSTEM_PROMPT = `You are an expert educational assessment specialist trained in Webb's Depth of Knowledge (DoK) framework. Your task is to analyze Multiple Choice Questions (MCQs) and classify them into one of four DoK levels: DoK 1, DoK 2, DoK 3, or DoK 4.

        ## WEBB'S DEPTH OF KNOWLEDGE FRAMEWORK

        ### DoK 1 — Recall and Reproduction
        - Recall facts, definitions, terms, simple information.
        - Rote procedures, one-step calculations.
        - Answer directly found in text.
        - Cognitive verbs: identify, list, define, recall, recognize, name, label, find, calculate (simple), state, who/what/when/where.

        ### DoK 2 — Skills and Concepts
        - Apply skills and conceptual knowledge.
        - Compare, organize, summarize, classify, interpret.
        - More than one step but standard procedure.
        - Requires comprehension, not just recall.
        - Cognitive verbs: compare, contrast, classify, organize, summarize, interpret, estimate, predict from data, explain cause/effect, categorize.

        ### DoK 3 — Strategic Thinking
        - Reasoning, planning, strategy development.
        - Complex, abstract, non-routine problem solving.
        - Justification of answers, defending a position.
        - More than one possible approach.
        - Cognitive verbs: assess, critique, formulate, hypothesize, investigate, differentiate, revise, construct arguments, draw conclusions.

        ### DoK 4 — Extended Thinking
        - Extended investigation, research, synthesis across multiple sources.
        - Connecting ideas across disciplines.
        - Rare in MCQ format.
        - Cognitive verbs: design, create, synthesize, conduct, connect, prove, critique across sources.

        ## OUTPUT FORMAT
        Return ONLY a valid JSON object with this structure:
        {
          "dok_level": <integer 1-4>,
          "dok_label": "<Recall and Reproduction | Skills and Concepts | Strategic Thinking | Extended Thinking>",
          "confidence": <float 0.0-1.0>,
          "reasoning": "<brief explanation>",
          "cognitive_verbs_detected": ["<verb>"],
          "key_signals": ["<signal>"],
          "alternative_level_considered": <integer or null>,
          "classification_arguments": {
            "supports_level": ["<arg>"],
            "counters_higher_level": ["<arg>"],
            "counters_lower_level": ["<arg>"]
          }
        }`;

        async function classifyQuestionDok(questionText, options) {
            const providerName = getApiProvider();
            const provider = API_PROVIDERS[providerName] || API_PROVIDERS.openai;
            const apiKey = getApiKey();
            if (!apiKey || apiKey.length < 10) {
                return classifyHeuristic(questionText);
            }

            const userContent = `Question: ${questionText}\nOptions:\nA) ${options[0]||''}\nB) ${options[1]||''}\nC) ${options[2]||''}\nD) ${options[3]||''}`;
            const messages = [
                { role: 'system', content: DOK_CLASSIFICATION_SYSTEM_PROMPT },
                { role: 'user', content: userContent }
            ];

            try {
                let url = provider.baseUrl;
                let headers = { 'Content-Type': 'application/json', ...provider.headers(apiKey) };
                let body;
                if (provider.appendKeyToUrl) {
                    url += '?key=' + apiKey;
                    headers = { 'Content-Type': 'application/json' };
                    body = JSON.stringify(provider.body(provider.model, messages));
                } else {
                    body = JSON.stringify(provider.body(provider.model, messages));
                }

                const response = await fetch(url, { method: 'POST', headers, body });
                if (!response.ok) throw new Error('API request failed');
                const data = await response.json();
                const rawText = provider.extractText(data);
                let cleaned = rawText.replace(/```json/g, '').replace(/```/g, '').trim();
                const startIdx = cleaned.indexOf('{');
                const endIdx = cleaned.lastIndexOf('}');
                if (startIdx !== -1 && endIdx !== -1 && endIdx > startIdx) {
                    cleaned = cleaned.substring(startIdx, endIdx + 1);
                }
                const parsed = JSON.parse(cleaned);
                if (parsed && typeof parsed.dok_level === 'number' && parsed.dok_level >= 1 && parsed.dok_level <= 4) {
                    return parsed.dok_level;
                } else {
                    throw new Error('Invalid classification response');
                }
            } catch (err) {
                console.warn('DoK classification API failed, using heuristic:', err.message);
                return classifyHeuristic(questionText);
            }
        }

        function classifyHeuristic(questionText) {
            const lower = questionText.toLowerCase();
            if (/(what is|define|list|name|identify|state|recall|who|when|where|which of the following is|what are)/i.test(lower) &&
                !/(explain|compare|contrast|why|how does|evaluate|analyze|justify|assess|critique|synthesize|create|design)/i.test(lower)) {
                return 1;
            }
            if (/(evaluate|analyze|justify|assess|critique|synthesize|create|design|compare and contrast|explain why|how does|what would happen if|predict|formulate|hypothesize|investigate|differentiate|construct|draw conclusion)/i.test(lower)) {
                if (/(data|multiple sources|over time|extended|project|investigation|design|create|synthesize)/i.test(lower) && questionText.length > 200) {
                    return 4;
                }
                return 3;
            }
            if (/(compare|contrast|organize|summarize|classify|interpret|estimate|predict|explain|cause and effect|categorize|use|apply)/i.test(lower)) {
                return 2;
            }
            return 2;
        }

        async function assignDoKLevels(questions, useAI) {
            if (useAI && getApiKey() && getApiKey().length > 10) {
                for (let i = 0; i < questions.length; i++) {
                    const q = questions[i];
                    const opts = [q.option_a, q.option_b, q.option_c, q.option_d];
                    try {
                        const level = await classifyQuestionDok(q.question_text, opts);
                        q.dok = 'DoK ' + level;
                    } catch (err) {
                        const level = classifyHeuristic(q.question_text);
                        q.dok = 'DoK ' + level;
                    }
                    if (i % 5 === 0) {
                        setStatus('loading', `Classifying question ${i+1}/${questions.length}...`);
                    }
                }
                setStatus('idle', 'System Ready');
            } else {
                questions.forEach(q => {
                    const level = classifyHeuristic(q.question_text);
                    q.dok = 'DoK ' + level;
                });
            }
        }

        async function parseAndSaveMCQs(text, year, section) {
            const lines = text.split(/\n/);
            const bank = getDB('questions');
            const savedQuestions = [];
            let currentQuestion = null;
            let currentOptions = [];
            let currentCorrect = null;
            let currentDok = 2;

            for (let line of lines) {
                const cleanLine = line.trim();
                if (!cleanLine) continue;
                const qMatch = cleanLine.match(/^(?:Q|Question|Q\.)\s*[:.]?\s*(.+)/i);
                const dokMatch = cleanLine.match(/(?:DoK|DOK|Depth)[:.]?\s*(\d)/i);
                if (dokMatch) { const d = parseInt(dokMatch[1]); if ([1, 2, 3, 4].includes(d)) currentDok = d; }
                if (qMatch) {
                    if (currentQuestion && currentOptions.length >= 2) {
                        if (currentCorrect === null || currentCorrect < 0 || currentCorrect >= currentOptions.length) {
                            currentCorrect = 0;
                        }
                        savedQuestions.push({
                            q: currentQuestion,
                            opts: [...currentOptions],
                            correct: currentCorrect,
                            dok: currentDok
                        });
                    }
                    currentQuestion = qMatch[1].trim();
                    currentOptions = [];
                    currentCorrect = null;
                }
                const aMatch = cleanLine.match(/^A[.\)]\s*(.+)/i);
                const bMatch = cleanLine.match(/^B[.\)]\s*(.+)/i);
                const cMatch = cleanLine.match(/^C[.\)]\s*(.+)/i);
                const dMatch = cleanLine.match(/^D[.\)]\s*(.+)/i);
                const ansMatch = cleanLine.match(/Answer[:.]?\s*([A-D])/i);
                if (aMatch) currentOptions[0] = aMatch[1].trim();
                if (bMatch) currentOptions[1] = bMatch[1].trim();
                if (cMatch) currentOptions[2] = cMatch[2]?.trim() || cMatch[2];
                if (dMatch) currentOptions[3] = dMatch[3]?.trim() || dMatch[3];
                if (ansMatch) {
                    const label = ansMatch[1].toUpperCase();
                    const idx = ['A', 'B', 'C', 'D'].indexOf(label);
                    if (idx >= 0) currentCorrect = idx;
                }
            }
            if (currentQuestion && currentOptions.length >= 2) {
                if (currentCorrect === null || currentCorrect < 0 || currentCorrect >= currentOptions.length) {
                    currentCorrect = 0;
                }
                savedQuestions.push({ q: currentQuestion, opts: [...currentOptions], correct: currentCorrect, dok: currentDok });
            }

            const useAI = document.getElementById('useAIClassify')?.checked || false;
            const questionObjects = savedQuestions.map(sq => ({
                question_text: sq.q,
                option_a: sq.opts[0] || '',
                option_b: sq.opts[1] || '',
                option_c: sq.opts[2] || '',
                option_d: sq.opts[3] || '',
            }));

            await assignDoKLevels(questionObjects, useAI);

            let saved = 0,
                dup = 0;
            for (let i = 0; i < savedQuestions.length; i++) {
                const sq = savedQuestions[i];
                const qObj = questionObjects[i];
                while (sq.opts.length < 4) sq.opts.push('Option ' + String.fromCharCode(65 + sq.opts.length));

                const newQ = {
                    id: randId(),
                    year: year || 'Year 1',
                    section: section || 'General',
                    topic: section || 'General',
                    dok: qObj.dok || 'DoK 2',
                    question_text: sq.q,
                    option_a: sq.opts[0] || 'Option A',
                    option_b: sq.opts[1] || 'Option B',
                    option_c: sq.opts[2] || 'Option C',
                    option_d: sq.opts[3] || 'Option D',
                    correct_index: sq.correct >= 0 && sq.correct < sq.opts.length ? sq.correct : 0,
                    created_by: currentUser()?.id || 2,
                    created_at: new Date().toISOString()
                };

                const isDup = bank.some(existing => {
                    const eOpts = [existing.option_a, existing.option_b, existing.option_c, existing.option_d];
                    const nOpts = [newQ.option_a, newQ.option_b, newQ.option_c, newQ.option_d];
                    return existing.question_text.trim().toLowerCase() === newQ.question_text.trim().toLowerCase() &&
                        eOpts.every((opt, idx) => opt.trim().toLowerCase() === (nOpts[idx] || '').trim().toLowerCase());
                });

                if (!isDup) { bank.push(newQ);
                    saved++; } else { dup++; }
            }

            setDB('questions', bank);
            const u = currentUser();
            if (u) logActivity(u.id, u.name, 'Imported Questions',
                `Imported ${saved} from file for ${year}-${section} (${dup} duplicates blocked)`);
            showToast(`✅ Imported ${saved} questions. ${dup} duplicates skipped. DoK levels ${useAI ? 'classified with AI' : 'assigned heuristically'}.`, 'success');
            setView('bank');
        }

        function handleMCQImport() {

                reader.onload = async (e) => {
                    try {
                        const pdf = await pdfjsLib.getDocument({ data: new Uint8Array(e.target.result) }).promise;
                        let text = '';
                        for (let i = 1; i <= Math.min(pdf.numPages, 12); i++) {
                            const page = await pdf.getPage(i);
                            const content = await page.getTextContent();
                            text += content.items.map(s => s.str).join(' ') + '\n';
                        }
                        await parseAndSaveMCQs(text, year, section);
                    } catch (err) { showToast('PDF parse error: ' + err.message, 'error'); }
                };
                reader.readAsArrayBuffer(file);
            } else if (file.name.endsWith('.txt')) {
                const r = new FileReader();
                r.onload = async (e) => {
                    await parseAndSaveMCQs(e.target.result, year, section);
                };
                r.readAsText(file);
            } else if (file.name.endsWith('.docx')) {
                if (typeof mammoth === 'undefined') { showToast('DOCX parser unavailable.', 'error'); return; }
                const r = new FileReader();
                r.onload = async (e) => {
                    try {
                        const result = await mammoth.extractRawText({ arrayBuffer: e.target.result });
                        await parseAndSaveMCQs(result.value, year, section);
                    } catch (err) { showToast('DOCX parse error: ' + err.message, 'error'); }
                };
                r.readAsArrayBuffer(file);
            } else {
                showToast('Unsupported format. Use PDF, DOCX, or TXT.', 'warning');
            }
        }

        // Save a manual question
        function saveManualQuestion(e) {
            e.preventDefault();
            const question = document.getElementById('mqQuestion').value.trim();
            const a = document.getElementById('mqA').value.trim();
            const b = document.getElementById('mqB').value.trim();
            const c = document.getElementById('mqC').value.trim();
            const d = document.getElementById('mqD').value.trim();
            const correctIdx = parseInt(document.getElementById('mqCorrect').value);
            const dok = document.getElementById('mqDok').value;

            if (!question || !a || !b || !c || !d) {
                showToast('Please fill in all fields.', 'warning');
                return;
            }

            const opts = [a, b, c, d];
            const uniqueOpts = new Set(opts);
            if (uniqueOpts.size < 4) {
                showToast('Options should be distinct. Please check for duplicates.', 'warning');
                return;
            }

            const dup = manualQuestions.some(q => q.question_text.trim().toLowerCase() === question.toLowerCase());
            if (dup) {
                showToast('This question already exists in your list.', 'warning');
                return;
            }

            manualQuestions.push({
                id: 'manual_' + Date.now() + '_' + Math.random().toString(36).substr(2, 4),
                question_text: question,
                option_a: a,
                option_b: b,
                option_c: c,
                option_d: d,
                correct_index: correctIdx,
                dok: dok,
                created_by: currentUser()?.id || 2,
                created_at: new Date().toISOString()
            });

            closeAddQuestionModal();
            setView('quiz_builder');
            setTimeout(() => {
                const tab = sessionStorage.getItem('quizBuilderTab') || 'tab2';
                switchQuizTab(tab);
                const badge = document.querySelector('.section-tab .q-count-badge');
                if (badge) {
                    badge.textContent = manualQuestions.length;
                }
            }, 50);
            showToast(`✅ Question added! Total: ${manualQuestions.length}`, 'success');

        // Clear all manual questions
        function clearManualQuestions() {

            if (!confirm('Remove all manually added questions?')) return;

        // Generate quiz from manual questions
        function generateManualQuiz() {
            if (manualQuestions.length === 0) {
                showToast('Add at least one question first.', 'warning');
                return;
            }

            const title = document.getElementById('manualQuizTitle')?.value?.trim() || 'Manual Quiz';
            const year = document.getElementById('manualQuizYear')?.value || 'Year 1';
            const content = document.getElementById('manualQuizContent')?.value || 'General';
            const duration = document.getElementById('manualQuizDuration')?.value || 30;
            const deadline = document.getElementById('manualQuizDeadline')?.value || '';

            if (!year) { showToast('Please select a Year.', 'warning'); return; }
            if (!content) { showToast('Please select a Content/Section.', 'warning'); return; }

            const dokCounts = { 1: 0, 2: 0, 3: 0, 4: 0 };
            manualQuestions.forEach(q => {
                const num = parseInt(q.dok?.replace('DoK ', '') || '2');
                if (num >= 1 && num <= 4) dokCounts[num]++;
            });
            const total = manualQuestions.length;
            const dok1Pct = Math.round((dokCounts[1] / total) * 100);
            const dok2Pct = Math.round((dokCounts[2] / total) * 100);
            const dok3Pct = Math.round((dokCounts[3] / total) * 100);
            const dok4Pct = Math.round((dokCounts[4] / total) * 100);

            const user = currentUser();
            const quizId = randId();
            const quizzes = getDB('quizzes');

            const selected = manualQuestions.map(q => {
                const opts = [
                    { label: 'A', text: q.option_a },
                    { label: 'B', text: q.option_b },
                    { label: 'C', text: q.option_c },
                    { label: 'D', text: q.option_d }
                ];
                const correctText = opts[q.correct_index]?.text || opts[0].text;
                const shuffled = [...opts].sort(() => 0.5 - Math.random());
                const newCorrectIdx = shuffled.findIndex(o => o.text === correctText);
                return {
                    ...q,
                    shuffled_options: shuffled,
                    correct_index: newCorrectIdx >= 0 ? newCorrectIdx : 0,
                    option_a: q.option_a,
                    option_b: q.option_b,
                    option_c: q.option_c,
                    option_d: q.option_d
                };
            });

            quizzes.push({
                id: quizId,
                title: title,
                year: year,
                content: content,
                duration: duration,
                deadline: deadline,
                shuffle: true,
                allow_review: true,
                dok1_pct: dok1Pct,
                dok2_pct: dok2Pct,
                dok3_pct: dok3Pct,
                dok4_pct: dok4Pct,
                number_of_questions: selected.length,
                created_by: user.id,
                status: 'active',
                created_at: new Date().toISOString(),
                is_manual: true
            });
            setDB('quizzes', quizzes);

            const links = getDB('quiz_links');
            selected.forEach(q => {
                links.push({
                    quiz_id: quizId,
                    question_id: q.id,
                    shuffled_order: q.shuffled_options.map(o => o.label).join('')
                });
            });
            setDB('quiz_links', links);

            if (user) logActivity(user.id, user.name, 'Created Manual Quiz',
                `Created manual quiz: "${title}" (${year} - ${content}, ${selected.length} questions, DoK: ${dok1Pct}/${dok2Pct}/${dok3Pct}/${dok4Pct})`);

            manualQuestions = [];
            showToast(`✅ Quiz created with ${selected.length} questions! Now send it to your class.`, 'success');
            setView('teacher');
        }

        // createQuiz for Tab 1 — uses CLASS_ORDER as content
        function createQuiz(e) {
            e.preventDefault();
            const user = currentUser();
            const title = document.getElementById('quizTitle').value.trim() || 'Biology Quiz';
            const year = document.getElementById('quizYear').value;
            const content = document.getElementById('quizContent').value; // now a class from CLASS_ORDER
            const count = parseInt(document.getElementById('quizCount').value);
            const duration = document.getElementById('quizDuration').value;
            const deadline = document.getElementById('quizDeadline').value;
            const shuffle = document.getElementById('shuffle').checked;
            const allowReview = document.getElementById('allowReview').checked;

            const dok1Pct = parseInt(document.getElementById('dok1Val').value) || 30;
            const dok2Pct = parseInt(document.getElementById('dok2Val').value) || 40;
            const dok3Pct = parseInt(document.getElementById('dok3Val').value) || 30;
            const totalPct = dok1Pct + dok2Pct + dok3Pct;
            if (totalPct !== 100) { showToast('DoK proportions must sum to 100%.', 'warning'); return; }
            if (!year || !content || count < 5 || count > 50) { showToast('Select Year, Class, and valid count (5-50).',
                    'warning'); return; }

            let bank = getDB('questions');
            // Filter by year and section (which now holds class names)
            let filtered = bank.filter(q => q.year === year && q.section === content);

            const dokGroups = { 1: [], 2: [], 3: [] };
            filtered.forEach(q => {
                const dokNum = parseInt(q.dok?.replace('DoK ', '') || '2');
                if (dokNum >= 1 && dokNum <= 3) dokGroups[dokNum].push(q);
                else dokGroups[2].push(q);
            });

            const dok1Count = Math.round((dok1Pct / 100) * count);
            const dok2Count = Math.round((dok2Pct / 100) * count);
            let dok3Count = count - dok1Count - dok2Count;

            let selected = [];
            const getUnique = (arr, num) => {
                const shuffled = [...arr].sort(() => 0.5 - Math.random());
                return shuffled.slice(0, Math.min(num, shuffled.length));
            };
            let selected1 = getUnique(dokGroups[1], dok1Count);
            let selected2 = getUnique(dokGroups[2], dok2Count);
            let selected3 = getUnique(dokGroups[3], dok3Count);

            const totalSelected = selected1.length + selected2.length + selected3.length;
            if (totalSelected < count) {
                const remaining = count - totalSelected;
                const available = filtered.filter(q => ![...selected1, ...selected2, ...selected3].includes(q));
                const extra = getUnique(available, remaining);
                let idx = 0;
                const extra1 = Math.round(extra.length * (dok1Pct / 100));
                const extra2 = Math.round(extra.length * (dok2Pct / 100));
                let extra3 = extra.length - extra1 - extra2;
                for (let i = 0; i < extra1 && idx < extra.length; i++) { selected1.push(extra[idx++]); }
                for (let i = 0; i < extra2 && idx < extra.length; i++) { selected2.push(extra[idx++]); }
                for (let i = 0; i < extra3 && idx < extra.length; i++) { selected3.push(extra[idx++]); }
            }
            selected = [...selected1, ...selected2, ...selected3];
            const seen = new Set();
            selected = selected.filter(q => { if (seen.has(q.id)) return false;
                seen.add(q.id); return true; });
            if (selected.length === 0) { showToast('Not enough questions. Generate more in the bank first.', 'warning'); return; }

            selected = selected.map(q => {
                const opts = [
                    { label: 'A', text: q.option_a },
                    { label: 'B', text: q.option_b },
                    { label: 'C', text: q.option_c },
                    { label: 'D', text: q.option_d }
                ];
                const correctText = opts[q.correct_index]?.text || opts[0].text;
                const shuffled = shuffle ? [...opts].sort(() => 0.5 - Math.random()) : [...opts];
                const newCorrectIdx = shuffled.findIndex(o => o.text === correctText);
                return { ...q, shuffled_options: shuffled, correct_index: newCorrectIdx >= 0 ? newCorrectIdx : 0 };
            });

            const quizId = randId();
            const quizzes = getDB('quizzes');
            quizzes.push({
                id: quizId,
                title,
                year,
                content, // this is now the class name
                duration,
                deadline,
                shuffle,
                allow_review: allowReview,
                dok1_pct: dok1Pct,
                dok2_pct: dok2Pct,
                dok3_pct: dok3Pct,
                number_of_questions: selected.length,
                created_by: user.id,
                status: 'active',
                created_at: new Date().toISOString()
            });
            setDB('quizzes', quizzes);

            const links = getDB('quiz_links');
            selected.forEach(q => links.push({ quiz_id: quizId, question_id: q.id, shuffled_order: q.shuffled_options.map(
                    o => o.label).join('') }));
            setDB('quiz_links', links);

            if (user) logActivity(user.id, user.name, 'Created Test',
                `Created quiz: "${title}" (${year} - ${content}, ${selected.length} questions)`);
            showToast(`✅ Quiz created with ${selected.length} questions.`, 'success');
            setView('teacher');
        }

                </div>`;
              }).join('')||'<p class="text-slate-400">No assigned quizzes.</p>'}
            </div>
          </div>`;
        }

        let proctorInterval = null;

        function startQuizSession(quizId, assignId) {
            const links = getDB('quiz_links').filter(l => l.quiz_id === quizId);
            const bank = getDB('questions');
            const questions = links.map(l => {
                const q = bank.find(b => b.id === l.question_id);
                if (!q) return null;
                const shuffled = q.shuffled_options || [
                    { label: 'A', text: q.option_a },
                    { label: 'B', text: q.option_b },
                    { label: 'C', text: q.option_c },
                    { label: 'D', text: q.option_d }
                ];
                return { ...q, shuffled_options: shuffled, correct_index: q.correct_index || 0 };
            }).filter(Boolean);

            const startTime = new Date().toISOString();
            const assignments = getDB('responses');
            const assignment = assignments.find(a => a.id === assignId);
            if (assignment) {
                assignment.started_at = startTime;
                assignment.status = 'in_progress';
                setDB('responses', assignments);
            }

            sessionStorage.setItem('quiz_session', JSON.stringify({ quizId, assignId, questions, answers: [],
                startTime }));
            if (proctorInterval) clearInterval(proctorInterval);
            let tabSwitchCount = 0;
            proctorInterval = setInterval(() => {
                if (document.hidden) {
                    tabSwitchCount++;
                    const u = currentUser();
                    if (u) logActivity(u.id, u.name, 'Proctor Warning', `Tab switched ${tabSwitchCount} times during quiz`);
                    if (tabSwitchCount >= 3) {
                        showToast('⚠️ Warning: Multiple tab switches detected!', 'warning');
                    }
                }
            }, 2000);

            setView('quiz_session');
        }

        function buildQuizSession() {
            const s = JSON.parse(sessionStorage.getItem('quiz_session') || '{}');
            const qs = s.questions || [];
            if (!qs.length) return `<div class="text-center py-20 text-slate-400">No questions. <a href="#" onclick="setView('student')" class="text-violet-700 font-extrabold">Back</a></div>`;

            const warningBanner = `
            <div class="proctor-warning mb-4">
              <i class="fa-solid fa-shield-halved"></i>
              Proctor Mode: Tab switching is being monitored. Maximum 3 warnings.
            </div>
          `;

            return `
          <div class="max-w-3xl mx-auto bg-white rounded-3xl shadow-xl border border-slate-100 p-6 fade-in">
            ${warningBanner}
            <div class="flex items-center justify-between mb-6">
              <h2 class="text-2xl font-extrabold">Quiz Session</h2>
              <button onclick="exitQuizSession()" class="bg-slate-200 text-slate-700 px-4 py-2 rounded-xl font-bold hover:bg-slate-300 text-sm">Exit</button>
            </div>
            <form onsubmit="submitQuizSession(event)" class="space-y-6">
              ${qs.map((q,i)=>`
              <div class="p-5 rounded-2xl bg-slate-50 border border-slate-100">
                <div class="flex gap-3 mb-3">
                  <span class="w-8 h-8 flex-none rounded-full bg-gradient-to-br from-violet-600 to-violet-800 text-white flex items-center justify-center font-extrabold text-sm">${i+1}</span>
                  <h3 class="font-bold text-slate-800 leading-snug">${q.question_text}</h3>
                </div>
                <div class="ml-11 space-y-2">
                  ${(q.shuffled_options||[]).map(opt=>`
                  <label class="flex items-center gap-3 p-2 rounded-lg hover:bg-white hover:shadow-sm transition cursor-pointer">
                    <input type="radio" name="q${q.id}" value="${opt.label}" class="w-4 h-4 text-violet-700" required>
                    <span class="text-sm font-medium">${opt.label}. ${opt.text}</span>
                  </label>`).join('')}
                </div>
              </div>`).join('')}
              <button type="submit" class="bg-gradient-to-r from-violet-600 to-violet-800 text-white px-8 py-3 rounded-xl font-extrabold shadow-lg hover:brightness-110">Submit Quiz</button>
            </form>
          </div>`;
        }

        function exitQuizSession() {
            if (confirm('Exit the quiz? Your progress will be lost.')) {
                if (proctorInterval) clearInterval(proctorInterval);
                sessionStorage.removeItem('quiz_session');
                setView('student');
            }
        }

        function submitQuizSession(e) {
            e.preventDefault();
            const s = JSON.parse(sessionStorage.getItem('quiz_session') || '{}');
            const form = new FormData(document.querySelector('form'));
            let score = 0;
            const answers = [];
            s.questions.forEach(q => {
                const sel = form.get('q' + q.id);
                answers.push({ question_id: q.id, selected: sel });
                const opts = q.shuffled_options || [];
                const correctLabel = opts[q.correct_index]?.label;
                if (sel === correctLabel) score++;
            });
            const assignments = getDB('responses');
            const a = assignments.find(x => x.id === s.assignId);
            if (a) {
                a.status = 'submitted';
                a.submitted_at = new Date().toISOString();
                a.score = Math.round((score / s.questions.length) * 100);
                a.answers = answers;
                if (a.started_at) {
                    const duration = Math.round((new Date(a.submitted_at) - new Date(a.started_at)) / 60000);
                    logActivity(a.student_id, getUserName(a.student_id), 'Quiz Attempt',
                        `Quiz: "${getDB('quizzes').find(q=>q.id===s.quizId)?.title||'Unknown'}" | Score: ${a.score}% | Duration: ${duration} min`
                        );
                }
            }
            setDB('responses', assignments);
            if (proctorInterval) clearInterval(proctorInterval);
            sessionStorage.removeItem('quiz_session');
            const u = currentUser();
            const quiz = getDB('quizzes').find(q => q.id === s.quizId);
            if (u) logActivity(u.id, u.name, 'Completed Quiz', `Completed "${quiz?.title||'Quiz'}" with score ${a?.score||0}%`);
            showToast(`✅ Quiz submitted! Score: ${a?.score || 0}%`, 'success');
            setView('student');
        }

                        <p class="text-xs text-slate-400">${new Date(a.submitted_at).toLocaleDateString()} • ${duration}</p>
                      </div>
                      <span class="font-extrabold ${a.score>=60?'text-emerald-600':'text-rose-600'}">${a.score}%</span>
                    </div>`;
                  }).join('')||'<p class="text-sm text-slate-400">No completed quizzes yet.</p>'}
                </div>
              </div>
            </div>
          </div>`;
        }

        /* ===========================================================
           PROGRESS REPORT (unchanged)
           =========================================================== */
        function buildProgressReport() {
            const user = currentUser();
            const responses = getDB('responses').filter(r => r.student_id === user.id && r.status === 'submitted');
            const avg = responses.length ? (responses.reduce((s, r) => s + r.score, 0) / responses.length).toFixed(1) : 0;
            setTimeout(() => {
                const ctx = document.getElementById('reportChart');
                if (!ctx) return;
                if (window.myReportChart) window.myReportChart.destroy();
                window.myReportChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: responses.map((r, i) => 'Q' + (i + 1)),
                        datasets: [{ label: 'Score %', data: responses.map(r => r.score), borderColor: '#0284c7',
                            backgroundColor: 'rgba(2,132,199,0.1)', fill: true, tension: 0.4,
                            pointBackgroundColor: '#0284c7' }]
                    },
                    options: { scales: { y: { beginAtZero: true, max: 100 } }, plugins: { legend: { display: false } } }
                });
            }, 200);
            return `
          <div class="max-w-4xl mx-auto space-y-6 fade-in">
            <div class="flex items-center justify-between">
              <h2 class="text-2xl font-extrabold">My Performance Report</h2>
              <button onclick="setView('student')" class="bg-slate-200 text-slate-700 px-4 py-2 rounded-xl font-bold hover:bg-slate-300 text-sm">Back</button>
            </div>
            <div class="bg-white rounded-3xl shadow-xl border border-slate-100 overflow-hidden">
              <div class="bg-gradient-to-r from-violet-700 to-violet-900 p-6 text-white flex justify-between items-end">
                <div>
                  <h3 class="text-2xl font-extrabold">${user?.name}</h3>
                  <p class="text-violet-200 text-sm">${user?.email} • Class: ${user?.class}</p>
                </div>
                <div class="text-right">
                  <p class="text-xs text-violet-200 uppercase tracking-wider">Overall Average</p>
                  <p class="text-4xl font-extrabold">${avg}%</p>
                </div>
              </div>
              <div class="p-6">
                <h4 class="font-extrabold mb-3">Performance Trend</h4>
                <canvas id="reportChart" height="180"></canvas>
                <table class="w-full text-sm mt-6">
                  <thead class="bg-slate-800 text-white text-xs font-bold uppercase"><tr><th class="text-left px-4 py-3">Quiz</th><th>Score</th><th>Date</th><th>Time</th></tr></thead>
                  <tbody class="divide-y divide-slate-100">
                    ${responses.map(r=>{
                      const q=getDB('quizzes').find(qq=>qq.id===r.quiz_id);
                      const duration = r.started_at && r.submitted_at ? Math.round((new Date(r.submitted_at)-new Date(r.started_at))/60000)+' min' : '—';
                      return `<tr><td class="px-4 py-3 font-medium">${q?.title||'Quiz'}</td><td class="px-4 py-3 font-extrabold ${r.score>=60?'text-emerald-600':'text-rose-600'}">${r.score}%</td><td class="px-4 py-3 text-xs text-slate-400">${new Date(r.submitted_at).toLocaleDateString()}</td><td class="px-4 py-3 text-xs text-slate-400">${duration}</td></tr>`;
                    }).join('')||'<tr><td colspan="4" class="px-4 py-4 text-slate-400">No completed quizzes.</td></tr>'}
                  </tbody>
                </table>
                <div class="mt-6 pt-4 border-t border-slate-100 flex gap-3">
                  <button onclick="window.print()" class="bg-gradient-to-r from-violet-600 to-violet-800 text-white px-5 py-2.5 rounded-xl font-extrabold hover:brightness-110">Print Report</button>
                  <button onclick="setView('student')" class="px-5 py-2.5 rounded-xl border border-slate-200 text-slate-600 font-extrabold hover:bg-slate-50">Back</button>
                </div>
              </div>
            </div>
          </div>`;
        }

        /* ===========================================================
           BIND EVENTS
           =========================================================== */
        function bindEvents() {
            if (view === 'quiz_builder' || view === 'upload') {
                setTimeout(() => { updateDokTotal(); }, 200);
            }
            if (view === 'student') {
                const user = currentUser();
                if (user) {
                    const responses = getDB('responses').filter(r => r.student_id === user.id && r.status === 'submitted');
                    const ctx = document.getElementById('studentChart');
                    if (ctx && responses.length) {
                        setTimeout(() => {
                            new Chart(ctx, {
                                type: 'bar',
                                data: {
                                    labels: responses.map((r, i) => 'Q' + (i + 1)),
                                    datasets: [{ label: 'Score %', data: responses.map(r => r.score),
                                        backgroundColor: '#10b981', borderRadius: 6 }]
                                },
                                options: { scales: { y: { beginAtZero: true, max: 100 } },
                                    plugins: { legend: { display: false } } }
                            });
                        }, 100);
                    }
                }
            }
            if (view === 'teacher') {
                const ctx = document.getElementById('teacherChart');
                if (ctx) {
                    const quizzes = getDB('quizzes').filter(q => q.created_by === currentUser()?.id);
                    const data = quizzes.map(q => {
                        const res = getDB('responses').filter(r => r.quiz_id === q.id && r.score !== null);
                        return res.length ? (res.reduce((s, r) => s + r.score, 0) / res.length) : 0;
                    });
                    setTimeout(() => {
                        new Chart(ctx, {
                            type: 'bar',
                            data: {
                                labels: quizzes.map(q => q.title.substring(0, 18)),
                                datasets: [{ label: 'Avg Score', data, backgroundColor: '#8b5cf6',
                                    borderRadius: 6 }]
                            },
                            options: { scales: { y: { beginAtZero: true, max: 100 } },
                                plugins: { legend: { display: false } } }
                        });
                    }, 100);
                }
            }
            if (view === 'student_performance') {
                setTimeout(() => {
                    const input = document.getElementById('studentSearchInput');
                    if (input && document.activeElement !== input) { /* don't steal focus */ }
                }, 150);
            }
            if (view === 'quiz_builder') {
                const tab = sessionStorage.getItem('quizBuilderTab') || 'tab1';
                setTimeout(() => {
                    switchQuizTab(tab);
                }, 100);
            }
        }

        /* ===========================================================
           INIT
           =========================================================== */
        document.addEventListener('DOMContentLoaded', () => {
            seed();
            render();
            initNightMode();
            setStatus('idle', 'System Ready');
            setTimeout(ensureStatusIndicator, 200);
            const stored = sessionStorage.getItem('manualQuestions');
            if (stored) {
                try {
                    manualQuestions = JSON.parse(stored);
                } catch (e) { manualQuestions = []; }
            }
            const origPush = Array.prototype.push;
            Array.prototype.push = function() {
                const result = origPush.apply(this, arguments);
                sessionStorage.setItem('manualQuestions', JSON.stringify(manualQuestions));
                return result;
            };
            const origSplice = Array.prototype.splice;
            Array.prototype.splice = function() {
                const result = origSplice.apply(this, arguments);
                sessionStorage.setItem('manualQuestions', JSON.stringify(manualQuestions));
                return result;
            };
            const origLength = Object.getOwnPropertyDescriptor(Array.prototype, 'length');
            Object.defineProperty(manualQuestions, 'length', {
                get: function() { return this.length; },
                set: function(val) {
                    origLength.set.call(this, val);
                    sessionStorage.setItem('manualQuestions', JSON.stringify(manualQuestions));
                }
            });
        });

        Object.defineProperty(window, 'manualQuestions', {
            get: function() { return window._manualQuestions || []; },
            set: function(val) {
                window._manualQuestions = val;
                sessionStorage.setItem('manualQuestions', JSON.stringify(val));
            }
        });
        window._manualQuestions = manualQuestions;
    </script>
</body>
</html>
