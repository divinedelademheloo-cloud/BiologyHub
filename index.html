            font-family: 'Inter', system-ui, sans-serif;
            background: #f8fafc;
            color: #0f172a;
        }
        .glass {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(14px);
            border: 1px solid rgba(226, 232, 240, 0.6);
        }
        .fade-in {
            animation: fadeIn .35s ease-out both;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .hero-img {
            background-image: url('https://images.unsplash.com/photo-1576086213369-97a306d36557?q=80&w=1600&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
        }
        @media print {
            .no-print {
                display: none !important;

            .print-area {
                box-shadow: none !important;
                border: 1px solid #cbd5e1;
            }
        }
        /* custom scroll */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 8px;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 8px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
        .nav-link {
            transition: all 0.2s;
        }
        .nav-link:hover {
            transform: translateY(-1px);
        }
    </style>
</head>

            <div>

        const CLASSES = [

        /* ===========================================================
           DATA HELPERS
           =========================================================== */
        function getDB(k) { return JSON.parse(localStorage.getItem(K[k]) || '[]'); }

        function setDB(k, v) { localStorage.setItem(K[k], JSON.stringify(v)); }

        function currentUser() { return JSON.parse(localStorage.getItem(K.session) || 'null'); }

        function randId() { return Date.now() + Math.floor(Math.random() * 10000); }

        function getUserName(uid) {
            const u = getDB('users').find(x => x.id === uid);
            return u ? u.name : 'Unknown';
        }

        /* ===========================================================
           SEED DATA
           =========================================================== */
        function seed() {
            if (getDB('users').length === 0) {
                const now = new Date().toISOString();
                const users = [
                    { id: 1, name: 'Mr. Divine D. Heloo', email: 'divinedelademheloo@gmail.com', password: btoa('Admin@2026'),
                        role: 'admin', class: 'Staff', phone: '0240267301', created: now },
                    { id: 2, name: 'Mr. Kofi Asante', email: 'teacher@bioghana.edu', password: btoa('Teacher@2026'),
                        role: 'teacher', class: 'Staff', phone: '0244111111', created: now },
                    { id: 3, name: 'Ama Serwaa', email: 'ama@student.edu', password: btoa('Student@2026'),
                        role: 'student', class: 'Science A', phone: '0244222222', created: now },
                    { id: 4, name: 'Kojo Darko', email: 'kojo@student.edu', password: btoa('Student@2026'),
                        role: 'student', class: 'Science B', phone: '0244333333', created: now }
                ];
                setDB('users', users);
            }
            if (getDB('questions').length === 0) {
                setDB('questions', [{
                    id: 1001,
                    year: "Year 1",

                    dok: "DoK 1",

                    option_a: "It eliminates all pests",

                    correct_index: 1,

                }, {

                    year: "Year 1",
                    section: "Section 1 – Scientific Method in Biological Problem Solving",
                    topic: "Scientific Method",
                    dok: "DoK 2",
                    question_text: "A student observes that plants grow taller near a window. What is the next step in the scientific method?",
                    option_a: "Form a conclusion immediately",
                    option_b: "Formulate a hypothesis",

                    option_d: "Ignore the observation",
                    correct_index: 1,
                    created_by: 2,
                    created_at: new Date().toISOString()
                }, {
                    id: 1003,
                    year: "Year 2",
                    section: "Section 8 – Photosynthesis and Factors Affecting the Rate of Photosynthesis",
                    topic: "Photosynthesis",
                    dok: "DoK 3",
                    question_text: "Given that light intensity and CO2 concentration both affect photosynthesis, evaluate which factor is more limiting in a dense canopy.",
                    option_a: "Always CO2",
                    option_b: "Always light",
                    option_c: "Light intensity is more limiting due to shading",
                    option_d: "Neither is limiting",
                    correct_index: 2,
                    created_by: 2,
                    created_at: new Date().toISOString()
                }]);
            }
            if (getDB('notes').length === 0) {
                setDB('notes', [{
                    id: 2001,
                    title: "Introduction to Cell Biology",
                    content: "Cells are the basic unit of life. This note covers cell theory, membrane structure, and transport mechanisms.",
                    category: "Biology Notes",

                }]);
            }
            if (getDB('messages').length === 0) {
                setDB('messages', []);

                setDB('activities', []);

        /* ===========================================================
           LOG ACTIVITY
           =========================================================== */
        function logActivity(userId, userName, action, details) {
            const acts = getDB('activities');
            acts.push({
                id: randId(),
                user_id: userId,
                user_name: userName || 'Unknown',
                action: action,
                details: details || '',
                timestamp: new Date().toISOString()
            });
            setDB('activities', acts);
        }

        /* ===========================================================
           ROUTER
           =========================================================== */
        let view = 'login';

        function setView(v) {
            view = v;
            render();
        }

        function logout() {
            const u = currentUser();
            if (u) logActivity(u.id, u.name, 'Logout', 'User logged out');
            localStorage.removeItem(K.session);
            view = 'login';
            render();
        }

        function renderNav(user) {
            const el = document.getElementById('navActions');
            if (!user) {
                el.innerHTML =
                    `<a href="#" onclick="setView('login')" class="bg-gradient-to-r from-amber-600 to-rose-700 text-white px-4 py-2 rounded-lg text-sm font-extrabold shadow hover:brightness-110">Log In</a>`;
                return;
            }
            let html =
                `<span class="text-sm text-slate-700 font-semibold hidden sm:inline">${user.name} <span class="text-[10px] bg-slate-100 px-2 py-0.5 rounded-full uppercase tracking-wide font-bold">${user.role}</span></span>`;
            html +=
                ` <button onclick="setView('change_password')" class="text-xs bg-white border border-slate-200 px-2 py-1.5 rounded-md font-bold hover:bg-slate-50">Change Password</button>`;
            if (user.role === 'admin') {
                html +=
                    ` <button onclick="setView('admin')" class="text-sm font-extrabold text-rose-700 hover:text-rose-900 px-2">Admin</button>`;
            }
            if (user.role === 'teacher' || user.role === 'admin') {
                html +=
                    ` <button onclick="setView('teacher')" class="text-sm font-extrabold text-violet-700 hover:text-violet-900 px-2">Teacher</button>`;
            }
            if (user.role === 'student' || user.role === 'teacher' || user.role === 'admin') {
                html +=
                    ` <button onclick="setView('student')" class="text-sm font-extrabold text-emerald-700 hover:text-emerald-900 px-2">Student</button>`;
            }
            // Notification bell
            const unread = getDB('messages').filter(m => m.to === user.email && !m.read).length;
            html +=
                ` <button onclick="setView('notifications')" class="relative text-slate-600 hover:text-slate-900 px-2 text-lg"><i class="fa-regular fa-bell"></i>${unread > 0 ? `<span class="absolute -top-1 -right-1 bg-red-500 text-white text-[8px] font-extrabold rounded-full w-4 h-4 flex items-center justify-center">${unread}</span>` : ''}</button>`;
            html +=
                ` <button onclick="logout()" class="text-sm text-red-600 font-extrabold hover:text-red-800 px-2">Log out</button>`;
            el.innerHTML = html;
        }

        function render() {
            seed();
            const u = currentUser();
            renderNav(u);
            const container = document.getElementById('app');
            if (!u && view !== 'login' && view !== 'change_password') view = 'login';
            container.innerHTML = `<div class="fade-in">${buildView()}</div>`;
            bindEvents();
        }

        function buildView() {
            const u = currentUser();
            switch (view) {
                case 'login':
                    return buildLogin();
                case 'change_password':
                    return buildChangePassword();
                case 'admin':
                    return buildAdmin();
                case 'teacher':
                    return buildTeacher();
                case 'student':
                    return buildStudent();
                case 'upload':
                    return buildGenerateQuestions();
                case 'pdf_library':
                    return buildPdfLibrary();
                case 'create_note':
                    return buildCreateNote();
                case 'biology_notes':
                    return buildBiologyNotes();
                case 'bank':
                    return buildBank();
                case 'quiz_builder':
                    return buildQuizBuilder();
                case 'take_quiz':
                    return buildTakeQuiz();
                case 'quiz_session':
                    return buildQuizSession();
                case 'progress_report':
                    return buildProgressReport();
                case 'view_student_list':
                    return buildViewStudentList();
                case 'send_message':
                    return buildSendMessage();
                case 'bulk_upload':
                    return buildBulkUpload();
                case 'add_user':
                    return buildAddUser();
                case 'notifications':
                    return buildNotifications();
                case 'activities':
                    return buildActivities();
                case 'student_performance':
                    return buildStudentPerformance();
                case 'manage_students':
                    return buildManageStudents();
                case 'student_performance_detail':
                    return buildStudentPerformanceDetail();
                default:
                    return buildLogin();
            }
        }

        /* ===========================================================
           LOGIN / CHANGE PASSWORD
           =========================================================== */
        function buildLogin() {
            return `
          <div class="relative min-h-[90vh] flex items-center justify-center overflow-hidden">
            <img src="https://images.unsplash.com/photo-1576086213369-97a306d36557?w=1600&q=80&auto=format&fit=crop" class="absolute inset-0 w-full h-full object-cover opacity-20" alt="Background">
            <div class="relative z-10 max-w-md mx-auto px-4 w-full">
              <div class="bg-white/90 backdrop-blur-xl rounded-3xl shadow-2xl p-8 sm:p-10 border border-white/20">
                <div class="text-center mb-8">
                  <img src="https://images.unsplash.com/photo-1532094349884-543bc11b234d?w=200&h=200&fit=crop&q=80" class="w-20 h-20 mx-auto rounded-2xl object-cover shadow-xl ring-4 ring-amber-200 mb-4 rotate-3 hover:rotate-0 transition duration-500" alt="Science">
                  <h2 class="text-3xl font-extrabold text-slate-900">Welcome Back</h2>
                  <p class="text-slate-500 text-sm mt-2">Ghana SHS Biology Assessment System</p>
                </div>
                <form onsubmit="doLogin(event)" class="space-y-4">
                  <div>
                    <label class="block text-xs font-extrabold text-slate-700 uppercase mb-1">Email</label>
                    <input type="email" id="loginEmail" value="admin@bioghana.edu" class="w-full px-4 py-3 rounded-xl bg-slate-50 border border-slate-200 focus:outline-none focus:ring-2 focus:ring-rose-500/20 focus:border-rose-500 transition">
                  </div>
                  <div>
                    <label class="block text-xs font-extrabold text-slate-700 uppercase mb-1">Password</label>
                    <div class="relative">
                      <input type="password" id="loginPass" value="Admin@2026" class="w-full px-4 py-3 rounded-xl bg-slate-50 border border-slate-200 focus:outline-none focus:ring-2 focus:ring-rose-500/20 focus:border-rose-500 transition">
                      <button type="button" onclick="togglePass('loginPass',this)" class="absolute right-3 top-3 text-slate-400 hover:text-slate-600 text-xs font-bold">Show</button>
                    </div>
                  </div>
                  <button type="submit" class="w-full bg-gradient-to-r from-amber-600 to-rose-700 hover:brightness-110 text-white font-extrabold py-3.5 rounded-xl shadow-lg transition">Log In</button>
                </form>
                <div class="mt-6 pt-6 border-t border-slate-100 flex justify-center gap-2 text-xs flex-wrap">
                  <button onclick="fillDemo('admin')" class="px-3 py-1 rounded-full bg-slate-100 hover:bg-slate-200 font-bold text-slate-600">Admin</button>
                  <button onclick="fillDemo('teacher')" class="px-3 py-1 rounded-full bg-slate-100 hover:bg-slate-200 font-bold text-slate-600">Teacher</button>
                  <button onclick="fillDemo('student')" class="px-3 py-1 rounded-full bg-slate-100 hover:bg-slate-200 font-bold text-slate-600">Student</button>
                </div>
                <div class="mt-3 text-center">
                  <button onclick="setView('change_password')" class="text-xs text-rose-700 font-bold hover:underline">Change my password</button>
                </div>
              </div>
            </div>
          </div>`;
        }

        function fillDemo(role) {
            const map = { admin: ['admin@bioghana.edu', 'Admin@2026'], teacher: ['teacher@bioghana.edu',
                    'Teacher@2026'
                ], student: ['ama@student.edu', 'Student@2026']
            };
            document.getElementById('loginEmail').value = map[role][0];
            document.getElementById('loginPass').value = map[role][1];
        }

        function togglePass(id, btn) {
            const el = document.getElementById(id);
            el.type = el.type === 'password' ? 'text' : 'password';
            btn.textContent = el.type === 'text' ? 'Hide' : 'Show';
        }

        function doLogin(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value.trim().toLowerCase();
            const pass = document.getElementById('loginPass').value;
            const users = getDB('users');
            const user = users.find(u => u.email.toLowerCase() === email && u.password === btoa(pass));
            if (user) {
                localStorage.setItem(K.session, JSON.stringify(user));
                logActivity(user.id, user.name, 'Login', 'User logged in');
                setView(user.role === 'admin' ? 'admin' : user.role === 'teacher' ? 'teacher' : 'student');
            } else { alert('Invalid credentials. Try demo buttons.'); }
        }

        function buildChangePassword() {
            const u = currentUser() || { email: 'guest' };
            return `
          <div class="max-w-md mx-auto mt-16">
            <div class="bg-white rounded-3xl shadow-xl border border-slate-100 p-8">
              <h2 class="text-2xl font-extrabold mb-6">Change Password</h2>
              <form onsubmit="updatePassword(event)" class="space-y-4">
                <input type="email" value="${u.email}" class="w-full px-4 py-3 rounded-xl bg-slate-50 border border-slate-200" disabled>
                <input type="password" id="oldPass" placeholder="Current password" class="w-full px-4 py-3 rounded-xl bg-white border border-slate-200" required>
                <input type="password" id="newPass" placeholder="New password" class="w-full px-4 py-3 rounded-xl bg-white border border-slate-200" required>
                <button type="submit" class="w-full bg-gradient-to-r from-amber-600 to-rose-700 text-white font-extrabold py-3 rounded-xl">Update</button>
              </form>
            </div>
          </div>`;
        }

        function updatePassword(e) {
            e.preventDefault();
            let u = currentUser();
            if (!u) { alert('Please log in first.'); return; }
            const users = getDB('users');
            const idx = users.findIndex(x => x.id === u.id);
            if (idx > -1) {
                if (users[idx].password !== btoa(document.getElementById('oldPass').value)) { alert(
                    'Current password incorrect'); return; }
                users[idx].password = btoa(document.getElementById('newPass').value);
                setDB('users', users);
                alert('Password updated.');
                setView('login');
            }
        }

        /* ===========================================================
           NOTIFICATIONS (shared)
           =========================================================== */
        function buildNotifications() {
            const u = currentUser();
            if (!u) return buildLogin();
            const msgs = getDB('messages').filter(m => m.to === u.email || m.to === 'all' || (m.to === 'students' && u
                .role === 'student') || (m.to === 'teachers' && u.role === 'teacher'));
            // mark as read
            const all = getDB('messages');
            all.forEach(m => { if (m.to === u.email || m.to === 'all' || (m.to === 'students' && u.role === 'student') || (m
                        .to === 'teachers' && u.role === 'teacher')) m.read = true; });
            setDB('messages', all);

            return `
          <div class="max-w-4xl mx-auto fade-in">
            <div class="flex items-center justify-between mb-6">
              <h2 class="text-2xl font-extrabold">Notifications</h2>
              <button onclick="setView('${u.role}')" class="bg-slate-200 text-slate-700 px-4 py-2 rounded-xl font-bold hover:bg-slate-300">Back</button>
            </div>
            <div class="space-y-3">
              ${msgs.length ? msgs.sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp)).map(m=>`
                <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5 hover:shadow-md transition">

        function downloadTemplate() {
            const wb = XLSX.utils.book_new();
            const data = [

                    Password: "Biology2026" }

        function processBulkUpload() {
            const input = document.getElementById('bulkFile');
            if (!input.files.length) { alert('Select file'); return; }
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const wb = XLSX.read(new Uint8Array(e.target.result), { type: 'array' });
                    const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
                    const users = getDB('users');
                    let count = 0;
                    rows.forEach(r => {
                        const name = r.Name || r.name || '';
                        const cls = r.Class || r.class || 'Science A';
                        const email = String(r.Email || r.email || '').toLowerCase().trim();
                        const phone = String(r.Phone || r.phone || '');
                        const pwd = String(r.Password || r.password || 'Biology2026');
                        if (name && email) {
                            users.push({
                                id: randId(),
                                name: name,
                                email: email,
                                password: btoa(pwd),
                                role: 'student',
                                class: cls,
                                phone: phone,
                                created: new Date().toISOString()
                            });
                            count++;
                        }
                    });
                    setDB('users', users);
                    alert('Uploaded ' + count + ' student records.');
                    setView('admin');
                } catch (err) { alert('Error: ' + err.message); }
            };
            reader.readAsArrayBuffer(input.files[0]);
        }

        function buildStudentPerformanceDetail() {
            const sid = parseInt(sessionStorage.getItem('perf_student_id') || '0');
            const student = getDB('users').find(u => u.id === sid);
            if (!student) return '<p class="text-center py-20 text-slate-400">Student not found. <a href="#" onclick="setView(\'student_performance\')" class="text-violet-700 font-bold">Back</a></p>';
            const responses = getDB('responses').filter(r => r.student_id === sid && r.status === 'submitted');
            const avg = responses.length ? (responses.reduce((s, r) => s + r.score, 0) / responses.length).toFixed(1) : 0;
            const quizzes = getDB('quizzes');

            setTimeout(() => {
                const ctx1 = document.getElementById('perfChart');
                if (ctx1) {
                    if (window._perfChart) window._perfChart.destroy();
                    window._perfChart = new Chart(ctx1, {
                        type: 'line',
                        data: {
                            labels: responses.map((r, i) => 'Q' + (i + 1)),
                            datasets: [{ label: 'Score %', data: responses.map(r => r.score),
                                borderColor: '#0284c7', backgroundColor: 'rgba(2,132,199,0.1)',
                                fill: true, tension: 0.4, pointBackgroundColor: '#0284c7' }]
                        },
                        options: { scales: { y: { beginAtZero: true, max: 100 } },
                            plugins: { legend: { display: false } } }
                    });
                }
                const ctx2 = document.getElementById('perfPie');
                if (ctx2 && responses.length) {
                    if (window._perfPie) window._perfPie.destroy();
                    const pass = responses.filter(r => r.score >= 60).length;
                    const fail = responses.filter(r => r.score < 60).length;
                    window._perfPie = new Chart(ctx2, {
                        type: 'doughnut',
                        data: {
                            labels: ['Pass (≥60%)', 'Fail (<60%)'],
                            datasets: [{ data: [pass, fail], backgroundColor: ['#10b981', '#ef4444'],
                                borderWidth: 0 }]
                        },
                        options: { plugins: { legend: { position: 'bottom' } } }
                    });
                }
            }, 200);

            return `
          <div class="max-w-5xl mx-auto fade-in">
            <div class="flex items-center justify-between mb-6">
              <div>
                <h2 class="text-2xl font-extrabold">${student.name}</h2>
                <p class="text-sm text-slate-500">${student.class} • ${student.email}</p>
              </div>
              <button onclick="setView('student_performance')" class="bg-slate-200 text-slate-700 px-4 py-2 rounded-xl font-bold hover:bg-slate-300 text-sm">Back</button>
            </div>

              <div class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100"><p class="text-xs text-slate-500 font-bold uppercase">Quizzes Taken</p><p class="text-3xl font-extrabold text-violet-700">${responses.length}</p></div>
              <div class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100"><p class="text-xs text-slate-500 font-bold uppercase">Average Score</p><p class="text-3xl font-extrabold text-emerald-600">${avg}%</p></div>
              <div class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100"><p class="text-xs text-slate-500 font-bold uppercase">Best Score</p><p class="text-3xl font-extrabold text-amber-600">${responses.length ? Math.max(...responses.map(r=>r.score)) : 'N/A'}%</p></div>
            </div>
            <div class="grid md:grid-cols-2 gap-6">
              <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5">
                <h4 class="font-extrabold mb-3">Score Trend</h4>
                <canvas id="perfChart" height="200"></canvas>
              </div>
              <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5">
                <h4 class="font-extrabold mb-3">Pass / Fail Distribution</h4>
                <canvas id="perfPie" height="200"></canvas>

              <table class="w-full text-sm">
                <thead class="bg-slate-800 text-white text-xs font-bold uppercase"><tr><th class="text-left px-5 py-4">Quiz</th><th>Score</th><th>Date</th></tr></thead>
                <tbody class="divide-y divide-slate-100">
                  ${responses.map(r=>{
                    const q = quizzes.find(qq=>qq.id===r.quiz_id);
                    return `<tr><td class="px-5 py-3 font-medium">${q?.title||'Quiz'}</td><td class="px-5 py-3 font-extrabold ${r.score>=60?'text-emerald-600':'text-rose-600'}">${r.score}%</td><td class="px-5 py-3 text-xs text-slate-400">${new Date(r.submitted_at).toLocaleDateString()}</td></tr>`;

        function sendTestToClass(e) {
            e.preventDefault();

            const students = getDB('users').filter(u => u.role === 'student' && (className === 'All' || u.class === className));
            const assignments = getDB('responses') || [];
            let count = 0;
            students.forEach(s => {

                        student_id: s.id,

                        status: 'assigned',
                        answers: [],
                        score: null,
                        submitted_at: null
                    });
                    count++;
                }
            });
            setDB('responses', assignments);
            alert('Quiz sent to ' + count + ' student(s) in ' + className);
        }

        /* ---- Method 1: Generate from text with AI ---- */
        async function handleTextGeneration() {
            const text = document.getElementById('genTextArea').value.trim();
            const count = parseInt(document.getElementById('genCount').value) || 5;
            const year = document.getElementById('genYear1').value;
            const section = document.getElementById('genSection1').value;
            const topic = document.getElementById('genTopic').value.trim() || section;
            const useAI = document.getElementById('useAIText').checked;
            const key = localStorage.getItem(K.api_key) || document.getElementById('apiKeyText').value.trim();

            if (!text) { alert('Please enter text to generate questions from.'); return; }
            if (!year || !section) { alert('Please select Year and Section.'); return; }

            let generated = [];

            if (useAI && key && key.startsWith('sk-')) {
                try {
                    const prompt =
                        `Generate ${count} multiple-choice questions based on the following text. Each question must have 4 options labeled A, B, C, D and a correct answer. Return as JSON array with fields: question_text, option_a, option_b, option_c, option_d, correct_index (0-based). Text: ${text.substring(0,3000)}`;
                    const resp = await fetch('https://api.openai.com/v1/chat/completions', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
                        body: JSON.stringify({
                            model: 'gpt-3.5-turbo',
                            messages: [{ role: 'system',
                                content: 'You are a biology exam question generator for Ghana SHS.' }, { role: 'user',
                                content: prompt }],
                            temperature: 0.7,
                            max_tokens: 2000
                        })
                    });
                    if (!resp.ok) throw new Error('API error: ' + resp.status);
                    const data = await resp.json();
                    const content = data.choices[0].message.content;
                    let jsonStr = content.replace(/```json/g, '').replace(/```/g, '').trim();
                    const parsed = JSON.parse(jsonStr);
                    if (Array.isArray(parsed)) generated = parsed;
                    else if (parsed.questions) generated = parsed.questions;
                } catch (err) {
                    alert('AI generation failed: ' + err.message + '. Falling back to mock generation.');
                    generated = mockGenerate(text, count);
                }
            } else {
                // Mock generation
                if (useAI && !key) alert('No API key found. Using mock generation.');
                generated = mockGenerate(text, count);
            }

            // Save to bank
            const bank = getDB('questions');
            let saved = 0;
            generated.forEach(q => {
                if (q.question_text && q.option_a && q.option_b && q.option_c && q.option_d) {
                    const correctIdx = q.correct_index !== undefined ? q.correct_index : 0;
                    bank.push({
                        id: randId(),
                        year: year,
                        section: section,
                        topic: topic || section,
                        dok: 'DoK 2',
                        question_text: q.question_text,
                        option_a: q.option_a,
                        option_b: q.option_b,
                        option_c: q.option_c,
                        option_d: q.option_d,
                        correct_index: correctIdx,
                        created_by: currentUser()?.id || 2,
                        created_at: new Date().toISOString()
                    });
                    saved++;
                }
            });
            setDB('questions', bank);
            alert('Generated and saved ' + saved + ' questions to the bank.');
            setView('bank');
        }

        function mockGenerate(text, count) {
            const sentences = text.split(/[.!?]+/).filter(s => s.trim().length > 15).slice(0, count);
            const results = [];
            const topics = ['cell biology', 'photosynthesis', 'ecology', 'genetics', 'human physiology'];
            for (let i = 0; i < Math.min(count, sentences.length); i++) {
                const s = sentences[i].trim();
                const topic = topics[i % topics.length];
                const correctIdx = Math.floor(Math.random() * 4);
                const opts = [
                    s.substring(0, 40) + ' (correct)',
                    s.substring(5, 45) + ' (distractor A)',
                    s.substring(10, 50) + ' (distractor B)',
                    s.substring(15, 55) + ' (distractor C)'
                ];
                // Shuffle options
                const shuffled = [...opts];
                for (let j = shuffled.length - 1; j > 0; j--) {
                    const k = Math.floor(Math.random() * (j + 1));
                    [shuffled[j], shuffled[k]] = [shuffled[k], shuffled[j]];
                }
                const correctText = opts[correctIdx];
                const newCorrectIdx = shuffled.indexOf(correctText);
                results.push({
                    question_text: 'Based on the text: "' + s.substring(0, 60) + '" — what is the key concept?',
                    option_a: shuffled[0],
                    option_b: shuffled[1],
                    option_c: shuffled[2],
                    option_d: shuffled[3],
                    correct_index: newCorrectIdx >= 0 ? newCorrectIdx : 0
                });
            }
            return results;
        }

        /* ---- Method 2: Import MCQs from file with AI for missing answers ---- */
        function handleMCQImport() {
            const input = document.getElementById('mcqFile');
            if (!input.files.length) { alert('Select a file'); return; }
            const file = input.files[0];
            const year = document.getElementById('importYear').value;
            const section = document.getElementById('importSection').value;
            if (!year || !section) { alert('Please select Year and Section.'); return; }

            if (file.name.endsWith('.pdf')) {
                const reader = new FileReader();
                reader.onload = async (e) => {
                    try {
                        const pdf = await pdfjsLib.getDocument({ data: new Uint8Array(e.target.result) }).promise;
                        let text = '';
                        for (let i = 1; i <= Math.min(pdf.numPages, 12); i++) {
                            const page = await pdf.getPage(i);
                            const content = await page.getTextContent();
                            text += content.items.map(s => s.str).join(' ') + '\n';
                        }
                        parseAndSaveMCQs(text, year, section);
                    } catch (err) { alert('PDF parse error: ' + err.message); }
                };
                reader.readAsArrayBuffer(file);
            } else if (file.name.endsWith('.txt')) {
                const r = new FileReader();
                r.onload = e => parseAndSaveMCQs(e.target.result, year, section);
                r.readAsText(file);
            } else if (file.name.endsWith('.docx')) {
                if (typeof mammoth === 'undefined') { alert('DOCX parser unavailable. Use PDF or TXT.'); return; }
                const r = new FileReader();
                r.onload = async (e) => {
                    try {
                        const result = await mammoth.extractRawText({ arrayBuffer: e.target.result });
                        parseAndSaveMCQs(result.value, year, section);
                    } catch (err) { alert('DOCX parse error: ' + err.message); }
                };
                r.readAsArrayBuffer(file);
            } else {
                alert('Unsupported file format. Use PDF, DOCX, or TXT.');
            }
        }

        async function parseAndSaveMCQs(text, year, section) {
            const lines = text.split(/\n/);
            const bank = getDB('questions');
            let currentQ = null;
            let options = [];
            let qTexts = [];
            let optionSets = [];
            let correctAnswers = [];

            // First pass: extract Q, options, and answers
            for (const line of lines) {
                const qMatch = line.match(/^(?:Q|Question)[:.]?\s*(.+)/i);
                const aMatch = line.match(/^A[.\)]\s*(.+)/i);
                const bMatch = line.match(/^B[.\)]\s*(.+)/i);
                const cMatch = line.match(/^C[.\)]\s*(.+)/i);
                const dMatch = line.match(/^D[.\)]\s*(.+)/i);
                const ansMatch = line.match(/Answer[:.]\s*([A-D])/i);

                if (qMatch) {
                    if (currentQ && options.length >= 2) {
                        qTexts.push(currentQ);
                        optionSets.push([...options]);
                        correctAnswers.push(null);
                    }
                    currentQ = qMatch[1].trim();
                    options = [];
                }
                if (aMatch) { options[0] = aMatch[1].trim(); }
                if (bMatch) { options[1] = bMatch[1].trim(); }
                if (cMatch) { options[2] = cMatch[2]?.trim?.() || cMatch[2]; }
                if (dMatch) { options[3] = dMatch[3]?.trim?.() || dMatch[3]; }
                if (ansMatch) {
                    const label = ansMatch[1].toUpperCase();
                    const idx = ['A', 'B', 'C', 'D'].indexOf(label);
                    if (idx >= 0) correctAnswers[correctAnswers.length - 1] = idx;
                }
            }
            if (currentQ && options.length >= 2) {
                qTexts.push(currentQ);
                optionSets.push([...options]);
                correctAnswers.push(null);
            }

            // Use AI to fill missing correct answers
            const key = localStorage.getItem(K.api_key) || document.getElementById('apiKeyImport')?.value.trim() || '';
            let saved = 0;

            for (let i = 0; i < qTexts.length; i++) {
                const qText = qTexts[i];
                const opts = optionSets[i];
                if (!qText || opts.length < 2) continue;

                let correctIdx = correctAnswers[i];
                if (correctIdx === null || correctIdx === undefined || correctIdx < 0 || correctIdx >= opts.length) {
                    // Use AI to determine correct answer
                    if (key && key.startsWith('sk-')) {
                        try {
                            const prompt =
                                `For the following multiple-choice question, determine the correct answer. Return ONLY the letter (A, B, C, or D).\n\nQuestion: ${qText}\nA. ${opts[0]||''}\nB. ${opts[1]||''}\nC. ${opts[2]||''}\nD. ${opts[3]||''}`;
                            const resp = await fetch('https://api.openai.com/v1/chat/completions', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json',
                                    'Authorization': `Bearer ${key}` },
                                body: JSON.stringify({
                                    model: 'gpt-3.5-turbo',
                                    messages: [{ role: 'system',
                                        content: 'You are a biology exam assistant. Return only the letter.' },
                                    { role: 'user', content: prompt }],
                                    temperature: 0.3,
                                    max_tokens: 10
                                })
                            });
                            if (resp.ok) {
                                const data = await resp.json();
                                const ans = data.choices[0].message.content.trim().toUpperCase();
                                const idx = ['A', 'B', 'C', 'D'].indexOf(ans);
                                if (idx >= 0) correctIdx = idx;
                            }
                        } catch (err) { /* fallback to random */ }
                    }
                    // If still null, random
                    if (correctIdx === null || correctIdx === undefined || correctIdx < 0 || correctIdx >= opts
                        .length) {
                        correctIdx = Math.floor(Math.random() * Math.min(opts.length, 4));
                    }
                }

                // Ensure correctIdx is within bounds
                const maxIdx = Math.min(opts.length, 4) - 1;
                if (correctIdx > maxIdx) correctIdx = maxIdx;
                if (correctIdx < 0) correctIdx = 0;

                // Scatter correct answer randomly — shuffle options
                let shuffledOpts = [...opts];
                const correctText = opts[correctIdx] || opts[0];
                for (let j = shuffledOpts.length - 1; j > 0; j--) {
                    const k = Math.floor(Math.random() * (j + 1));
                    [shuffledOpts[j], shuffledOpts[k]] = [shuffledOpts[k], shuffledOpts[j]];
                }
                const newCorrectIdx = shuffledOpts.indexOf(correctText);
                const finalCorrectIdx = newCorrectIdx >= 0 ? newCorrectIdx : 0;

                const q = {
                    id: randId(),
                    year: year || 'Year 1',
                    section: section || 'General',
                    topic: section || 'General',
                    dok: 'DoK 2',
                    question_text: qText,
                    option_a: shuffledOpts[0] || 'Option A',
                    option_b: shuffledOpts[1] || 'Option B',
                    option_c: shuffledOpts[2] || 'Option C',
                    option_d: shuffledOpts[3] || 'Option D',
                    correct_index: finalCorrectIdx,
                    created_by: currentUser()?.id || 2,
                    created_at: new Date().toISOString()
                };
                bank.push(q);
                saved++;
            }

            setDB('questions', bank);
            alert('Imported ' + saved + ' questions. Correct answers have been assigned (AI used where missing).');
            setView('bank');
        }

        function createQuiz(e) {

            const count = parseInt(document.getElementById('quizCount').value);

            const deadline = document.getElementById('quizDeadline').value;
            const shuffle = document.getElementById('shuffle').checked;
            const allowReview = document.getElementById('allowReview').checked;
            if (!year || !content || count < 5 || count > 50) { alert('Select Year, Section, and valid count (5-50)');

            let bank = getDB('questions');
            let filtered = bank.filter(q => q.year === year && q.section === content);
            if (diff !== 'all') filtered = filtered.filter(q => q.dok?.toLowerCase().includes(diff.toLowerCase()));

            let selected = [...filtered].sort(() => 0.5 - Math.random()).slice(0, Math.min(count, filtered.length));
            if (selected.length === 0) { alert('Not enough questions. Generate more in the bank first.'); return; }

            // Shuffle options and randomize correct answer position
            selected = selected.map(q => {

                    { label: 'C', text: q.option_c },
                    { label: 'D', text: q.option_d }
                ];
                const correctText = opts[q.correct_index]?.text || opts[0].text;
                // Shuffle options
                const shuffled = shuffle ? [...opts].sort(() => 0.5 - Math.random()) : [...opts];
                const newCorrectIdx = shuffled.findIndex(o => o.text === correctText);
                return {
                    ...q,
                    shuffled_options: shuffled,
                    correct_index: newCorrectIdx >= 0 ? newCorrectIdx : 0
                };
            });

            const quizId = randId();

            });

            const links = getDB('quiz_links');

            }));

            <div class="flex items-center justify-between">
              <h2 class="text-2xl font-extrabold">Assigned Quizzes</h2>
              <button onclick="setView('student')" class="bg-slate-200 text-slate-700 px-4 py-2 rounded-xl font-bold hover:bg-slate-300 text-sm">Back</button>
            </div>
            <div class="grid md:grid-cols-2 gap-4">
              ${assignments.map(a=>{
                const q=getDB('quizzes').find(qu=>qu.id===a.quiz_id);
                return `
                <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-100">
                  <h3 class="font-extrabold text-lg mb-2">${q?.title||'Quiz'}</h3>
                  <p class="text-xs text-slate-500 mb-4">Year: ${q?.year} • ${q?.content}</p>
                  <a href="#" onclick="startQuizSession(${a.quiz_id},${a.id})" class="inline-block bg-gradient-to-r from-violet-600 to-violet-800 text-white px-5 py-2 rounded-xl font-extrabold hover:brightness-110">Start Quiz</a>
                </div>`;
              }).join('')||'<p class="text-slate-400">No assigned quizzes.</p>'}
            </div>
          </div>`;
        }

        function startQuizSession(quizId, assignId) {
            const links = getDB('quiz_links').filter(l => l.quiz_id === quizId);
            const bank = getDB('questions');
            const questions = links.map(l => {
                const q = bank.find(b => b.id === l.question_id);
                if (!q) return null;
                const shuffled = q.shuffled_options || [
                    { label: 'A', text: q.option_a },
                    { label: 'B', text: q.option_b },
                    { label: 'C', text: q.option_c },
                    { label: 'D', text: q.option_d }
                ];
                return { ...q, shuffled_options: shuffled, correct_index: q.correct_index || 0 };
            }).filter(Boolean);
            sessionStorage.setItem('quiz_session', JSON.stringify({ quizId, assignId, questions, answers: [] }));
            setView('quiz_session');
        }

        function buildQuizSession() {
            const s = JSON.parse(sessionStorage.getItem('quiz_session') || '{}');
            const qs = s.questions || [];
            if (!qs.length) return `<div class="text-center py-20 text-slate-400">No questions. <a href="#" onclick="setView('student')" class="text-violet-700 font-extrabold">Back</a></div>`;
            return `
          <div class="max-w-3xl mx-auto bg-white rounded-3xl shadow-xl border border-slate-100 p-6 fade-in">
            <div class="flex items-center justify-between mb-6">
              <h2 class="text-2xl font-extrabold">Quiz Session</h2>
              <button onclick="setView('student')" class="bg-slate-200 text-slate-700 px-4 py-2 rounded-xl font-bold hover:bg-slate-300 text-sm">Exit</button>
            </div>
            <form onsubmit="submitQuizSession(event)" class="space-y-6">
              ${qs.map((q,i)=>`
              <div class="p-5 rounded-2xl bg-slate-50 border border-slate-100">
                <div class="flex gap-3 mb-3">
                  <span class="w-8 h-8 flex-none rounded-full bg-gradient-to-br from-violet-600 to-violet-800 text-white flex items-center justify-center font-extrabold text-sm">${i+1}</span>
                  <h3 class="font-bold text-slate-800 leading-snug">${q.question_text}</h3>
                </div>
                <div class="ml-11 space-y-2">
                  ${(q.shuffled_options||[]).map(opt=>`
                  <label class="flex items-center gap-3 p-2 rounded-lg hover:bg-white hover:shadow-sm transition cursor-pointer">
                    <input type="radio" name="q${q.id}" value="${opt.label}" class="w-4 h-4 text-violet-700" required>
                    <span class="text-sm font-medium">${opt.label}. ${opt.text}</span>
                  </label>`).join('')}
                </div>
              </div>`).join('')}
              <button type="submit" class="bg-gradient-to-r from-violet-600 to-violet-800 text-white px-8 py-3 rounded-xl font-extrabold shadow-lg hover:brightness-110">Submit Quiz</button>
            </form>
          </div>`;
        }

        function submitQuizSession(e) {
            e.preventDefault();
            const s = JSON.parse(sessionStorage.getItem('quiz_session') || '{}');
            const form = new FormData(document.querySelector('form'));
            let score = 0;
            const answers = [];
            s.questions.forEach(q => {
                const sel = form.get('q' + q.id);
                answers.push({ question_id: q.id, selected: sel });
                const opts = q.shuffled_options || [];
                const correctLabel = opts[q.correct_index]?.label;
                if (sel === correctLabel) score++;
            });
            const assignments = getDB('responses');
            const a = assignments.find(x => x.id === s.assignId);
            if (a) {
                a.status = 'submitted';
                a.submitted_at = new Date().toISOString();
                a.score = Math.round((score / s.questions.length) * 100);
                a.answers = answers;
            }
            setDB('responses', assignments);
            sessionStorage.removeItem('quiz_session');
            alert('Quiz submitted! Score: ' + (a?.score || 0) + '%');
            setView('student');
        }

        /* ===========================================================
           STUDENT DASHBOARD
           =========================================================== */
        function buildStudent() {
            const user = currentUser();
            const assignments = getDB('responses').filter(a => a.student_id === user.id);
            const completed = assignments.filter(a => a.status === 'submitted');
            const avg = completed.length ? (completed.reduce((s, a) => s + (a.score || 0), 0) / completed.length).toFixed(1) :
            'N/A';
            const unread = getDB('messages').filter(m => (m.to === 'all' || m.to === 'students' || m.to === user.email) && !
                m.read).length;

            return `
          <div class="space-y-6 fade-in">
            <div class="bg-gradient-to-r from-emerald-600 to-emerald-900 rounded-3xl p-8 text-white shadow-2xl relative overflow-hidden">
              <img src="https://images.unsplash.com/photo-1503676260728-1c00da094a0b?w=800&q=80&auto=format&fit=crop" class="absolute inset-0 w-full h-full object-cover opacity-20 mix-blend-overlay" alt="Student">
              <div class="relative z-10 flex items-center justify-between">
                <div>
                  <h2 class="text-3xl font-extrabold mb-1">Student Dashboard</h2>
                  <p class="text-emerald-100">Complete quizzes and track your performance.</p>
                </div>
                <button onclick="setView('notifications')" class="bg-white/20 hover:bg-white/30 text-white px-4 py-2 rounded-xl font-bold text-sm flex items-center gap-2">
                  <i class="fa-regular fa-bell"></i> ${unread > 0 ? unread : ''}
                </button>
              </div>
            </div>

            <div class="grid md:grid-cols-3 gap-4">
              <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-100"><p class="text-xs text-slate-500 font-bold uppercase">Assigned</p><p class="text-3xl font-extrabold text-violet-700">${assignments.filter(a=>a.status==='assigned').length}</p></div>
              <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-100"><p class="text-xs text-slate-500 font-bold uppercase">Completed</p><p class="text-3xl font-extrabold text-emerald-600">${completed.length}</p></div>
              <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-100"><p class="text-xs text-slate-500 font-bold uppercase">Average</p><p class="text-3xl font-extrabold text-amber-600">${avg}%</p></div>
            </div>

            <!-- Student action cards -->
            <div class="grid sm:grid-cols-2 lg:grid-cols-4 gap-4">
              <a href="#" onclick="setView('take_quiz')" class="group bg-white rounded-2xl p-5 shadow-sm border border-slate-100 hover:shadow-xl hover:-translate-y-1 transition">
                <i class="fa-solid fa-pencil text-3xl text-violet-600 mb-2"></i>
                <h3 class="font-extrabold text-sm">Take Quiz</h3>
                <p class="text-xs text-slate-500">Start an assigned quiz.</p>
              </a>
              <a href="#" onclick="setView('progress_report')" class="group bg-white rounded-2xl p-5 shadow-sm border border-slate-100 hover:shadow-xl hover:-translate-y-1 transition">
                <i class="fa-solid fa-chart-line text-3xl text-emerald-600 mb-2"></i>
                <h3 class="font-extrabold text-sm">My Performance</h3>
                <p class="text-xs text-slate-500">View detailed report.</p>
              </a>
              <a href="#" onclick="setView('biology_notes')" class="group bg-white rounded-2xl p-5 shadow-sm border border-slate-100 hover:shadow-xl hover:-translate-y-1 transition">
                <i class="fa-solid fa-note-sticky text-3xl text-amber-600 mb-2"></i>
                <h3 class="font-extrabold text-sm">Biology Notes</h3>
                <p class="text-xs text-slate-500">Notes posted by teachers.</p>
              </a>
              <a href="#" onclick="setView('pdf_library')" class="group bg-white rounded-2xl p-5 shadow-sm border border-slate-100 hover:shadow-xl hover:-translate-y-1 transition">
                <i class="fa-solid fa-book text-3xl text-blue-600 mb-2"></i>
                <h3 class="font-extrabold text-sm">PDF Library</h3>
                <p class="text-xs text-slate-500">Textbooks &amp; references.</p>
              </a>
            </div>

            <div class="grid md:grid-cols-2 gap-6">
              <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6">
                <h3 class="font-extrabold mb-4">Assigned Quizzes</h3>
                <div class="space-y-3">
                  ${assignments.filter(a=>a.status==='assigned').map(a=>{
                    const q=getDB('quizzes').find(qu=>qu.id===a.quiz_id);
                    return `
                    <div class="p-4 rounded-xl bg-slate-50 border border-slate-100 flex justify-between items-center">
                      <div>
                        <h4 class="font-bold">${q?.title||'Quiz'}</h4>
                        <p class="text-xs text-slate-400">${q?.year} • ${q?.content}</p>
                      </div>
                      <a href="#" onclick="startQuizSession(${a.quiz_id},${a.id})" class="bg-emerald-600 text-white text-xs font-extrabold px-3 py-2 rounded-lg hover:bg-emerald-800">Start</a>
                    </div>`;
                  }).join('')||'<p class="text-sm text-slate-400">No assigned quizzes.</p>'}
                </div>
              </div>
              <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6">
                <h3 class="font-extrabold mb-4">Recent Results</h3>
                <div class="space-y-3">
                  ${completed.slice(-5).reverse().map(a=>{
                    const q=getDB('quizzes').find(qu=>qu.id===a.quiz_id);
                    return `
                    <div class="p-4 rounded-xl bg-slate-50 border border-slate-100 flex justify-between items-center">
                      <div>
                        <h4 class="font-bold text-sm">${q?.title||'Quiz'}</h4>
                        <p class="text-xs text-slate-400">${new Date(a.submitted_at).toLocaleDateString()}</p>
                      </div>
                      <span class="font-extrabold ${a.score>=60?'text-emerald-600':'text-rose-600'}">${a.score}%</span>
                    </div>`;
                  }).join('')||'<p class="text-sm text-slate-400">No completed quizzes yet.</p>'}
                </div>
              </div>
            </div>
          </div>`;
        }

        /* ===========================================================
           PROGRESS REPORT
           =========================================================== */
        function buildProgressReport() {
            const user = currentUser();
            const responses = getDB('responses').filter(r => r.student_id === user.id && r.status === 'submitted');
            const avg = responses.length ? (responses.reduce((s, r) => s + r.score, 0) / responses.length).toFixed(1) : 0;

            setTimeout(() => {
                const ctx = document.getElementById('reportChart');
                if (!ctx) return;
                if (window.myReportChart) window.myReportChart.destroy();
                window.myReportChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: responses.map((r, i) => 'Quiz ' + (i + 1)),
                        datasets: [{ label: 'Score %', data: responses.map(r => r.score), borderColor: '#0284c7',
                            backgroundColor: 'rgba(2,132,199,0.1)', fill: true, tension: 0.4,
                            pointBackgroundColor: '#0284c7' }]
                    },
                    options: { scales: { y: { beginAtZero: true, max: 100 } }, plugins: { legend: { display: false } } }
                });
            }, 200);

            return `
          <div class="max-w-4xl mx-auto space-y-6 fade-in">
            <div class="flex items-center justify-between">
              <h2 class="text-2xl font-extrabold">My Performance Report</h2>
              <button onclick="setView('student')" class="bg-slate-200 text-slate-700 px-4 py-2 rounded-xl font-bold hover:bg-slate-300 text-sm">Back</button>
            </div>
            <div class="bg-white rounded-3xl shadow-xl border border-slate-100 overflow-hidden">
              <div class="bg-gradient-to-r from-violet-700 to-violet-900 p-6 text-white flex justify-between items-end">
                <div>
                  <h3 class="text-2xl font-extrabold">${user?.name}</h3>
                  <p class="text-violet-200 text-sm">${user?.email} • Class: ${user?.class}</p>
                </div>
                <div class="text-right">
                  <p class="text-xs text-violet-200 uppercase tracking-wider">Overall Average</p>
                  <p class="text-4xl font-extrabold">${avg}%</p>
                </div>
              </div>
              <div class="p-6">
                <h4 class="font-extrabold mb-3">Performance Trend</h4>
                <canvas id="reportChart" height="180"></canvas>
                <table class="w-full text-sm mt-6">
                  <thead class="bg-slate-800 text-white text-xs font-bold uppercase"><tr><th class="text-left px-4 py-3">Quiz</th><th>Score</th><th>Date</th></tr></thead>
                  <tbody class="divide-y divide-slate-100">
                    ${responses.map(r=>{
                      const q=getDB('quizzes').find(qq=>qq.id===r.quiz_id);
                      return `<tr><td class="px-4 py-3 font-medium">${q?.title||'Quiz'}</td><td class="px-4 py-3 font-extrabold ${r.score>=60?'text-emerald-600':'text-rose-600'}">${r.score}%</td><td class="px-4 py-3 text-xs text-slate-400">${new Date(r.submitted_at).toLocaleDateString()}</td></tr>`;
                    }).join('')||'<tr><td colspan="3" class="px-4 py-4 text-slate-400">No completed quizzes.</td></tr>'}
                  </tbody>
                </table>
                <div class="mt-6 pt-4 border-t border-slate-100 flex gap-3">
                  <button onclick="window.print()" class="bg-gradient-to-r from-violet-600 to-violet-800 text-white px-5 py-2.5 rounded-xl font-extrabold hover:brightness-110">Print Report</button>
                  <button onclick="setView('student')" class="px-5 py-2.5 rounded-xl border border-slate-200 text-slate-600 font-extrabold hover:bg-slate-50">Back</button>
                </div>
              </div>
            </div>
          </div>`;
        }

        /* ===========================================================
           EVENT BINDING
           =========================================================== */
        function bindEvents() {
            // Student chart on dashboard
            if (view === 'student') {
                const user = currentUser();
                if (user) {
                    const responses = getDB('responses').filter(r => r.student_id === user.id && r.status === 'submitted');
                    const ctx = document.getElementById('studentChart');
                    if (ctx && responses.length) {
                        setTimeout(() => {
                            new Chart(ctx, {
                                type: 'bar',
                                data: {
                                    labels: responses.map((r, i) => 'Q' + (i + 1)),
                                    datasets: [{ label: 'Score %', data: responses.map(r => r.score),
                                        backgroundColor: '#10b981', borderRadius: 6 }]
                                },
                                options: { scales: { y: { beginAtZero: true, max: 100 } },
                                    plugins: { legend: { display: false } } }
                            });
                        }, 100);
                    }
                }
            }
            // Teacher chart
            if (view === 'teacher') {
                const ctx = document.getElementById('teacherChart');
                if (ctx) {
                    const quizzes = getDB('quizzes').filter(q => q.created_by === currentUser()?.id);
                    const data = quizzes.map(q => {
                        const res = getDB('responses').filter(r => r.quiz_id === q.id && r.score !== null);
                        return res.length ? (res.reduce((s, r) => s + r.score, 0) / res.length) : 0;
                    });
                    setTimeout(() => {
                        new Chart(ctx, {
                            type: 'bar',
                            data: {
                                labels: quizzes.map(q => q.title.substring(0, 18)),
                                datasets: [{ label: 'Avg Score', data: data, backgroundColor: '#8b5cf6',
                                    borderRadius: 6 }]
                            },
                            options: { scales: { y: { beginAtZero: true, max: 100 } },
                                plugins: { legend: { display: false } } }
                        });
                    }, 100);
                }
            }
            // performance detail charts
            if (view === 'student_performance_detail') {
                // handled inside buildStudentPerformanceDetail with setTimeout
            }
        }

        /* ===========================================================
           INIT
           =========================================================== */
        document.addEventListener('DOMContentLoaded', () => {
            seed();
            render();
        });
    </script>
</body>
</html>
