<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ghana SHS Biology Exam System — Classroom Pro</title>
    <script src="https://cdn.tailwindcss.com">
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js">
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js">
    </script>
    <script src="https://unpkg.com/mammoth@1.6.0/mammoth.browser.min.js">
    </script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js">
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js">
    </script>
    <style>
        /* ===== BASE ===== */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Playfair+Display:wght@700&display=swap');

        :root {
            --bg-body: #f0f4ff;
            --bg-card: #ffffff;
            --bg-card-hover: #f8faff;
            --bg-nav: rgba(255, 255, 255, 0.92);
            --text-primary: #0f172a;
            --text-secondary: #334155;
            --border-color: #e2e8f0;
            --shadow: 0 1px 3px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 40px rgba(0, 0, 0, 0.08);
            --transition: 0.3s ease;
            --status-color: #10b981;
            --status-glow: rgba(16, 185, 129, 0.5);
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg-body);
            color: var(--text-primary);
            font-size: 1.1rem;
            transition: background 0.3s, color 0.3s;
        }

        body.dark-mode {
            --bg-body: #0f172a;
            --bg-card: #1e293b;
            --bg-card-hover: #2d3a4f;
            --bg-nav: rgba(30, 41, 59, 0.92);
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --border-color: #334155;
            --shadow: 0 1px 3px rgba(0, 0, 0, 0.3);
            --shadow-lg: 0 10px 40px rgba(0, 0, 0, 0.5);
            --status-color: #34d399;
            --status-glow: rgba(52, 211, 153, 0.5);
        }

        body.dark-mode .glass {
            background: var(--bg-nav);
            border-color: var(--border-color);
        }
        body.dark-mode .bg-white {
            background: var(--bg-card) !important;
            color: var(--text-primary) !important;
        }
        body.dark-mode .bg-slate-50 {
            background: #1a2538 !important;
        }
        body.dark-mode .bg-slate-100 {
            background: #26334a !important;
        }
        body.dark-mode .text-slate-500,
        body.dark-mode .text-slate-400,
        body.dark-mode .text-slate-600,
        body.dark-mode .text-slate-700 {
            color: var(--text-secondary) !important;
        }
        body.dark-mode .border-slate-100,
        body.dark-mode .border-slate-200 {
            border-color: var(--border-color) !important;
        }
        body.dark-mode .bg-gradient-to-r {
            --tw-gradient-from: #1e293b;
            --tw-gradient-to: #0f172a;
        }
        body.dark-mode .hero-img {
            opacity: 0.6;
        }

        /* ===== GLASS ===== */
        .glass {
            background: var(--bg-nav);
            backdrop-filter: blur(14px);
            border: 1px solid var(--border-color);
            transition: background 0.3s, border-color 0.3s;
        }

        .fade-in {
            animation: fadeIn .35s ease-out both;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hero-img {
            background-image: url('https://images.unsplash.com/photo-1576086213369-97a306d36557?q=80&w=1600&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
        }

        @media print {
            .no-print {
                display: none !important;
            }
            .print-area {
                box-shadow: none !important;
                border: 1px solid #cbd5e1;
            }
        }

        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 8px;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 8px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
        body.dark-mode ::-webkit-scrollbar-track {
            background: #1e293b;
        }
        body.dark-mode ::-webkit-scrollbar-thumb {
            background: #475569;
        }

        .nav-link {
            transition: all 0.2s;
        }
        .nav-link:hover {
            transform: translateY(-1px);
        }

        .logo-link {
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .logo-link:hover .logo-text {
            color: #7c3aed;
        }
        body.dark-mode .logo-link:hover .logo-text {
            color: #a78bfa;
        }

        .logo-text {
            font-size: 1.6rem;
            line-height: 1.2;
            transition: color 0.2s;
        }
        .logo-sub {
            font-size: 0.65rem;
            letter-spacing: 0.15em;
        }
        @media (min-width: 640px) {
            .logo-text {
                font-size: 1.9rem;
            }
            .logo-sub {
                font-size: 0.75rem;
            }
        }

        .nav-text {
            font-size: 1.05rem;
            font-weight: 700;
        }
        .nav-text-sm {
            font-size: 0.95rem;
            font-weight: 700;
        }
        @media (min-width: 640px) {
            .nav-text {
                font-size: 1.15rem;
            }
            .nav-text-sm {
                font-size: 1rem;
            }
        }

        .nav-admin:hover {
            background-color: #fecdd3 !important;
            color: #9f1239 !important;
            border-radius: 8px;
        }
        .nav-teacher:hover {
            background-color: #ddd6fe !important;
            color: #5b21b6 !important;
            border-radius: 8px;
        }
        .nav-student:hover {
            background-color: #a7f3d0 !important;
            color: #065f46 !important;
            border-radius: 8px;
        }
        .nav-logout:hover {
            background-color: #fecaca !important;
            color: #991b1b !important;
            border-radius: 8px;
        }
        .nav-notif:hover {
            background-color: #fef3c7 !important;
            color: #92400e !important;
            border-radius: 8px;
        }
        .nav-pw:hover {
            background-color: #e0e7ff !important;
            color: #3730a3 !important;
            border-radius: 8px;
        }
        .nav-night:hover {
            background-color: #dbeafe !important;
            color: #1e40af !important;
            border-radius: 8px;
        }

        body.dark-mode .nav-admin:hover {
            background-color: #4c1d2b !important;
            color: #fecdd3 !important;
        }
        body.dark-mode .nav-teacher:hover {
            background-color: #2d1b4a !important;
            color: #ddd6fe !important;
        }
        body.dark-mode .nav-student:hover {
            background-color: #1a3a2a !important;
            color: #a7f3d0 !important;
        }
        body.dark-mode .nav-logout:hover {
            background-color: #4c1a1a !important;
            color: #fecaca !important;
        }
        body.dark-mode .nav-notif:hover {
            background-color: #4c3a1a !important;
            color: #fef3c7 !important;
        }
        body.dark-mode .nav-pw:hover {
            background-color: #1a2a4a !important;
            color: #e0e7ff !important;
        }
        body.dark-mode .nav-night:hover {
            background-color: #1a3a5a !important;
            color: #93c5fd !important;
        }

        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 16px 24px;
            border-radius: 16px;
            background: #0f172a;
            color: #fff;
            font-weight: 600;
            font-size: 0.95rem;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.25);
            transform: translateY(80px);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
            z-index: 9999;
            max-width: 420px;
            pointer-events: none;
        }
        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }
        .toast.success {
            background: #0b7e4b;
        }
        .toast.error {
            background: #b91c1c;
        }
        .toast.warning {
            background: #b45309;
        }
        .toast.info {
            background: #1e40af;
        }
        body.dark-mode .toast {
            background: #1e293b;
            color: #f1f5f9;
        }
        body.dark-mode .toast.success {
            background: #065f46;
        }
        body.dark-mode .toast.error {
            background: #7f1d1d;
        }
        body.dark-mode .toast.warning {
            background: #78350f;
        }
        body.dark-mode .toast.info {
            background: #1e3a5f;
        }

        .btn-backup {
            transition: all 0.2s ease;
        }
        .btn-backup:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        }
        .btn-backup:active {
            transform: scale(0.97);
        }

        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
        }
        .file-input-wrapper input[type="file"] {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        .dok-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 8px;
            border-radius: 4px;
            outline: none;
            transition: opacity 0.2s;
        }
        .dok-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid white;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }
        .dok-slider::-moz-range-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid white;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }
        .dok-slider.dok1 {
            background: linear-gradient(to right, #bfdbfe, #3b82f6);
        }
        .dok-slider.dok1::-webkit-slider-thumb {
            background: #2563eb;
        }
        .dok-slider.dok1::-moz-range-thumb {
            background: #2563eb;
        }
        .dok-slider.dok2 {
            background: linear-gradient(to right, #fde68a, #f59e0b);
        }
        .dok-slider.dok2::-webkit-slider-thumb {
            background: #d97706;
        }
        .dok-slider.dok2::-moz-range-thumb {
            background: #d97706;
        }
        .dok-slider.dok3 {
            background: linear-gradient(to right, #fca5a5, #ef4444);
        }
        .dok-slider.dok3::-webkit-slider-thumb {
            background: #dc2626;
        }
        .dok-slider.dok3::-moz-range-thumb {
            background: #dc2626;
        }

        .dok-card {
            border-radius: 12px;
            padding: 12px 16px;
            transition: all 0.2s;
        }
        .dok-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
        }
        .dok-card.dok1 {
            background: linear-gradient(135deg, #eff6ff, #dbeafe);
            border: 1px solid #93c5fd;
        }
        .dok-card.dok2 {
            background: linear-gradient(135deg, #fffbeb, #fef3c7);
            border: 1px solid #fcd34d;
        }
        .dok-card.dok3 {
            background: linear-gradient(135deg, #fef2f2, #fecaca);
            border: 1px solid #f87171;
        }
        .dok-label {
            font-weight: 800;
            font-size: 1.1rem;
        }
        .dok-label.dok1 {
            color: #1d4ed8;
        }
        .dok-label.dok2 {
            color: #b45309;
        }
        .dok-label.dok3 {
            color: #b91c1c;
        }

        .archived-quiz {
            opacity: 0.85;
            border-left: 4px solid #8b5cf6;
        }
        .archived-quiz .quiz-title {
            text-decoration: line-through;
            color: #6b7280;
        }
        body.dark-mode .archived-quiz .quiz-title {
            color: #94a3b8;
        }

        .qbank-checkbox {
            width: 18px;
            height: 18px;
            accent-color: #7c3aed;
            cursor: pointer;
        }

        .text-sm {
            font-size: 0.9rem !important;
        }
        .text-xs {
            font-size: 0.8rem !important;
        }
        .text-base {
            font-size: 1.1rem !important;
        }
        .text-lg {
            font-size: 1.25rem !important;
        }
        .text-xl {
            font-size: 1.4rem !important;
        }
        .text-2xl {
            font-size: 1.6rem !important;
        }
        .text-3xl {
            font-size: 1.9rem !important;
        }
        .text-4xl {
            font-size: 2.2rem !important;
        }
        .text-5xl {
            font-size: 2.6rem !important;
        }
        .text-6xl {
            font-size: 3.2rem !important;
        }

        body:not(.dark-mode) {
            background: #f0f4ff;
        }
        body:not(.dark-mode)::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(ellipse at 20% 50%, rgba(59, 130, 246, 0.05), transparent 70%),
                radial-gradient(ellipse at 80% 20%, rgba(168, 85, 247, 0.05), transparent 70%);
            pointer-events: none;
            z-index: -1;
        }

        .proctor-warning {
            background: #dc2626;
            color: #fff;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            animation: pulse-warning 2s infinite;
        }
        @keyframes pulse-warning {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.6;
            }
        }

        .api-status-dot {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 6px;
        }
        .api-status-dot.valid {
            background: #10b981;
        }
        .api-status-dot.invalid {
            background: #ef4444;
        }
        .api-status-dot.unknown {
            background: #f59e0b;
        }
        .api-status-dot.testing {
            background: #8b5cf6;
            animation: pulse-dot 0.8s infinite;
        }
        @keyframes pulse-dot {
            0%,
            100% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.4);
                opacity: 0.6;
            }
        }

        /* ===== STATUS INDICATOR ===== */
        .status-indicator {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: var(--text-secondary);
            padding: 4px 10px 4px 6px;
            border-radius: 20px;
            background: rgba(0, 0, 0, 0.04);
            transition: background 0.3s;
            cursor: default;
            user-select: none;
        }
        body.dark-mode .status-indicator {
            background: rgba(255, 255, 255, 0.06);
        }
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
            flex-shrink: 0;
            transition: background 0.3s, box-shadow 0.3s;
            background: var(--status-color);
            box-shadow: 0 0 8px var(--status-glow);
            animation: status-pulse 1.8s ease-in-out infinite;
        }
        .status-dot.loading {
            background: #f59e0b;
            box-shadow: 0 0 12px rgba(245, 158, 11, 0.7);
            animation: status-pulse-fast 0.8s ease-in-out infinite;
        }
        .status-dot.error {
            background: #ef4444;
            box-shadow: 0 0 12px rgba(239, 68, 68, 0.7);
            animation: status-pulse-fast 0.6s ease-in-out infinite;
        }
        .status-dot.idle {
            background: var(--status-color);
            box-shadow: 0 0 8px var(--status-glow);
            animation: status-pulse 1.8s ease-in-out infinite;
        }
        @keyframes status-pulse {
            0%,
            100% {
                transform: scale(1);
                opacity: 0.8;
            }
            50% {
                transform: scale(1.15);
                opacity: 1;
            }
        }
        @keyframes status-pulse-fast {
            0%,
            100% {
                transform: scale(1);
                opacity: 0.7;
            }
            50% {
                transform: scale(1.3);
                opacity: 1;
            }
        }
        .status-label {
            font-size: 0.6rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text-secondary);
            opacity: 0.7;
        }
        .status-label.loading {
            color: #f59e0b;
            opacity: 1;
        }
        .status-label.error {
            color: #ef4444;
            opacity: 1;
        }
        .status-label.idle {
            color: var(--text-secondary);
            opacity: 0.6;
        }

        /* ===== SEARCH BAR ===== */
        .search-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            background: var(--bg-card);
            border-radius: 60px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06), 0 1px 3px rgba(0, 0, 0, 0.04);
            border: 2px solid transparent;
            transition: border-color 0.3s, box-shadow 0.3s, transform 0.2s;
        }
        .search-wrapper:focus-within {
            border-color: #7c3aed;
            box-shadow: 0 8px 30px rgba(124, 58, 237, 0.15), 0 1px 3px rgba(0, 0, 0, 0.04);
            transform: scale(1.01);
        }
        body.dark-mode .search-wrapper {
            background: #1e293b;
            border-color: #334155;
        }
        body.dark-mode .search-wrapper:focus-within {
            border-color: #8b5cf6;
            box-shadow: 0 8px 30px rgba(139, 92, 246, 0.2);
        }
        .search-wrapper .search-icon {
            flex-shrink: 0;
            padding: 0 0 0 18px;
            color: #94a3b8;
            font-size: 1.1rem;
            transition: color 0.3s;
        }
        .search-wrapper:focus-within .search-icon {
            color: #7c3aed;
        }
        body.dark-mode .search-wrapper:focus-within .search-icon {
            color: #a78bfa;
        }
        .search-wrapper input {
            flex: 1;
            padding: 14px 16px;
            border: none;
            background: transparent;
            font-size: 1rem;
            font-weight: 500;
            color: var(--text-primary);
            outline: none;
            min-width: 0;
            font-family: 'Inter', system-ui, sans-serif;
        }
        .search-wrapper input::placeholder {
            color: #94a3b8;
            font-weight: 400;
            font-size: 0.95rem;
        }
        .search-wrapper .search-btn {
            flex-shrink: 0;
            margin: 4px 4px 4px 0;
            padding: 10px 22px;
            border: none;
            border-radius: 40px;
            background: linear-gradient(135deg, #7c3aed, #6d28d9);
            color: #fff;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
            font-family: 'Inter', system-ui, sans-serif;
        }
        .search-wrapper .search-btn:hover {
            transform: scale(1.04);
            box-shadow: 0 6px 20px rgba(124, 58, 237, 0.35);
        }
        .search-wrapper .search-btn:active {
            transform: scale(0.96);
        }
        .search-wrapper .search-btn i {
            font-size: 0.9rem;
        }
        body.dark-mode .search-wrapper .search-btn {
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
        }
        body.dark-mode .search-wrapper .search-btn:hover {
            box-shadow: 0 6px 20px rgba(139, 92, 246, 0.4);
        }
        .search-clear-btn {
            flex-shrink: 0;
            background: none;
            border: none;
            color: #94a3b8;
            padding: 6px 10px;
            cursor: pointer;
            font-size: 1rem;
            border-radius: 50%;
            transition: all 0.2s;
            display: none;
        }
        .search-clear-btn.visible {
            display: block;
        }
        .search-clear-btn:hover {
            color: #ef4444;
            background: rgba(239, 68, 68, 0.08);
        }
        body.dark-mode .search-clear-btn:hover {
            background: rgba(239, 68, 68, 0.15);
        }
        .search-results-meta {
            text-align: center;
            font-size: 0.9rem;
            color: var(--text-secondary);
            opacity: 0.7;
            padding: 4px 0 8px;
            font-weight: 500;
        }
        .search-results-meta strong {
            color: var(--text-primary);
            opacity: 0.9;
        }
        .student-card {
            transition: all 0.25s ease;
        }
        .student-card.search-hidden {
            display: none;
        }
        .student-card.search-match {
            animation: cardPop 0.35s ease-out both;
        }
        @keyframes cardPop {
            0% {
                opacity: 0;
                transform: scale(0.96);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }
        @media (max-width: 640px) {
            .search-wrapper {
                border-radius: 40px;
                max-width: 100%;
            }
            .search-wrapper input {
                padding: 12px 12px;
                font-size: 0.95rem;
            }
            .search-wrapper .search-btn {
                padding: 8px 14px;
                font-size: 0.8rem;
            }
            .search-wrapper .search-btn span {
                display: none;
            }
            .search-wrapper .search-btn i {
                font-size: 1rem;

        function getUserName(uid) {
            const u = getDB('users').find(x => x.id === uid);
            return u ? u.name : 'Unknown';
        }

        /* ===========================================================
           STATUS INDICATOR
           =========================================================== */
        let statusState = 'idle';
        let statusMessage = 'System Ready';

        function setStatus(state, message) {
            statusState = state || 'idle';
            statusMessage = message || (state === 'loading' ? 'Loading...' : state === 'error' ? 'Error' : 'System Ready');
            updateStatusIndicator();
        }

        function updateStatusIndicator() {
            const container = document.getElementById('statusIndicatorContainer');
            if (!container) return;
            const dot = container.querySelector('.status-dot');
            const label = container.querySelector('.status-label');
            if (!dot || !label) return;
            dot.classList.remove('idle', 'loading', 'error');
            label.classList.remove('idle', 'loading', 'error');
            dot.classList.add(statusState);
            label.classList.add(statusState);
            const labels = { idle: 'Ready', loading: 'Loading', error: 'Error' };
            label.textContent = labels[statusState] || 'Ready';
            dot.title = statusMessage;
            label.title = statusMessage;
        }

        async function withStatus(asyncFn, loadingMsg = 'Processing...', errorMsg = 'Operation failed') {
            try {
                setStatus('loading', loadingMsg);
                const result = await asyncFn();
                setStatus('idle', 'System Ready');
                return result;
            } catch (err) {
                setStatus('error', errorMsg + ': ' + err.message);
                setTimeout(() => { if (statusState === 'error') setStatus('idle', 'System Ready'); }, 4000);
                throw err;
            }
        }

        /* ===========================================================
           TOAST SYSTEM
           =========================================================== */
        function showToast(message, type = 'info', duration = 3500) {
            const toast = document.getElementById('toastContainer');
            if (!toast) return;
            if (window._toastTimeout) clearTimeout(window._toastTimeout);
            toast.textContent = message;
            toast.className = 'toast';
            toast.classList.add(type);

        /* ===========================================================
           BACKUP / RESTORE (simplified)
           =========================================================== */
        function backupData() {
            try {
                const data = {};
                DATA_STORE_KEYS.forEach(key => {
                    const storageKey = K[key];
                    if (storageKey) {
                        const raw = localStorage.getItem(storageKey);
                        try { data[key] = raw ? JSON.parse(raw) : []; } catch (e) { data[key] = []; }
                    }
                });
                data.api_key = localStorage.getItem(K.api_key) || '';
                data.api_provider = localStorage.getItem(K.api_provider) || 'openai';
                data.dark_mode = localStorage.getItem(K.dark_mode) || 'false';
                const payload = { version: '1.0', exportedAt: new Date().toISOString(), data: data };
                const json = JSON.stringify(payload, null, 2);
                const blob = new Blob([json], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const now = new Date();
                const ts =
                    `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}_${String(now.getHours()).padStart(2,'0')}-${String(now.getMinutes()).padStart(2,'0')}`;
                // Create a dummy anchor to trigger download into Downloads folder
                const a = document.createElement('a');
                a.href = url;
                // Use a path-like name to suggest folder structure
                a.download = `backup/backup_${ts}.json`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                setTimeout(() => URL.revokeObjectURL(url), 5000);
                const u = currentUser();
                if (u) logActivity(u.id, u.name, 'Backup Data', `Exported backup: backup_${ts}.json`);
                showToast('✅ Backup downloaded to Downloads/backup/ folder', 'success');
            } catch (err) { showToast('❌ Backup failed: ' + err.message, 'error'); }
        }

        // Auto-backup every 2 hours when admin is active
        let backupTimer = null;
        let adminActiveSince = null;

        function startAutoBackup() {
            if (backupTimer) clearInterval(backupTimer);
            adminActiveSince = Date.now();
            backupTimer = setInterval(() => {
                const u = currentUser();
                if (u && u.role === 'admin') {
                    backupData();
                    showToast('📦 Auto-backup completed (2-hour interval)', 'info', 3000);
                }
            }, 2 * 60 * 60 * 1000); // 2 hours
        }

        function stopAutoBackup() {
            if (backupTimer) {
                clearInterval(backupTimer);
                backupTimer = null;
            }
            adminActiveSince = null;
        }

        function restoreData(file) {
            if (!file) return;
            if (!confirm('⚠️ Restoring data will overwrite your current records. Continue?')) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const payload = JSON.parse(e.target.result);
                    if (!payload.data || typeof payload.data !== 'object') throw new Error('Invalid backup.');
                    let restoredCount = 0;
                    DATA_STORE_KEYS.forEach(key => {
                        const storageKey = K[key];
                        if (storageKey && payload.data.hasOwnProperty(key)) {
                            const value = payload.data[key];
                            localStorage.setItem(storageKey, JSON.stringify(Array.isArray(value) ? value : []));
                            restoredCount++;
                        }
                    });
                    if (payload.data.api_key !== undefined) localStorage.setItem(K.api_key, payload.data.api_key);
                    if (payload.data.api_provider !== undefined) localStorage.setItem(K.api_provider, payload.data
                        .api_provider);
                    if (payload.data.dark_mode !== undefined) {
                        localStorage.setItem(K.dark_mode, payload.data.dark_mode);
                        if (payload.data.dark_mode === 'true') document.body.classList.add('dark-mode');
                        else document.body.classList.remove('dark-mode');
                        initNightMode();
                    }
                    const u = currentUser();
                    if (u) logActivity(u.id, u.name, 'Restore Data', `Restored from ${payload.exportedAt || 'unknown'}`);
                    showToast(`✅ Data restored! (${restoredCount} stores)`, 'success');
                    render();
                } catch (err) { showToast('❌ Restore failed: ' + err.message, 'error'); }
            };
            reader.readAsText(file);
        }

        function archiveExpiredQuizzes() {
            const quizzes = getDB('quizzes');
            const archives = getDB('archives');
            const now = new Date();
            let moved = 0;
            const remaining = [];
            quizzes.forEach(q => {
                if (q.deadline) {
                    const deadlineDate = new Date(q.deadline);
                    if (deadlineDate < now) {
                        const existing = archives.find(a => a.id === q.id);
                        if (!existing) { archives.push({ ...q, archived_at: new Date().toISOString() });
                            moved++; }
                    } else { remaining.push(q); }
                } else { remaining.push(q); }
            });
            setDB('quizzes', remaining);
            setDB('archives', archives);
            const u = currentUser();
            if (u) logActivity(u.id, u.name, 'Archive Quizzes', `Archived ${moved} expired quizzes`);
            showToast(`📦 ${moved} expired quizzes archived.`, 'info');
            return moved;
        }

        function restoreQuizFromArchive(quizId) {
            const archives = getDB('archives');
            const idx = archives.findIndex(a => a.id === quizId);
            if (idx === -1) { showToast('Quiz not found.', 'error'); return; }
            const quiz = archives[idx];
            archives.splice(idx, 1);
            setDB('archives', archives);
            const quizzes = getDB('quizzes');
            delete quiz.archived_at;
            quizzes.push(quiz);
            setDB('quizzes', quizzes);
            const u = currentUser();
            if (u) logActivity(u.id, u.name, 'Restore Quiz', `Restored "${quiz.title}" from archives`);
            showToast('✅ Quiz restored.', 'success');
            setView('archives');
        }

        function deleteArchivedQuiz(quizId) {
            if (!confirm('Delete this archived quiz permanently?')) return;
            const archives = getDB('archives');
            setDB('archives', archives.filter(a => a.id !== quizId));
            const u = currentUser();
            if (u) logActivity(u.id, u.name, 'Delete Archived Quiz', `Deleted archived quiz ID ${quizId}`);
            showToast('Archived quiz deleted.', 'info');
            setView('archives');
        }

        function fillDemo(role) {
            const map = { admin: ['admin@bioghana.edu', 'Admin@2026'], teacher: ['teacher@bioghana.edu',
                    'Teacher@2026'
                ], student: ['ama@student.edu', 'Student@2026']
            };
            document.getElementById('loginEmail').value = map[role][0];
            document.getElementById('loginPass').value = map[role][1];
        }

        function togglePass(id, btn) {
            const el = document.getElementById(id);
            el.type = el.type === 'password' ? 'text' : 'password';
            btn.textContent = el.type === 'text' ? 'Hide' : 'Show';
        }

        function doLogin(e) {
            e.preventDefault();
            const identifier = document.getElementById('loginEmail').value.trim().toLowerCase();
            const pass = document.getElementById('loginPass').value;
            const users = getDB('users');
            // Try matching by email, phone, or name
            const user = users.find(u =>
                u.email.toLowerCase() === identifier ||
                (u.phone && u.phone === identifier) ||
                u.name.toLowerCase() === identifier
            );
            if (user && user.password === btoa(pass)) {
                localStorage.setItem(K.session, JSON.stringify(user));
                logActivity(user.id, user.name, 'Login', 'User logged in');
                // Start auto-backup if admin
                if (user.role === 'admin') startAutoBackup();
                setView(user.role === 'admin' ? 'admin' : user.role === 'teacher' ? 'teacher' : 'student');
            } else {
                showToast('Invalid credentials. Try demo buttons.', 'error');
            }
        }

        function buildChangePassword() {
            const u = currentUser() || { email: 'guest' };
            return `
          <div class="max-w-md mx-auto mt-16">
            <div class="bg-white rounded-3xl shadow-xl border border-slate-100 p-8">
              <h2 class="text-2xl font-extrabold mb-6">Change Password</h2>
              <form onsubmit="updatePassword(event)" class="space-y-4">
                <input type="email" value="${u.email}" class="w-full px-4 py-3 rounded-xl bg-slate-50 border border-slate-200" disabled>
                <input type="password" id="oldPass" placeholder="Current password" class="w-full px-4 py-3 rounded-xl bg-white border border-slate-200" required>
                <input type="password" id="newPass" placeholder="New password" class="w-full px-4 py-3 rounded-xl bg-white border border-slate-200" required>
                <button type="submit" class="w-full bg-gradient-to-r from-amber-600 to-rose-700 text-white font-extrabold py-3 rounded-xl">Update</button>
              </form>
            </div>
          </div>`;
        }

        function updatePassword(e) {
            e.preventDefault();
            let u = currentUser();
            if (!u) { showToast('Please log in first.', 'warning'); return; }
            const users = getDB('users');
            const idx = users.findIndex(x => x.id === u.id);
            if (idx > -1) {
                if (users[idx].password !== btoa(document.getElementById('oldPass').value)) { showToast(
                        'Current password incorrect', 'error'); return; }
                users[idx].password = btoa(document.getElementById('newPass').value);
                setDB('users', users);
                showToast('Password updated.', 'success');
                setView('login');
            }
        }

        /* ===========================================================
           TEST ATTEMPTS (simplified)
           =========================================================== */
        function buildTestAttempts() {
            const u = currentUser();
            if (!u) return buildLogin();
            const quizzes = getDB('quizzes');
            const responses = getDB('responses');
            const users = getDB('users');
            const students = users.filter(user => user.role === 'student');
            const selectedQuizId = parseInt(sessionStorage.getItem('attempts_quiz_id') || '0');

            const classStats = {};
            CLASS_ORDER.forEach(c => classStats[c] = { total: 0, attempted: 0 });
            students.forEach(s => {
                if (classStats[s.class]) {
                    classStats[s.class].total++;
                    const hasAttempt = responses.some(r => r.student_id === s.id && r.status === 'submitted');
                    if (hasAttempt) classStats[s.class].attempted++;
                }
            });

            let statsRows = '';
            let totalStudents = 0,
                totalAttempted = 0;
            CLASS_ORDER.forEach(c => {
                const st = classStats[c];
                if (st && st.total > 0) {
                    totalStudents += st.total;
                    totalAttempted += st.attempted;
                    const pct = st.total > 0 ? Math.round((st.attempted / st.total) * 100) : 0;
                    statsRows += `
                <tr class="border-b border-slate-100">
                  <td class="px-4 py-2 font-medium">${c}</td>
                  <td class="px-4 py-2 text-center">${st.total}</td>
                  <td class="px-4 py-2 text-center">${st.attempted}</td>
                  <td class="px-4 py-2 text-center font-bold ${pct >= 70 ? 'text-emerald-600' : pct >= 40 ? 'text-amber-600' : 'text-rose-600'}">${pct}%</td>
                </tr>`;
                }
            });

            let sectionBhtml = '';
            if (quizzes.length === 0) {
                sectionBhtml = `<p class="text-slate-400">No quizzes available.</p>`;
            } else {
                const quizOpts = quizzes.map(q =>
                    `<option value="${q.id}" ${q.id === selectedQuizId ? 'selected' : ''}>${q.title} (${q.year})</option>`
                ).join('');
                const selectedQuiz = quizzes.find(q => q.id === selectedQuizId);
                const selectedClass = sessionStorage.getItem('attempts_class_filter') || '';
                let filteredStudents = [...students];
                if (selectedClass) filteredStudents = filteredStudents.filter(s => s.class === selectedClass);
                filteredStudents.sort((a, b) => {
                    const idxA = CLASS_ORDER.indexOf(a.class);
                    const idxB = CLASS_ORDER.indexOf(b.class);
                    if (idxA === -1 && idxB === -1) return a.name.localeCompare(b.name);
                    if (idxA === -1) return 1;
                    if (idxB === -1) return -1;
                    return idxA - idxB;
                });

                let attemptedStudents = [],
                    notAttemptedStudents = [],
                    rowNum = 0;
                filteredStudents.forEach(s => {
                    const resp = responses.find(r => r.student_id === s.id && r.quiz_id === selectedQuizId);
                    if (resp && resp.status === 'submitted') attemptedStudents.push({ student: s, resp });
                    else notAttemptedStudents.push({ student: s, resp });
                });
                const allOrdered = [...attemptedStudents, ...notAttemptedStudents];
                let studentRows = '';
                allOrdered.forEach(item => {
                    rowNum++;
                    const s = item.student;
                    const resp = item.resp;
                    const attempted = resp && resp.status === 'submitted';
                    const score = resp && resp.score !== null ? resp.score + '%' : '—';
                    const statusText = attempted ? '✅ Attempted' : '❌ Not Attempted';
                    const statusColor = attempted ? 'bg-emerald-100 text-emerald-700' :
                        'bg-amber-100 text-amber-700';
                    const duration = resp?.started_at && resp?.submitted_at ?
                        Math.round((new Date(resp.submitted_at) - new Date(resp.started_at)) / 60000) + ' min' :
                        '—';
                    studentRows += `
                <tr class="hover:bg-slate-50">
                  <td class="px-5 py-3 text-xs text-slate-400">${rowNum}</td>
                  <td class="px-5 py-3 font-medium">${s.name}</td>
                  <td class="px-5 py-3 text-xs text-slate-500">${s.class}</td>
                  <td class="px-5 py-3"><span class="px-2 py-1 rounded-full text-xs font-bold ${statusColor}">${statusText}</span></td>
                  <td class="px-5 py-3 font-extrabold ${attempted && resp && resp.score >= 60 ? 'text-emerald-600' : attempted ? 'text-rose-600' : 'text-slate-400'}">${attempted ? score : '—'}</td>
                  <td class="px-5 py-3 text-xs text-slate-400">${duration}</td>
                </tr>`;
                });

                const classOpts = CLASS_ORDER.map(c =>
                    `<option value="${c}" ${c === selectedClass ? 'selected' : ''}>${c}</option>`
                ).join('');

                sectionBhtml = `
              <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 space-y-4">
                <div class="flex flex-wrap items-center gap-4">
                  <div class="flex-1 min-w-[200px]">
                    <label class="block text-xs font-extrabold text-slate-700 uppercase mb-1">Select Quiz</label>
                    <select id="attemptsQuizSelect" onchange="applyAttemptsFilter()" class="w-full px-4 py-2.5 rounded-xl bg-slate-50 border border-slate-200 text-sm">
                      <option value="">— Select a quiz —</option>
                      ${quizOpts}
                    </select>
                  </div>
                  <div class="flex-1 min-w-[180px]">
                    <label class="block text-xs font-extrabold text-slate-700 uppercase mb-1">Filter by Class</label>
                    <select id="attemptsClassFilter" onchange="applyAttemptsFilter()" class="w-full px-4 py-2.5 rounded-xl bg-slate-50 border border-slate-200 text-sm">
                      <option value="">All Classes</option>
                      ${classOpts}
                    </select>
                  </div>
                  <div class="flex items-end gap-2">
                    <button onclick="applyAttemptsFilter()" class="bg-violet-600 text-white px-4 py-2.5 rounded-xl font-bold text-sm hover:bg-violet-700">Apply</button>
                    <button onclick="clearAttemptsFilter()" class="bg-slate-200 text-slate-700 px-4 py-2.5 rounded-xl font-bold text-sm hover:bg-slate-300">Clear</button>
                  </div>
                </div>
                ${selectedQuiz ? `
                  <div class="bg-slate-50 rounded-xl p-3 text-sm text-slate-600">
                    <span class="font-bold">${selectedQuiz.title}</span> —
                    ${attemptedStudents.length} attempted, ${notAttemptedStudents.length} not attempted
                    ${selectedClass ? `(Class: ${selectedClass})` : ''}
                  </div>
                  ${notAttemptedStudents.length > 0 ? `
                    <button onclick="sendReminderToNotAttempted()" class="bg-amber-600 hover:bg-amber-700 text-white px-5 py-2.5 rounded-xl font-bold text-sm shadow transition">
                      <i class="fa-regular fa-paper-plane mr-2"></i> Remind Not Attempted
                    </button>
                  ` : ''}
                  <div class="overflow-x-auto">
                    <table class="w-full text-sm">
                      <thead class="bg-slate-800 text-white text-xs font-bold uppercase">
                        <tr>
                          <th class="text-left px-5 py-3">#</th>
                          <th class="text-left px-5 py-3">Student</th>
                          <th class="text-left px-5 py-3">Class</th>
                          <th class="text-left px-5 py-3">Status</th>
                          <th class="text-left px-5 py-3">Score</th>
                          <th class="text-left px-5 py-3">Time</th>
                        </tr>
                      </thead>
                      <tbody class="divide-y divide-slate-100">${studentRows}</tbody>
                    </table>
                  </div>
                ` : `<p class="text-slate-400 text-center py-8">Select a quiz above.</p>`}
              </div>`;
            }

            return `
          <div class="max-w-6xl mx-auto fade-in">
            <div class="flex items-center justify-between mb-6">
              <h2 class="text-2xl font-extrabold">Test Attempts — Attendance Tracker</h2>
              <button onclick="setView('${u.role}')" class="bg-slate-200 text-slate-700 px-4 py-2 rounded-xl font-bold hover:bg-slate-300 text-sm">Back</button>
            </div>
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden mb-6">
              <div class="px-6 py-4 bg-gradient-to-r from-violet-50 to-indigo-50 border-b border-slate-200">
                <h3 class="font-extrabold text-slate-700">📊 Section A: Attempt Statistics by Class</h3>
              </div>
              <div class="p-4">
                <table class="w-full text-sm">
                  <thead class="bg-slate-100 text-slate-700 text-xs font-bold uppercase">
                    <tr><th class="text-left px-4 py-2">Class</th><th class="text-center px-4 py-2">Total</th><th class="text-center px-4 py-2">Attempted</th><th class="text-center px-4 py-2">Rate</th></tr>
                  </thead>
                  <tbody>
                    ${statsRows}
                    <tr class="bg-slate-50 font-bold">
                      <td class="px-4 py-2">TOTAL</td>
                      <td class="px-4 py-2 text-center">${totalStudents}</td>
                      <td class="px-4 py-2 text-center">${totalAttempted}</td>
                      <td class="px-4 py-2 text-center ${totalStudents > 0 && (totalAttempted/totalStudents*100) >= 70 ? 'text-emerald-600' : (totalAttempted/totalStudents*100) >= 40 ? 'text-amber-600' : 'text-rose-600'}">${totalStudents > 0 ? Math.round((totalAttempted/totalStudents)*100) : 0}%</td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
              <div class="px-6 py-4 bg-gradient-to-r from-amber-50 to-yellow-50 border-b border-slate-200">
                <h3 class="font-extrabold text-slate-700">📋 Section B: Student Attempt Details</h3>
              </div>
              <div class="p-4">${sectionBhtml}</div>
            </div>
          </div>`;
        }

        function applyAttemptsFilter() {
            const quizId = document.getElementById('attemptsQuizSelect').value;
            const cls = document.getElementById('attemptsClassFilter').value;
            sessionStorage.setItem('attempts_quiz_id', quizId);
            sessionStorage.setItem('attempts_class_filter', cls);
            setView('test_attempts');
        }

        function clearAttemptsFilter() {
            sessionStorage.removeItem('attempts_quiz_id');
            sessionStorage.removeItem('attempts_class_filter');
            setView('test_attempts');
        }

        function sendReminderToNotAttempted() {
            const selectedQuizId = parseInt(sessionStorage.getItem('attempts_quiz_id') || '0');
            const selectedClass = sessionStorage.getItem('attempts_class_filter') || '';
            const users = getDB('users');
            const responses = getDB('responses');
            const students = users.filter(u => u.role === 'student');
            const quiz = getDB('quizzes').find(q => q.id === selectedQuizId);
            let targetStudents = students;
            if (selectedClass) targetStudents = targetStudents.filter(s => s.class === selectedClass);
            const notAttempted = targetStudents.filter(s => {
                const resp = responses.find(r => r.student_id === s.id && r.quiz_id === selectedQuizId);
                return !resp || resp.status !== 'submitted';
            });
            if (notAttempted.length === 0) { showToast('All students have attempted!', 'success'); return; }
            const msg = getDB('messages');
            const u = currentUser();
            notAttempted.forEach(s => {
                msg.push({
                    id: randId(),
                    from: u.id,
                    from_name: u.name,
                    to: s.email,
                    subject: `Reminder: ${quiz?.title || 'Quiz'}`,
                    body: `Dear ${s.name},\n\nPlease complete the quiz "${quiz?.title || 'Quiz'}" before the deadline.\n\nBest,\n${u.name}`,
                    read: false,
                    timestamp: new Date().toISOString()
                });
            });
            setDB('messages', msg);
            logActivity(u.id, u.name, 'Send Reminder', `Sent to ${notAttempted.length} students`);
            showToast(`✅ Reminder sent to ${notAttempted.length} students.`, 'success');
        }

        function updateApiProviderUI() {
            const provider = document.getElementById('apiProviderSelect').value;
            const config = API_PROVIDERS[provider] || API_PROVIDERS.openai;
            const input = document.getElementById('apiKeyInput');
            if (input) input.placeholder = config.keyPlaceholder || 'Enter your API key';
        }

        function saveApiKey() {
            const key = document.getElementById('apiKeyInput').value.trim();
            const provider = document.getElementById('apiProviderSelect').value;
            if (!key) { showToast('Enter an API key.', 'warning'); return; }
            setApiKey(key);
            setApiProvider(provider);
            document.querySelector('.api-status-dot').className = 'api-status-dot unknown';
            showToast('✅ API key saved! Click "Test Key" to verify.', 'success');
            const u = currentUser();
            if (u) logActivity(u.id, u.name, 'API Key', 'Saved for ' + API_PROVIDERS[provider].name);
        }

        function clearApiKey() {

        async function testApiKey() {
            const key = document.getElementById('apiKeyInput')?.value?.trim() || getApiKey();
            const provider = document.getElementById('apiProviderSelect')?.value || getApiProvider();
            if (!key) { showToast('Enter an API key first.', 'warning'); return; }
            const config = API_PROVIDERS[provider];
            if (!config) { showToast('Invalid provider.', 'error'); return; }
            const dot = document.querySelector('.api-status-dot');
            if (dot) dot.className = 'api-status-dot testing';
            try {
                let url = config.baseUrl;
                let headers = { 'Content-Type': 'application/json', ...config.headers(key) };
                let body;
                if (config.appendKeyToUrl) {
                    url += '?key=' + key;
                    headers = { 'Content-Type': 'application/json' };
                    body = JSON.stringify({ contents: [{ parts: [{ text: 'Reply with "OK" if you receive this.' }] }] });
                } else {
                    body = JSON.stringify(config.body(config.model, [{ role: 'user', content: 'Reply with "OK" if you receive this.' }]));
                }
                const response = await fetch(url, { method: 'POST', headers, body });
                if (response.ok) {
                    const data = await response.json();
                    const text = config.extractText(data);
                    if (text && text.length > 0) {
                        showToast('✅ API key is valid!', 'success');
                        if (dot) dot.className = 'api-status-dot valid';
                        setApiKey(key);
                        setApiProvider(provider);
                        return true;
                    } else { throw new Error('Unexpected response'); }
                } else {
                    const errData = await response.json().catch(() => ({}));
                    let msg = errData.error?.message || errData.error?.code || `HTTP ${response.status}`;
                    showToast('❌ API test failed: ' + msg, 'error');
                    if (dot) dot.className = 'api-status-dot invalid';
                    return false;
                }
            } catch (err) {
                showToast('❌ API test failed: ' + err.message, 'error');
                if (dot) dot.className = 'api-status-dot invalid';
                return false;
            }
        }

            modal.className = 'modal-overlay';

            modal.innerHTML = `
            <div class="modal-content">
              <button class="modal-close" onclick="closeUpdateStudentModal()">&times;</button>

                <i class="fa-solid fa-user-pen text-blue-600"></i> Update Student Record

                  <button type="button" onclick="closeUpdateStudentModal()" class="btn-secondary">Cancel</button>

            }, 100);

        function closeUpdateStudentModal() {
            const modal = document.getElementById('updateStudentModal');
            if (modal) modal.remove();
        }

        function updateStudentRecord(e, studentId) {
            e.preventDefault();
            const users = getDB('users');
            const idx = users.findIndex(u => u.id === studentId);
            if (idx === -1) { showToast('Student not found.', 'error'); return; }

            const name = document.getElementById('usName').value.trim();
            const cls = document.getElementById('usClass').value;
            const email = document.getElementById('usEmail').value.trim().toLowerCase();
            const phone = document.getElementById('usPhone').value.trim();

            if (!name || !email) { showToast('Name and Email are required.', 'warning'); return; }

            // Check for duplicate email (excluding this student)
            const dup = users.some((u, i) => u.email === email && u.id !== studentId);
            if (dup) { showToast('Email already in use by another user.', 'warning'); return; }

            users[idx].name = name;
            users[idx].class = cls;
            users[idx].email = email;
            users[idx].phone = phone;

            setDB('users', users);
            closeUpdateStudentModal();

            // If the updated user is the current user, update session
            const current = currentUser();
            if (current && current.id === studentId) {
                const updated = users[idx];
                localStorage.setItem(K.session, JSON.stringify(updated));
            }

            logActivity(currentUser()?.id || 0, currentUser()?.name || 'System', 'Update Student',
                `Updated record for ${name} (${cls})`);
            showToast(`✅ Student record updated for ${name}`, 'success');
            setView('manage_students');
        }

        function toggleAllStudents(master) {
            document.querySelectorAll('.student-check').forEach(cb => cb.checked = master.checked);
        }

        function deleteSelectedStudents() {
            const checked = document.querySelectorAll('.student-check:checked');
            if (!checked.length) { showToast('Select at least one student.', 'warning'); return; }
            if (!confirm('Delete ' + checked.length + ' student(s)?')) return;
            const ids = Array.from(checked).map(cb => parseInt(cb.value));
            let users = getDB('users');
            users = users.filter(u => !(u.role === 'student' && ids.includes(u.id)));
            setDB('users', users);
            const u = currentUser();
            if (u) logActivity(u.id, u.name, 'Bulk Delete Students', `Deleted ${ids.length} students`);
            showToast(`Deleted ${ids.length} student(s).`, 'info');
            setView('manage_students');
        }

        function buildStudentPerformanceDetail() {
            const sid = parseInt(sessionStorage.getItem('perf_student_id') || '0');

            if (!student) return '<p class="text-center py-20 text-slate-400">Student not found.</p>';
            const responses = getDB('responses').filter(r => r.student_id === sid && r.status === 'submitted');
            const avg = responses.length ? (responses.reduce((s, r) => s + r.score, 0) / responses.length).toFixed(1) : 0;
            const quizzes = getDB('quizzes');

            setTimeout(() => {
                const ctx1 = document.getElementById('perfChart');
                if (ctx1) {
                    if (window._perfChart) window._perfChart.destroy();
                    window._perfChart = new Chart(ctx1, {
                        type: 'line',
                        data: {
                            labels: responses.map((r, i) => 'Q' + (i + 1)),
                            datasets: [{ label: 'Score %', data: responses.map(r => r.score),
                                borderColor: '#0284c7', backgroundColor: 'rgba(2,132,199,0.1)',
                                fill: true, tension: 0.4, pointBackgroundColor: '#0284c7' }]
                        },
                        options: { scales: { y: { beginAtZero: true, max: 100 } },
                            plugins: { legend: { display: false } } }
                    });
                }
                const ctx2 = document.getElementById('perfPie');
                if (ctx2 && responses.length) {
                    if (window._perfPie) window._perfPie.destroy();
                    const pass = responses.filter(r => r.score >= 60).length;
                    const fail = responses.filter(r => r.score < 60).length;
                    window._perfPie = new Chart(ctx2, {
                        type: 'doughnut',
                        data: { labels: ['Pass (≥60%)', 'Fail (<60%)'], datasets: [{ data: [pass, fail],
                                backgroundColor: ['#10b981', '#ef4444'], borderWidth: 0 }] },
                        options: { plugins: { legend: { position: 'bottom' } } }

        function sendTestToClass(e) {
            e.preventDefault();
            const className = document.getElementById('testToClass').value;

            if (!className) { showToast('Select a class.', 'warning'); return; }
            if (!quizId) { showToast('Select a quiz.', 'warning'); return; }
            const students = getDB('users').filter(u => u.role === 'student' && (className === 'All' || u.class === className));
            const assignments = getDB('responses') || [];
            let count = 0;
            students.forEach(s => {
                if (!assignments.find(a => a.student_id === s.id && a.quiz_id === quizId)) {
                    assignments.push({ id: randId(), student_id: s.id, quiz_id: quizId, status: 'assigned',
                        answers: [], score: null, submitted_at: null, started_at: null });
                    count++;
                }
            });
            setDB('responses', assignments);
            const u = currentUser();
            const quiz = getDB('quizzes').find(q => q.id === quizId);
            if (u) logActivity(u.id, u.name, 'Assigned Quiz', `Sent "${quiz?.title||'Quiz'}" to ${count} students in ${className}`);
            showToast(`✅ Quiz sent to ${count} students.`, 'success');
        }

        /* ===========================================================

        function buildDokPrompt(text, count, year, section, dok1Pct, dok2Pct, dok3Pct) {
            const c1 = Math.round((dok1Pct / 100) * count);
            const c2 = Math.round((dok2Pct / 100) * count);
            const c3 = count - c1 - c2;
            return `You are a Ghana SHS Biology exam writer. Create EXACTLY ${count} multiple-choice questions.
        Requirements (DO NOT violate):
        1. SOURCE: Use ONLY the text below.
        2. FORMAT: Return ONLY a JSON array. No markdown. No explanation. No headings.
        3. STRUCTURE: Each object has:
           - "question": string (clear, age-appropriate for SHS students 16-18)
           - "options": ["A. text...", "B. text...", "C. text...", "D. text..."]
           - "correct_answer": one letter from "A","B","C","D"
           - "dok_level": integer 1, 2, or 3
        4. DoK DISTRIBUTION (exact counts):
           - DoK 1 (Recall): ${c1} questions
           - DoK 2 (Application): ${c2} questions
           - DoK 3 (Strategic Thinking): ${c3} questions
        5. DISTRACTORS: Three plausible, clearly wrong options.
        6. CORRECT ANSWER POSITION: Randomly distribute A/B/C/D.
        7. CONTENT LOCK: Year=${year}, Section="${section}".
        8. NO FABRICATION. All answers must come from the source text.

        Source Text (first 3500 chars):
        ${text.substring(0, 3500)}

        Output ONLY the JSON array now:`;
        }
