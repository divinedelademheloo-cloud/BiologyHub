<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🧬 BIOLOGY HUB v17.1 — AI Quiz Generation + Sharing</title>
    <script src="https://cdn.tailwindcss.com">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mammoth@1.6.0/mammoth.browser.min.js">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/lz-string@1.5.0/libs/lz-string.min.js">
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js">
    </script>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.js">
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-body: #f0f4f8;
            --bg-card: #ffffff;
            --bg-sidebar: #FFB6C1;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --border-color: #e2e8f0;
            --radius: 1rem;
            --bg-input: #f8fafc;
            --bg-slate-100: #f1f5f9;
            --bg-slate-50: #f8fafc;
            --bg-modal: #ffffff;
        }
        [data-theme="dark"] {
            --bg-body: #0f172a;
            --bg-card: #1e293b;
            --bg-sidebar: #b38b96;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --border-color: #334155;
            --bg-input: #1e293b;
            --bg-slate-100: #1e293b;
            --bg-slate-50: #1e293b;
            --bg-modal: #1e293b;
        }
        * {
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }
        body {
            background: var(--bg-body);
            color: var(--text-primary);
            transition: background 0.3s, color 0.3s;
            min-height: 100vh;
        }
        .fade-in {
            animation: fadeIn 0.35s ease-out;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(12px);
            border-radius: 1.5rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
        }
        .btn-primary {
            background: linear-gradient(135deg, #0d9488, #14b8a6);
            color: #fff;
            border: none;
            padding: 0.6rem 1.5rem;
            border-radius: 1rem;
            font-weight: 700;
            transition: all 0.3s;
            cursor: pointer;
        }
        .btn-primary:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 24px rgba(20, 184, 166, 0.35);
        }
        .btn-secondary {
            background: var(--bg-slate-100);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            padding: 0.6rem 1.5rem;
            border-radius: 1rem;
            font-weight: 700;
            cursor: pointer;
        }
        .btn-pink {
            background: linear-gradient(135deg, #db2777, #ec4899);
            color: #fff;
            border: none;
            padding: 0.6rem 1.5rem;
            border-radius: 1rem;
            font-weight: 700;
            cursor: pointer;
        }
        .btn-purple {
            background: linear-gradient(135deg, #7c3aed, #8b5cf6);
            color: #fff;
            border: none;
            padding: 0.6rem 1.5rem;
            border-radius: 1rem;
            font-weight: 700;
            cursor: pointer;
        }
        .btn-green {
            background: linear-gradient(135deg, #16a34a, #22c55e);
            color: #fff;
            border: none;
            padding: 0.6rem 1.5rem;
            border-radius: 1rem;
            font-weight: 700;
            cursor: pointer;
        }
        .btn-amber {
            background: linear-gradient(135deg, #d97706, #f59e0b);
            color: #fff;
            border: none;
            padding: 0.6rem 1.5rem;
            border-radius: 1rem;
            font-weight: 700;
            cursor: pointer;
        }
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 1rem;
            padding: 1.5rem;
            transition: all 0.3s;
        }
        .card:hover {
            box-shadow: 0 12px 24px -8px rgba(0, 0, 0, 0.12);
        }
        .sidebar {
            background: var(--bg-sidebar) !important;
        }
        .sidebar .nav-link {
            color: #1a0a0a !important;
            font-weight: 800 !important;
            transition: all 0.2s;
            border-left: 3px solid transparent;
        }
        .sidebar .nav-link.active {
            background: #AB2C70 !important;
            color: #fff !important;
            border-left-color: #fff;
        }
        .sidebar .nav-link:hover:not(.active) {
            background: #2563eb !important;
            color: #fff !important;
        }
        .password-wrapper {
            position: relative;
        }
        .password-wrapper input {
            padding-right: 44px;
        }
        .password-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.1rem;
            color: #94a3b8;
        }
        .toast {
            animation: toastIn 0.4s ease-out forwards;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            position: relative;
            overflow: hidden;
        }
        .toast-progress {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 3px;
            background: linear-gradient(90deg, #14b8a6, #0d9488);
            width: 0%;
            transition: width linear;
        }
        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateY(16px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .gradient-bg {
            background: linear-gradient(135deg, #065f46 0%, #0d9488 40%, #14b8a6 100%);
        }
        .login-tab-btn {
            padding: 0.6rem 1.5rem;
            border-radius: 1rem;
            font-weight: 600;
            border: 2px solid var(--border-color);
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
        }
        .login-tab-btn.active {
            border-color: #14b8a6;
            background: rgba(20, 184, 166, 0.08);
            color: #14b8a6;
        }
        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 1rem;
            padding: 1.25rem;
            text-align: center;
        }
        @media (max-width: 1024px) {
            .sidebar {
                transform: translateX(-100%);
                position: fixed;
                inset: 0;
                z-index: 50;
                width: 280px;
                transition: transform 0.3s;
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .sidebar-overlay {
                display: none;
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.4);
                z-index: 40;
                backdrop-filter: blur(4px);
            }
            .sidebar-overlay.show {
                display: block;
            }
            .main-content {
                margin-left: 0 !important;
            }
        }
        .modal-overlay {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
        }
        .modal-content {
            background: var(--bg-modal);
            border-radius: 1.5rem;
            max-width: 950px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
        }
        .file-drop-zone {
            border: 2px dashed var(--border-color);
            border-radius: 1rem;
            transition: all 0.3s;
            cursor: pointer;
            background: var(--bg-card);
        }
        .file-drop-zone:hover,
        .file-drop-zone.dragover {
            border-color: #14b8a6;
            background: rgba(20, 184, 166, 0.08);
        }
        .question-item {
            border-left: 3px solid #14b8a6;
            transition: all 0.3s;
        }
        .question-item:hover {
            transform: translateX(4px);
        }
        .active-quiz-card {
            border: 2px solid #14b8a6;
            background: rgba(20, 184, 166, 0.08);
            transition: all 0.3s;
        }
        .active-quiz-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px -8px rgba(0, 0, 0, 0.12);
        }
        .note-card {
            border-left: 4px solid #ec4899;
            transition: all 0.3s;
        }
        .note-card:hover {
            transform: translateX(4px);
            box-shadow: 0 12px 24px -8px rgba(0, 0, 0, 0.12);
        }
        .role-badge {
            padding: 0.15rem 0.6rem;
            border-radius: 20px;
            font-size: 0.6rem;
            font-weight: 700;
            text-transform: uppercase;
        }
        .role-badge-admin {
            background: rgba(139, 92, 246, 0.2);
            color: #8b5cf6;
        }
        .role-badge-student {
            background: rgba(236, 72, 153, 0.2);
            color: #ec4899;
        }
        .quiz-option {
            transition: all 0.2s;
            border: 2px solid var(--border-color);
            border-radius: 0.75rem;
            cursor: pointer;
        }
        .quiz-option:hover {
            border-color: #14b8a6;
            background: rgba(20, 184, 166, 0.05);
        }
        .quiz-option.selected {
            border-color: #14b8a6;
            background: rgba(20, 184, 166, 0.12);
        }
        .category-tag {
            padding: 0.1rem 0.6rem;
            border-radius: 9999px;
            font-size: 0.65rem;
            font-weight: 600;
            background: var(--bg-slate-100);
            color: var(--text-secondary);
        }
        .ai-model-card {
            border: 2px solid var(--border-color);
            border-radius: 0.75rem;
            padding: 0.75rem 1rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .ai-model-card:hover {
            border-color: #8b5cf6;
        }
        .ai-model-card.active {
            border-color: #8b5cf6;
            background: rgba(139, 92, 246, 0.08);
        }
        .btn-data-export {
            background: #198464 !important;
            color: #fff !important;
        }
        .btn-data-import {
            background: #B58018 !important;
            color: #fff !important;
        }
        .btn-data-sync {
            background: #18B53C !important;
            color: #fff !important;
        }
        .btn-data-clear {
            background: #EC393F !important;
            color: #fff !important;
        }
        .sms-badge {
            background: rgba(59, 130, 246, 0.15);
            color: #3b82f6;
            padding: 0.1rem 0.6rem;
            border-radius: 9999px;
            font-size: 0.65rem;
            font-weight: 600;
        }
        .student-quiz-status {
            font-size: 0.65rem;
            padding: 0.15rem 0.6rem;
            border-radius: 20px;
            font-weight: 700;
        }
        .student-quiz-status.active {
            background: rgba(20, 184, 166, 0.2);
            color: #0d9488;
        }
        .student-quiz-status.completed {
            background: rgba(59, 130, 246, 0.2);
            color: #2563eb;
        }
        .student-quiz-status.pending {
            background: rgba(245, 158, 11, 0.2);
            color: #d97706;
        }
        .notification-badge {
            background: #ef4444;
            color: #fff;
            font-size: 0.6rem;
            min-width: 18px;
            height: 18px;
            border-radius: 9999px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            padding: 0 4px;
        }
        .generated-q-item {
            border-left: 3px solid #8b5cf6;
            transition: all 0.3s;
        }
        .generated-q-item:hover {
            transform: translateX(4px);
        }
        .flag-badge {
            background: #f59e0b;
            color: #fff;
            padding: 0.1rem 0.6rem;
            border-radius: 9999px;
            font-size: 0.6rem;
            font-weight: 700;
        }
        .timer-warning {
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }
        .prose-sm p {
            margin-bottom: 0.5rem;
        }
        .prose-sm ul,
        .prose-sm ol {
            padding-left: 1.5rem;
            margin-bottom: 0.5rem;
        }
        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .ai-status-pulse {
            animation: pulse 1.5s ease-in-out infinite;
        }
        .skeleton-loader {
            background: linear-gradient(90deg, var(--bg-slate-100) 25%, var(--bg-card) 50%, var(--bg-slate-100) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 0.5rem;
        }
        @keyframes shimmer {
            0% {
                background-position: -200% 0;
            }
            100% {
                background-position: 200% 0;
            }
        }
    </style>
</head>
<body>

    <!-- ===== LOGIN VIEW ===== -->
    <div id="authView" class="min-h-screen flex items-center justify-center gradient-bg p-4">
        <div class="glass-card w-full max-w-md p-8 fade-in" style="background:var(--bg-card);color:var(--text-primary);">
            <div class="text-center mb-6">
                <div class="w-20 h-20 bg-emerald-100 rounded-full flex items-center justify-center text-4xl mx-auto mb-4 pulse-ring" style="background:rgba(20,184,166,0.1);">🧬</div>
                <h1 class="text-2xl font-extrabold" style="color:var(--text-primary);">Biology Hub</h1>
                <p class="text-sm mt-1" style="color:var(--text-secondary); font-weight:500;">Admin • Student Portal</p>
                <div class="mt-2 flex justify-center gap-2 text-xs">
                    <span class="px-2 py-1 rounded-full font-bold" style="background:rgba(20,184,166,0.1);color:#14b8a6;">v17.1</span>
                    <span class="px-2 py-1 rounded-full font-bold" style="background:rgba(20,184,166,0.1);color:#14b8a6;">🤖 AI-Powered</span>
                </div>
            </div>

            <div class="flex gap-1 mb-6">
                <button onclick="switchLoginTab('admin')" id="loginTabAdmin" class="login-tab-btn active flex-1 text-center text-sm">👨‍💼 Admin</button>
                <button onclick="switchLoginTab('student')" id="loginTabStudent" class="login-tab-btn flex-1 text-center text-sm">👨‍🎓 Student</button>
            </div>

            <form id="adminLoginForm" onsubmit="handleAdminLogin(event)" class="space-y-4">
                <div>
                    <label class="block text-sm font-bold mb-1" style="color:var(--text-primary);">📧 Email</label>
                    <input id="loginEmail" type="email" value="admin@hub.com" class="w-full px-4 py-3 border rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none transition" style="background:var(--bg-input);border-color:var(--border-color);color:var(--text-primary);" required>
                </div>
                <div>
                    <label class="block text-sm font-bold mb-1" style="color:var(--text-primary);">🔑 Password</label>
                    <div class="password-wrapper">
                        <input id="loginPassword" type="password" value="admin123" class="w-full px-4 py-3 border rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none transition" style="background:var(--bg-input);border-color:var(--border-color);color:var(--text-primary);" required>
                        <button type="button" class="password-toggle" onclick="togglePasswordVisibility('loginPassword', this)">👁️</button>
                    </div>
                </div>
                <button type="submit" class="w-full py-3 btn-primary text-white rounded-xl font-bold text-lg shadow-lg hover:shadow-xl transition transform hover:scale-[1.02]">🚀 Enter Admin Portal</button>
            </form>

            <form id="studentLoginForm" onsubmit="handleStudentLogin(event)" class="space-y-4 hidden">
                <div>
                    <label class="block text-sm font-bold mb-1" style="color:var(--text-primary);">📧 Email or 📱 Phone</label>
                    <input id="studentLoginEmail" type="text" placeholder="email@example.com or +233XXXXXXXXX" class="w-full px-4 py-3 border rounded-xl focus:ring-2 focus:ring-pink-500 outline-none transition" style="background:var(--bg-input);border-color:var(--border-color);color:var(--text-primary);" required>
                </div>
                <div>
                    <label class="block text-sm font-bold mb-1" style="color:var(--text-primary);">🔑 Password</label>
                    <div class="password-wrapper">
                        <input id="studentLoginPassword" type="password" placeholder="Enter your password" class="w-full px-4 py-3 border rounded-xl focus:ring-2 focus:ring-pink-500 outline-none transition" style="background:var(--bg-input);border-color:var(--border-color);color:var(--text-primary);" required>
                        <button type="button" class="password-toggle" onclick="togglePasswordVisibility('studentLoginPassword', this)">👁️</button>
                    </div>
                </div>
                <button type="submit" class="w-full py-3 bg-pink-600 text-white rounded-xl font-bold text-lg shadow-lg hover:bg-pink-700 transition transform hover:scale-[1.02]">🚀 Enter Student Portal</button>
            </form>

            <p class="text-center text-xs mt-6" style="color:var(--text-secondary);">🔒 Admin: admin@hub.com / admin123</p>
        </div>
    </div>

    <!-- ===== ADMIN APP ===== -->
    <div id="mainApp" class="hidden min-h-screen flex">
        <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
        <aside class="sidebar bg-slate-900 text-white flex flex-col" id="sidebar" style="background:var(--bg-sidebar);">
            <div class="p-6 border-b border-slate-700" style="border-color:rgba(0,0,0,0.15);">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-emerald-500 rounded-xl flex items-center justify-center text-xl">🧬</div>
                    <div>
                        <h2 class="font-extrabold text-lg tracking-tight">Biology Hub</h2>
                        <p class="text-xs font-bold" id="sidebarRoleLabel" style="font-weight:700;color:#1a0a0a;">Admin Dashboard</p>
                    </div>
                </div>
            </div>
            <nav class="flex-1 p-4 space-y-1 overflow-y-auto no-scrollbar" id="navContainer"></nav>
            <div class="p-4 border-t border-slate-700" style="border-color:rgba(0,0,0,0.15);">
                <button onclick="logout()" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left text-red-400 hover:bg-slate-800 transition font-semibold">
                    <span class="text-xl">🚪</span>
                    <span class="text-sm font-bold">Log Out</span>
                </button>
            </div>
        </aside>

        <div class="main-content flex-1 lg:ml-72 flex flex-col min-h-screen">
            <header class="sticky top-0 z-20 border-b shadow-sm" style="background:var(--bg-card);border-color:var(--border-color);backdrop-filter:blur(12px);">
                <div class="flex items-center justify-between px-4 md:px-8 py-3">
                    <div class="flex items-center gap-3">
                        <button onclick="toggleSidebar()" class="lg:hidden p-2 hover:bg-slate-100 rounded-xl transition" style="color:var(--text-secondary);">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
                        </button>
                        <h1 id="pageTitle" class="text-xl md:text-2xl font-extrabold tracking-tight" style="color:var(--text-primary);">Dashboard</h1>
                        <span class="hidden sm:inline-block text-xs px-3 py-1 rounded-full font-bold" style="background:rgba(20,184,166,0.1);color:#14b8a6;">v17.1</span>
                    </div>
                    <div class="flex items-center gap-3">
                        <button onclick="toggleTheme()" class="theme-toggle" title="Toggle dark mode">
                            <span id="themeIcon">🌙</span>
                        </button>
                        <div class="flex items-center gap-3 pl-4 border-l" style="border-color:var(--border-color);">
                            <div class="w-10 h-10 bg-gradient-to-br from-emerald-400 to-teal-600 rounded-full flex items-center justify-center text-white font-bold shadow-md" id="userAvatar">A</div>
                            <div class="hidden sm:block">
                                <p class="text-sm font-bold" style="color:var(--text-primary);" id="userNameDisplay">Admin</p>
                                <p class="text-xs" style="color:var(--text-secondary); font-weight:500;" id="userRoleDisplay">System Administrator</p>
                                <span class="role-badge role-badge-admin">Admin</span>
                            </div>
                        </div>
                    </div>
                </div>
            </header>
            <main id="contentArea" class="p-4 md:p-8 flex-1 overflow-y-auto fade-in"></main>
        </div>
    </div>

    <!-- ===== STUDENT APP ===== -->
    <div id="studentApp" class="hidden min-h-screen flex">
        <div class="sidebar-overlay" id="studentSidebarOverlay" onclick="toggleStudentSidebar()"></div>
        <aside class="sidebar bg-slate-900 text-white flex flex-col student-sidebar" id="studentSidebar" style="background:var(--bg-sidebar);">
            <div class="p-6 border-b border-slate-700" style="border-color:rgba(0,0,0,0.15);">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-pink-500 rounded-xl flex items-center justify-center text-xl">🧬</div>
                    <div>
                        <h2 class="font-extrabold text-lg tracking-tight">Biology Hub</h2>
                        <p class="text-xs font-bold" id="studentSidebarRoleLabel" style="font-weight:700;color:#1a0a0a;">Student Portal</p>
                    </div>
                </div>
            </div>
            <nav class="flex-1 p-4 space-y-1 overflow-y-auto no-scrollbar" id="studentNavContainer"></nav>
            <div class="p-4 border-t border-slate-700" style="border-color:rgba(0,0,0,0.15);">
                <button onclick="logoutStudent()" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left text-red-400 hover:bg-slate-800 transition font-semibold">
                    <span class="text-xl">🚪</span>
                    <span class="text-sm font-bold">Log Out</span>
                </button>
            </div>
        </aside>

        <div class="main-content flex-1 lg:ml-72 flex flex-col min-h-screen">

        function addNotification(message, type = 'info', link = null, recipient = 'all') {
            const n = getNotifications();
            n.unshift({ id: 'not_' + Date.now(), message, type, link, recipient, read: false, timestamp: new Date()
                    .toISOString() });
            if (n.length > 50) n.length = 50;
            localStorage.setItem('bio_notifications', JSON.stringify(n));
            updateNotificationBadge();

        function markNotificationRead(id) { let n = getNotifications();
            const idx = n.findIndex(x => x.id === id); if (idx !== -1) { n[idx].read = true;

            const n = getNotifications();

            const users = getUsers();
            const exists = users.find(u => u.email === userData.email || (u.phone && u.phone === userData.phone));
            if (exists) throw new Error('User already exists');
            const user = { id: 'u_' + Date.now(), ...userData, createdAt: new Date().toISOString() };

            let users = getUsers();

            users = users.filter(u => u.id !== id);
            localStorage.setItem('bio_users', JSON.stringify(users));
            return true;

        // ================================================================
        //  💬 TOAST
        // ================================================================

        function showToast(msg, type = 'success', duration = 4000) {
            const container = document.getElementById('toastContainer');
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            const colors = {
                success: isDark ? 'border-teal-500 bg-teal-900/30 text-teal-200' :
                    'border-teal-500 bg-teal-50 text-teal-800',
                error: isDark ? 'border-rose-500 bg-rose-900/30 text-rose-200' :
                    'border-rose-500 bg-rose-50 text-rose-800',
                warning: isDark ? 'border-amber-500 bg-amber-900/30 text-amber-200' :
                    'border-amber-500 bg-amber-50 text-amber-800',
                info: isDark ? 'border-blue-500 bg-blue-900/30 text-blue-200' :
                    'border-blue-500 bg-blue-50 text-blue-800'
            };
            const icons = { success: '✅', error: '❌', warning: '⚠️', info: 'ℹ️' };
            const toast = document.createElement('div');
            toast.className =
                `toast p-4 rounded-xl border-l-4 shadow-lg flex items-center gap-3 ${colors[type] || colors.info}`;
            toast.innerHTML = `
                <span class="text-xl">${icons[type] || 'ℹ️'}</span>
                <span class="flex-1 text-sm font-medium" style="font-weight:600;">${msg}</span>
                <button onclick="this.parentElement.remove()" class="text-slate-400 hover:text-slate-600 text-xl leading-none">×</button>
                <div class="toast-progress"></div>
            `;
            container.appendChild(toast);
            const progress = toast.querySelector('.toast-progress');
            if (progress) { requestAnimationFrame(() => { progress.style.width = '100%'; }); }
            setTimeout(() => { toast.style.opacity = '0';
                toast.style.transform = 'translateY(16px)';
                setTimeout(() => toast.remove(), 300); }, duration);
        }

        function switchLoginTab(tab) {
            const tabs = ['admin', 'student'];
            tabs.forEach(t => {
                const el = document.getElementById('loginTab' + t.charAt(0).toUpperCase() + t.slice(1));
                const form = document.getElementById(t + 'LoginForm');
                if (t === tab) { el.classList.add('active');
                    form.classList.remove('hidden'); } else { el.classList.remove('active');
                    form.classList.add('hidden'); }
            });
        }

        function handleAdminLogin(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            const users = getUsers();
            const user = users.find(u => u.email === email && u.password === password && u.role === 'admin');
            if (!user) { showToast('Invalid admin credentials. Default: admin@hub.com / admin123', 'error'); return; }
            currentUser = user;
            localStorage.setItem('bio_current_user', JSON.stringify(user));
            enterAdminApp(user);
        }

        function handleStudentLogin(e) {
            e.preventDefault();
            const identifier = document.getElementById('studentLoginEmail').value.trim();
            const password = document.getElementById('studentLoginPassword').value.trim();
            if (!identifier || !password) { showToast('Please fill in all fields', 'warning'); return; }
            const students = getStudents();
            const student = students.find(s => (s.email && s.email.toLowerCase() === identifier.toLowerCase() || s
                .phone === identifier) && s.password === password);
            if (!student) { showToast('Student not found. Check your email/phone and password.', 'error'); return; }
            currentStudent = student;
            localStorage.setItem('bio_current_student', JSON.stringify(student));
            enterStudentApp(student);
        }

        function getPerformanceAlerts() {
            const alerts = [];
            const students = getStudents();
            const results = getResults();
            const today = new Date();
            students.forEach(s => {
                const sr = results.filter(r => r.studentId === s.id);
                if (!sr.length) {
                    alerts.push({ level: 'warning', icon: '⚠️', message: `${s.name} has not taken any quiz yet`,
                        studentId: s.id });
                    return;
                }
                const sorted = sr.sort((a, b) => new Date(a.submittedAt) - new Date(b.submittedAt));
                const recent = sorted.slice(-3);
                if (recent.length >= 2) {
                    const first = recent[0].percentage;
                    const last = recent[recent.length - 1].percentage;
                    if (last < first - 20) {
                        alerts.push({ level: 'danger', icon: '🔴', message: `${s.name}'s performance dropped ${first - last}% (${first}% → ${last}%)`,
                            studentId: s.id });
                    }
                }
                const quizzes = getQuizzes();
                quizzes.forEach(q => {
                    if (q.deadline && new Date(q.deadline) < today && !sr.some(r => r.quizId === q.id)) {
                        alerts.push({ level: 'info', icon: '⏰', message: `${s.name} missed deadline for "${q.title}"`,
                            studentId: s.id });
                    }
                });
            });
            return alerts.slice(0, 10);
        }

        function getStudyStreak(studentId) {
            const results = getResults().filter(r => r.studentId === studentId).sort((a, b) => new Date(b.submittedAt) - new Date(
                a.submittedAt));
            if (!results.length) return 0;
            let streak = 0;
            let currentDate = new Date();
            currentDate.setHours(0, 0, 0, 0);
            const today = results.some(r => new Date(r.submittedAt).toDateString() === currentDate.toDateString());
            if (!today) {
                const yesterday = new Date(currentDate);
                yesterday.setDate(yesterday.getDate() - 1);
                if (!results.some(r => new Date(r.submittedAt).toDateString() === yesterday.toDateString())) return 0;
            }
            let checkDate = new Date(currentDate);
            if (!today) checkDate.setDate(checkDate.getDate() - 1);
            while (true) {
                const dateStr = checkDate.toDateString();
                if (!results.some(r => new Date(r.submittedAt).toDateString() === dateStr)) break;
                streak++;
                checkDate.setDate(checkDate.getDate() - 1);
            }
            return streak;
        }

        function getAchievements(studentId) {
            const results = getResults().filter(r => r.studentId === studentId);

            if (getStudyStreak(studentId) >= 7) a.push({ icon: '🔥', name: 'On Fire', desc: '7-day streak' });
            return a;
        }

        async function handleUpload() {
            const file = document.getElementById('fileInput').files[0];
            const status = document.getElementById('uploadStatus');
            if (!file) { status.innerHTML = '<p style="color:#ef4444;font-weight:600;">Please select a file</p>'; return; }
            status.innerHTML = '<p style="color:#3b82f6;font-weight:600;">⏳ Parsing file...</p>';
            try {
                const buffer = await file.arrayBuffer();
                let text = '';
                if (file.name.toLowerCase().endsWith('.docx')) {
                    const result = await mammoth.extractRawText({ arrayBuffer: buffer });
                    text = result.value;
                } else if (file.name.toLowerCase().endsWith('.pdf')) {
                    const pdf = await pdfjsLib.getDocument({ data: buffer }).promise;
                    for (let i = 1; i <= pdf.numPages; i++) {
                        const page = await pdf.getPage(i);
                        const content = await page.getTextContent();
                        text += content.items.map(it => it.str).join(' ') + '\n';
                    }
                } else {
                    throw new Error('Unsupported file type');
                }
                const questions = extractQuestions(text);
                if (!questions.length) {
                    status.innerHTML = '<p style="color:#ef4444;font-weight:600;">❌ No questions found.</p>';
                    return;
                }
                const existing = getQuestions();
                const newQs = questions.filter(q => !existing.some(e => e.questionText === q.questionText));
                // Add source "Uploaded"
                newQs.forEach(q => q.source = 'Uploaded');
                const all = [...existing, ...newQs];
                localStorage.setItem('bio_questions', JSON.stringify(all));
                status.innerHTML =
                    `<p style="color:#22c55e;font-weight:600;">✅ Imported ${newQs.length} questions (${questions.length - newQs.length} duplicates)</p>`;
                showToast(`✅ ${newQs.length} questions imported!`, 'success');
                initQuestionBank();
            } catch (e) {
                status.innerHTML = `<p style="color:#ef4444;font-weight:600;">❌ Error: ${e.message}</p>`;
                showToast('Error parsing file', 'error');
            }
        }

        function extractQuestions(text) {
            const questions = [];
            const blocks = text.split(/\n(?=\s*\d+[\.\)]\s*)/);
            for (const block of blocks) {
                const qMatch = block.match(/^\s*\d+[\.\)]\s*(.+?)(?=\n\s*[A-D][\.\)])/s);
                if (!qMatch) continue;
                const questionText = qMatch[1].trim();
                const options = [];
                const optRegex = /([A-D])[\.\)]\s*([^\n]+)/g;
                let m;
                while ((m = optRegex.exec(block)) !== null) {
                    options.push({ label: m[1], text: m[2].trim() });
                }
                if (options.length < 2) continue;
                const ansMatch = block.match(/Answer\s*[\::]\s*([A-D])/i);
                const correctAnswer = ansMatch ? ansMatch[1].toUpperCase() : null;
                if (!correctAnswer) continue;
                const topicMatch = block.match(/Topic\s*[\::]\s*([^\n]+)/i);
                questions.push({
                    id: 'q_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6),
                    questionText,
                    options,
                    correctAnswer,
                    topic: topicMatch ? topicMatch[1].trim() : 'General Biology',

        // ----- Expert: Robust JSON Extractor -----
        function extractValidJSON(aiResponse) {
            // 1. Strip markdown code blocks if the AI added them
            const jsonMatch = aiResponse.match(/```(?:json)?\s*([\s\S]*?)\s*```/);
            let cleanText = jsonMatch ? jsonMatch[1] : aiResponse;

            // 2. Find the actual JSON array boundaries
            const startIndex = cleanText.indexOf('[');
            const endIndex = cleanText.lastIndexOf(']');

            if (startIndex !== -1 && endIndex !== -1) {
                const jsonString = cleanText.substring(startIndex, endIndex + 1);
                return JSON.parse(jsonString);
            }
            throw new Error("AI failed to return a valid JSON array.");
        }

        function validateAndFixQuiz(quizData) {
            return quizData.filter(q => {

                const validAnswer = q.correctAnswer !== undefined && q.correctAnswer !== null;

                    // If correctAnswer is an index, convert to letter
                    if (typeof q.correctAnswer === 'number') {
                        const labels = ['A', 'B', 'C', 'D'];
                        q.correctAnswer = labels[q.correctAnswer] || 'A';
                    }
                    return true;
                }
                console.warn("Discarding malformed question from AI:", q);
                return false;
            });
        }

        // Helper to generate questions from text (existing logic)
        function generateQuestionsFromText(text, count, topic, difficulty) {
            const sentences = text.split(/[.!?]+/).filter(s => s.trim().length > 20);
            const used = shuffle(sentences).slice(0, Math.min(count, sentences.length));
            const questions = [];
            for (let i = 0; i < used.length; i++) {
                const sent = used[i].trim();
                const words = sent.split(' ');
                const key = words.slice(0, Math.min(5, words.length)).join(' ');
                const options = [
                    { label: 'A', text: 'This is the correct statement' },
                    { label: 'B', text: 'This is incorrect' },
                    { label: 'C', text: 'This is partially true' },
                    { label: 'D', text: 'This is not mentioned' }
                ];
                // Try to make options more relevant
                const topicWords = [topic, ...words.filter(w => w.length > 5)].slice(0, 3);
                if (topicWords.length) {
                    options[0].text = `The ${topicWords[0]} is the main focus.`;
                    options[1].text = `The ${topicWords[1] || 'concept'} is unrelated.`;
                    options[2].text = `The ${topicWords[2] || 'idea'} is mentioned but not central.`;
                    options[3].text = `The text does not discuss this.`;

                questions.push({
                    questionText: `What is the main idea of "${key}..."?`,
                    options: options,
                    correctAnswer: 'A',
                    topic: topic || 'Biology',
                    difficulty: difficulty || 'Medium',
                    source: 'AI-Generated',
                    createdAt: new Date().toISOString()
                });
            }
            return questions;
        }

        function initAIQuizGeneration() {
            // Reset state
            generatedQuestions = [];
            extractedDocumentText = '';
            documentMetadata = { strand: '', subStrand: '', focalArea: '' };
            const listEl = document.getElementById('aiGeneratedList');
            if (listEl) listEl.innerHTML =
            '<p class="text-center py-8 text-slate-400 font-medium text-sm">Upload a document and click Generate</p>';
            const countEl = document.getElementById('aiQCount');
            if (countEl) countEl.textContent = '0';
            const fileName = document.getElementById('aiFileName');
            if (fileName) fileName.textContent = '';
            const fileStatus = document.getElementById('aiFileStatus');
            if (fileStatus) fileStatus.textContent = '';
            const statusEl = document.getElementById('aiGenerationStatus');
            if (statusEl) statusEl.innerHTML = '';

            const dropZone = document.getElementById('aiDropZone');
            if (dropZone) {
                dropZone.addEventListener('dragover', (e) => { e.preventDefault();
                    dropZone.classList.add('dragover'); });
                dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
                dropZone.addEventListener('drop', (e) => {
                    e.preventDefault();
                    dropZone.classList.remove('dragover');
                    if (e.dataTransfer.files.length) {
                        const file = e.dataTransfer.files[0];
                        if (file.name.match(/\.(docx|pdf)$/)) {
                            document.getElementById('aiFileInput').files = e.dataTransfer.files;
                            handleAIFileSelect({ target: { files: e.dataTransfer.files } });
                        } else { showToast('Please select a .docx or .pdf file', 'error'); }
                    }
                });
            }

            selectAIModel('qwen');
        }

        function selectAIModel(id) {
            selectedAIModel = id;
            document.querySelectorAll('.ai-model-card').forEach(el => {
                el.classList.remove('active');
                const model = AI_MODELS.find(m => m.id === id);
                if (model && el.textContent.includes(model.name)) {
                    el.classList.add('active');
                    el.style.borderColor = model.color;
                } else {
                    el.style.borderColor = 'var(--border-color)';
                }
            });
            showToast(`🤖 Switched to ${AI_MODELS.find(m=>m.id===id)?.name || id}`, 'info');
        }

        let aiUploadedFile = null;

        async function handleAIFileSelect(e) {
            const file = e.target.files[0];
            if (!file) return;
            if (!file.name.match(/\.(docx|pdf)$/)) { showToast('Please select a .docx or .pdf file', 'error'); return; }

            aiUploadedFile = file;
            document.getElementById('aiFileName').textContent = `✅ ${file.name} (${(file.size/1024).toFixed(2)} KB)`;
            document.getElementById('aiFileStatus').textContent = '⏳ Extracting text...';

            try {
                const buffer = await file.arrayBuffer();
                let text = '';
                if (file.name.toLowerCase().endsWith('.docx')) {
                    const result = await mammoth.extractRawText({ arrayBuffer: buffer });
                    text = result.value;
                } else if (file.name.toLowerCase().endsWith('.pdf')) {
                    const pdf = await pdfjsLib.getDocument({ data: buffer }).promise;
                    for (let i = 1; i <= pdf.numPages; i++) {
                        const page = await pdf.getPage(i);
                        const content = await page.getTextContent();
                        text += content.items.map(it => it.str).join(' ') + '\n';
                    }
                } else {
                    throw new Error('Unsupported file type');
                }

                extractedDocumentText = text;
                document.getElementById('aiFileStatus').textContent =
                    `✅ Extracted ${text.length} characters. Detecting structure...`;

                const metadata = detectDocumentMetadata(text);
                documentMetadata = metadata;
                document.getElementById('aiStrand').value = metadata.strand || '';
                document.getElementById('aiSubStrand').value = metadata.subStrand || '';
                document.getElementById('aiFocalArea').value = metadata.focalArea || '';

                showToast(`📄 Text extracted: ${text.length} chars`, 'success');

                if (text.length > 100) {
                    document.getElementById('aiFileStatus').textContent = '📝 Text ready. Click "Generate" to create questions.';
                } else {
                    document.getElementById('aiFileStatus').textContent = '⚠️ Text too short. Please upload a document with more content.';
                }

            } catch (err) {
                document.getElementById('aiFileStatus').textContent = `❌ Error: ${err.message}`;
                showToast('Error extracting text: ' + err.message, 'error');
            }
        }

        function detectDocumentMetadata(text) {
            const result = { strand: '', subStrand: '', focalArea: '' };

            const strandKeywords = {
                'Cell Biology': ['cell', 'mitosis', 'meiosis', 'organelle', 'membrane', 'nucleus', 'cytoplasm', 'ribosome',
                    'mitochondria', 'chloroplast', 'cell wall', 'vacuole', 'endoplasmic', 'golgi'
                ],
                'Genetics': ['gene', 'allele', 'DNA', 'RNA', 'chromosome', 'heredity', 'mutation', 'genotype', 'phenotype',
                    'replication', 'transcription', 'translation', 'genome', 'dominant', 'recessive', 'trait'
                ],
                'Ecology': ['ecosystem', 'habitat', 'population', 'community', 'biodiversity', 'conservation', 'food chain',
                    'food web', 'biome', 'pollution', 'climate', 'sustainability', 'species', 'environment'
                ],
                'Human Biology': ['heart', 'lung', 'kidney', 'liver', 'brain', 'neuron', 'blood', 'immune', 'digestive',
                    'respiratory', 'circulatory', 'nervous', 'endocrine', 'muscle', 'skeleton', 'hormone'
                ],
                'Plant Biology': ['photosynthesis', 'transpiration', 'root', 'stem', 'leaf', 'flower', 'seed', 'germination',
                    'pollination', 'fertilization', 'xylem', 'phloem', 'stomata', 'chlorophyll'
                ],
                'Microbiology': ['bacteria', 'virus', 'fungi', 'protozoa', 'microorganism', 'infection', 'antibiotic',
                    'pathogen', 'immune', 'vaccine', 'microbe', 'culture', 'microscope'
                ],
                'Evolution': ['evolution', 'natural selection', 'adaptation', 'speciation', 'fossil', 'Darwin', 'mutation',
                    'genetic drift', 'biodiversity', 'phylogeny', 'common ancestor'
                ],
                'Physiology': ['homeostasis', 'feedback', 'metabolism', 'enzyme', 'hormone', 'neuron', 'muscle', 'organ',
                    'tissue', 'system', 'regulation', 'transport'
                ]
            };

            let bestStrand = '';
            let bestScore = 0;
            for (const [strand, keywords] of Object.entries(strandKeywords)) {
                let score = 0;
                for (const kw of keywords) {
                    if (text.toLowerCase().includes(kw.toLowerCase())) score++;
                }
                if (score > bestScore) { bestScore = score;
                    bestStrand = strand; }
            }
            if (bestScore > 2) result.strand = bestStrand;

            const subStrandPatterns = [
                { pattern: /cell\s*(?:division|cycle|structure|membrane|organelle)/i, label: 'Cell Structure & Function' },
                { pattern: /(?:DNA|RNA|gene|chromosome|genetic)\s*(?:replication|expression|inheritance)/i,
                    label: 'Molecular Genetics' },
                { pattern: /(?:population|community|ecosystem|habitat)\s*(?:dynamics|interaction|conservation)/i,
                    label: 'Population Ecology' },
                { pattern: /(?:heart|lung|kidney|liver|brain|blood)\s*(?:function|system|disorder)/i,
                    label: 'Organ Systems' },
                { pattern: /(?:photosynthesis|transpiration|germination|pollination)/i, label: 'Plant Physiology' },
                { pattern: /(?:bacteria|virus|fungi|infection|antibiotic)/i, label: 'Microbiology & Disease' },
                { pattern: /(?:evolution|natural selection|adaptation|speciation)/i, label: 'Evolutionary Biology' },
                { pattern: /(?:homeostasis|metabolism|enzyme|hormone|feedback)/i, label: 'Physiology & Regulation' }
            ];

            for (const sp of subStrandPatterns) {
                if (sp.pattern.test(text)) {
                    result.subStrand = sp.label;
                    break;
                }
            }

            const lines = text.split('\n').filter(l => l.trim().length > 20);
            for (const line of lines.slice(0, 10)) {
                const trimmed = line.trim();
                if (trimmed.length > 10 && trimmed.length < 120) {
                    if (/^[A-Z][A-Z\s]{2,}$/.test(trimmed) || /^[A-Z][a-z]+(\s+[A-Z][a-z]+)*$/.test(trimmed)) {
                        result.focalArea = trimmed;
                        break;
                    }
                }
            }
            if (!result.focalArea && lines.length > 0) {
                const firstLine = lines[0].trim();
                if (firstLine.length > 10 && firstLine.length < 100) {
                    result.focalArea = firstLine;
                } else {
                    result.focalArea = result.strand || 'General Biology';
                }
            }

            return result;
        }

        function sendAIQuestionsToBank() {
            if (!generatedQuestions.length) { showToast('No questions to send. Generate some first!', 'warning'); return; }

            const existing = getQuestions();
            const newQs = generatedQuestions.filter(q => !existing.some(e => e.questionText === q.questionText));
            // Add source tag
            newQs.forEach(q => q.source = q.source || 'AI-Generated');
            const all = [...existing, ...newQs];
            localStorage.setItem('bio_questions', JSON.stringify(all));

            showToast(`✅ ${newQs.length} AI-generated questions sent to Quiz Bank!`, 'success');
            addNotification(`${newQs.length} AI-generated questions added to the quiz bank`, 'success', null, 'admin');

            generatedQuestions = [];
            renderGeneratedQuestions();
            document.getElementById('aiQCount').textContent = '0';
            document.getElementById('aiGeneratedList').innerHTML =
                '<p class="text-center py-8 text-slate-400 font-medium text-sm">Questions sent to Quiz Bank! 🎉</p>';
            initQuestionBank();
        }

        function clearAIQuestions() {
            if (!generatedQuestions.length) return;
            if (!confirm('Clear all generated questions?')) return;
            generatedQuestions = [];
            renderGeneratedQuestions();
            document.getElementById('aiQCount').textContent = '0';
            document.getElementById('aiGeneratedList').innerHTML =
                '<p class="text-center py-8 text-slate-400 font-medium text-sm">Cleared. Upload a document to start over.</p>';
            showToast('🧹 Generated questions cleared', 'info');

        function renderAllQuestionsList() {
            const sortBy = document.getElementById('qSortBy')?.value || 'dateDesc';
            const filterTopic = document.getElementById('qFilterTopic')?.value || '';
            let questions = getQuestions();
            if (filterTopic) questions = questions.filter(q => q.topic === filterTopic);
            questions.sort((a, b) => {
                switch (sortBy) {
                    case 'dateDesc':
                        return (new Date(b.createdAt || b.id)) - (new Date(a.createdAt || a.id));
                    case 'dateAsc':
                        return (new Date(a.createdAt || a.id)) - (new Date(b.createdAt || b.id));
                    case 'topic':
                        return (a.topic || '').localeCompare(b.topic || '');
                    case 'difficulty':
                        const diffOrder = { 'Easy': 0, 'Medium': 1, 'Hard': 2, 'Mixed': 3 };
                        return (diffOrder[a.difficulty] || 0) - (diffOrder[b.difficulty] || 0);
                    default:
                        return 0;
                }
            });
            const list = document.getElementById('allQuestionsList');
            if (!list) return;
            list.innerHTML = questions.length ? questions.map(q => `

        function initStudents() { selectedStudents = new Set();
            renderStudentTable(); }

        let selectedStudents = new Set();

        function renderStudentTable() {
            const search = document.getElementById('stSearch')?.value.toLowerCase() || '';
            const classFilter = document.getElementById('classFilter')?.value || '';
            let students = getStudents().filter(s => {
                const matchSearch = s.name.toLowerCase().includes(search) || s.phone.includes(search) || (s.email && s
                    .email.toLowerCase().includes(search));
                const matchClass = classFilter ? s.class === classFilter : true;
                return matchSearch && matchClass;
            });
            const tbody = document.getElementById('studentTableBody');
            if (!tbody) return;
            if (!students.length) { tbody.innerHTML =
                    `<tr><td colspan="8" class="py-6 text-center text-slate-400 font-medium">No students found</td></tr>`; return; }
            const results = getResults();
            tbody.innerHTML = students.map((s, i) => {
                const rs = results.filter(r => r.studentId === s.id);
                const avg = rs.length ? Math.round(rs.reduce((a, b) => a + b.percentage, 0) / rs.length) : 0;
                const avgDisplay = rs.length ? avg + '%' : '—';
                const isChecked = selectedStudents.has(s.id);
                return `
                    <tr class="border-b hover:bg-slate-50 transition" style="border-color:var(--border-color);">
                        <td class="py-2 px-2"><input type="checkbox" class="bulk-check student-check" data-id="${s.id}" ${isChecked ? 'checked' : ''} onchange="toggleStudentSelect('${s.id}')"/></td>
                        <td class="py-2 text-slate-500 font-medium">${i+1}</td>
                        <td class="py-2 font-semibold">${s.name}</td>
                        <td class="py-2 text-slate-500 text-xs font-medium">${s.email || '—'}</td>
                        <td class="py-2"><span class="px-2 py-0.5 rounded-full text-xs bg-slate-100 text-slate-600 font-semibold">${s.class}</span></td>
                        <td class="py-2 text-slate-500 font-medium">${s.phone}</td>
                        <td class="py-2 font-bold ${avg >= 70 ? 'text-teal-600' : avg >= 50 ? 'text-amber-600' : 'text-rose-600'}">${avgDisplay}</td>
                        <td class="py-2"><button onclick="viewStudent('${s.id}')" class="text-blue-500 hover:text-blue-700 px-1 font-semibold">👁️</button><button onclick="deleteStudent('${s.id}')" class="text-rose-500 hover:text-rose-700 px-1 font-semibold">🗑️</button></td>
                    </tr>
                `;
            }).join('');
        }

        function toggleStudentSelect(id) { if (selectedStudents.has(id)) selectedStudents.delete(id);
            else selectedStudents.add(id); }

        function toggleSelectAll() { const selectAll = document.getElementById('selectAllStudents');
            document.querySelectorAll('.student-check').forEach(c => { c.checked = selectAll.checked; const id = c.dataset
                    .id; if (selectAll.checked) selectedStudents.add(id);
                else selectedStudents.delete(id); }); }

        function bulkDeleteStudents() { const ids = Array.from(selectedStudents); if (!ids.length) { showToast(
                'No students selected', 'warning'); return; } if (!confirm(`Delete ${ids.length} selected students?`)) return;
            let students = getStudents();
            students = students.filter(s => !ids.includes(s.id));
            localStorage.setItem('bio_students', JSON.stringify(students));
            selectedStudents = new Set();
            showToast(`🗑️ ${ids.length} students deleted`, 'success');
            renderStudentTable(); }

        function showAddStudentModal() {
            openModal(`

                    <div class="grid grid-cols-2 gap-3">
                        <div><label class="block text-sm font-semibold mb-1">Surname *</label><input id="stSurname" placeholder="Surname" class="w-full px-4 py-2 border rounded-xl focus:ring-2 focus:ring-teal-500 outline-none font-medium" style="background:var(--bg-input);border-color:var(--border-color);color:var(--text-primary);" required/></div>
                        <div><label class="block text-sm font-semibold mb-1">First Name *</label><input id="stFirst" placeholder="First Name" class="w-full px-4 py-2 border rounded-xl focus:ring-2 focus:ring-teal-500 outline-none font-medium" style="background:var(--bg-input);border-color:var(--border-color);color:var(--text-primary);" required/></div>
                        <div><label class="block text-sm font-semibold mb-1">Email</label><input id="stEmail" type="email" placeholder="student@example.com" class="w-full px-4 py-2 border rounded-xl focus:ring-2 focus:ring-teal-500 outline-none font-medium" style="background:var(--bg-input);border-color:var(--border-color);color:var(--text-primary);"/></div>
                        <div><label class="block text-sm font-semibold mb-1">Phone (+233...) *</label><input id="stPhone" placeholder="+233501234567" class="w-full px-4 py-2 border rounded-xl focus:ring-2 focus:ring-teal-500 outline-none font-medium" style="background:var(--bg-input);border-color:var(--border-color);color:var(--text-primary);" required/></div>
                        <div><label class="block text-sm font-semibold mb-1">Class *</label><select id="stClass" class="w-full px-4 py-2 border rounded-xl focus:ring-2 focus:ring-teal-500 outline-none font-medium" style="background:var(--bg-input);border-color:var(--border-color);color:var(--text-primary);">${CLASSES.map(c => `<option value="${c}">${c}</option>`).join('')}</select></div>
                        <div><label class="block text-sm font-semibold mb-1">House</label><select id="stHouse" class="w-full px-4 py-2 border rounded-xl focus:ring-2 focus:ring-teal-500 outline-none font-medium" style="background:var(--bg-input);border-color:var(--border-color);color:var(--text-primary);">${[1,2,3,4,5].map(h => `<option value="House ${h}">House ${h}</option>`).join('')}</select></div>
                        <div class="col-span-2"><label class="block text-sm font-semibold mb-1">Password *</label><div class="password-wrapper"><input id="stPassword" type="password" placeholder="Set a password" class="w-full px-4 py-2 border rounded-xl focus:ring-2 focus:ring-teal-500 outline-none font-medium" style="background:var(--bg-input);border-color:var(--border-color);color:var(--text-primary);" required/><button type="button" class="password-toggle" onclick="togglePasswordVisibility('stPassword', this)">👁️</button></div></div>
                        <div class="col-span-2"><button type="submit" class="w-full btn-primary text-white py-2 rounded-xl font-semibold">💾 Save Student</button></div>
                    </div>
                </form>
                <button onclick="closeModal()" class="mt-3 w-full btn-secondary py-2 rounded-xl">Cancel</button>
            `);
        }

        function addStudent() {
            const surname = document.getElementById('stSurname').value.trim();
            const firstName = document.getElementById('stFirst').value.trim();
            const email = document.getElementById('stEmail').value.trim();
            const phone = document.getElementById('stPhone').value.trim();
            const cls = document.getElementById('stClass').value;
            const house = document.getElementById('stHouse').value;
            const password = document.getElementById('stPassword').value.trim();
            if (!surname || !firstName || !phone || !password) { showToast('Fill all required fields', 'warning'); return; }
            if (!phone.match(/^\+233[0-9]{9}$/)) { showToast('Phone must be +233XXXXXXXXX', 'error'); return; }
            if (password.length < 6) { showToast('Password must be at least 6 characters', 'error'); return; }
            const students = getStudents();
            if (students.find(s => s.phone === phone)) { showToast('Phone number already exists', 'error'); return; }
            if (email && students.find(s => s.email === email)) { showToast('Email already exists', 'error'); return; }
            const student = { id: 'st_' + Date.now(), surname, firstName, name: surname + ' ' + firstName, email, phone,
                class: cls, house: house || 'House 1', password, createdAt: new Date().toISOString() };
            students.push(student);
            localStorage.setItem('bio_students', JSON.stringify(students));
            closeModal();
            showToast(`✅ ${student.name} added! Password: ${password}`, 'success');
            renderStudentTable();
            addNotification(`${student.name} was added as a student`, 'success');
        }

        function deleteStudent(id) { if (!confirm('Delete this student?')) return; let students = getStudents();
            students = students.filter(s => s.id !== id);
            localStorage.setItem('bio_students', JSON.stringify(students));
            showToast('🗑️ Student deleted', 'info');
            renderStudentTable(); }

        function showBulkImportModal() {
            openModal(`
                <h3 class="text-xl font-bold mb-4">📤 Bulk Import Students (Excel .xls/.xlsx)</h3>
                <p class="text-sm text-slate-500 font-medium mb-3">Upload an Excel file with columns: Surname, FirstName, Email, Phone, Class, House, Password</p>
                <div class="file-drop-zone p-8 text-center" id="bulkDropZone">
                    <div class="text-4xl mb-2">📊</div>
                    <p class="text-slate-500 font-medium">Drop your Excel file here or click to browse</p>
                    <input type="file" id="bulkFileInput" accept=".xls,.xlsx" class="hidden" onchange="handleBulkFileSelect(event)"/>
                    <button onclick="document.getElementById('bulkFileInput').click()" class="mt-3 btn-primary text-white px-6 py-2 rounded-xl text-sm font-semibold">Choose Excel File</button>
                    <div id="bulkFileName" class="mt-2 text-sm text-emerald-600 font-semibold"></div>
                    <div id="bulkPreview" class="mt-4 max-h-60 overflow-y-auto text-left text-xs"></div>
                </div>
                <div class="flex gap-2 mt-3">
                    <button onclick="processBulkImport()" class="btn-primary text-white px-6 py-2 rounded-xl font-semibold">📥 Import Students</button>
                    <button onclick="closeModal()" class="btn-secondary py-2 px-6 rounded-xl">Cancel</button>
                </div>
                <div id="bulkStatus" class="mt-3 text-sm"></div>
            `);
            const dropZone = document.getElementById('bulkDropZone');
            if (dropZone) {
                dropZone.addEventListener('dragover', (e) => { e.preventDefault();
                    dropZone.classList.add('dragover'); });
                dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
                dropZone.addEventListener('drop', (e) => {
                    e.preventDefault();
                    dropZone.classList.remove('dragover');
                    if (e.dataTransfer.files.length) {
                        const file = e.dataTransfer.files[0];
                        if (file.name.match(/\.(xls|xlsx)$/)) {
                            document.getElementById('bulkFileInput').files = e.dataTransfer.files;
                            handleBulkFileSelect({ target: { files: e.dataTransfer.files } });
                        } else { showToast('Please select an Excel file', 'error'); }
                    }
                });
            }
        }

        let bulkFileData = null;

        function handleBulkFileSelect(e) {
            const file = e.target.files[0];
            if (!file) return;
            if (!file.name.match(/\.(xls|xlsx)$/)) { showToast('Please select an Excel file (.xls or .xlsx)', 'error'); return; }
            document.getElementById('bulkFileName').textContent = `✅ ${file.name} (${(file.size/1024).toFixed(2)} KB)`;
            const reader = new FileReader();
            reader.onload = function(ev) {
                try {
                    const data = new Uint8Array(ev.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                    const jsonData = XLSX.utils.sheet_to_json(firstSheet);
                    bulkFileData = jsonData;
                    const preview = document.getElementById('bulkPreview');
                    if (jsonData.length) {
                        const headers = Object.keys(jsonData[0]);
                        preview.innerHTML =
                            `<p class="font-semibold mb-1">📊 ${jsonData.length} rows found. Headers: ${headers.join(', ')}</p>
                            <div class="bg-slate-100 p-2 rounded overflow-x-auto font-medium">${jsonData.slice(0,5).map(r => JSON.stringify(r)).join('<br>')}${jsonData.length > 5 ? '<br>...' : ''}</div>`;
                    } else {
                        preview.innerHTML = '<p class="text-amber-500 font-medium">⚠️ No data rows found in the Excel file.</p>';
                    }
                } catch (err) {
                    showToast('Error reading Excel file: ' + err.message, 'error');
                }
            };
            reader.readAsArrayBuffer(file);
        }

        function processBulkImport() {
            if (!bulkFileData || !bulkFileData.length) { showToast('No data to import. Please upload a valid Excel file.',
                    'warning'); return; }
            const students = getStudents();
            let imported = 0,
                skipped = 0;
            const errors = [];
            bulkFileData.forEach((row, idx) => {
                const surname = (row.Surname || row.surname || row['Surname'] || '').toString().trim();
                const firstName = (row.FirstName || row.firstName || row['First Name'] || row['FirstName'] || '')
                    .toString().trim();
                const email = (row.Email || row.email || '').toString().trim();
                const phone = (row.Phone || row.phone || '').toString().trim();
                const cls = (row.Class || row.class || '').toString().trim();
                const house = (row.House || row.house || '').toString().trim() || 'House 1';
                const password = (row.Password || row.password || '').toString().trim() || 'BIO' + String(1001 + students
                    .length + imported).padStart(4, '0');

                if (!surname || !firstName || !phone || !cls) {
                    errors.push(`Row ${idx+2}: Missing required fields (Surname, FirstName, Phone, Class)`);
                    skipped++;
                    return;
                }
                if (!phone.match(/^\+233[0-9]{9}$/)) {
                    errors.push(`Row ${idx+2}: Invalid phone format (use +233XXXXXXXXX)`);
                    skipped++;
                    return;
                }
                if (students.find(s => s.phone === phone) || bulkFileData.some((r, i) => i !== idx && r.phone === phone)) {
                    errors.push(`Row ${idx+2}: Duplicate phone ${phone}`);
                    skipped++;
                    return;
                }
                if (email && students.find(s => s.email === email)) {
                    errors.push(`Row ${idx+2}: Duplicate email ${email}`);
                    skipped++;
                    return;
                }
                const student = {
                    id: 'st_' + Date.now() + '_' + idx,
                    surname,
                    firstName,
                    name: surname + ' ' + firstName,
                    email: email || '',
                    phone,
                    class: cls,
                    house,
                    password,
                    createdAt: new Date().toISOString()
                };
                students.push(student);
                imported++;
            });
            localStorage.setItem('bio_students', JSON.stringify(students));
            const status = document.getElementById('bulkStatus');
            status.innerHTML =
                `<p style="color:#22c55e;font-weight:600;">✅ Imported ${imported} students. Skipped ${skipped} due to errors.</p>
                ${errors.length ? `<div class="mt-2 text-red-500 text-xs max-h-32 overflow-y-auto font-medium">${errors.map(e => '• ' + e).join('<br>')}</div>` : ''}`;
            showToast(`✅ ${imported} students imported!`, 'success');
            bulkFileData = null;
            document.getElementById('bulkFileName').textContent = '';
            document.getElementById('bulkPreview').innerHTML = '';
            renderStudentTable();
            setTimeout(closeModal, 3000);
        }

        function generateExcelTemplate() {
            openModal(`
                <h3 class="text-xl font-bold mb-4">📊 Generate Excel Template</h3>
                <p class="text-sm text-slate-500 font-medium mb-3">Select the fields you want to include in the template:</p>
                <div class="field-checkbox-grid mb-4">
                    ${STUDENT_FIELDS.map(f => `
                        <label>
                            <input type="checkbox" class="template-field-check" data-key="${f.key}" ${f.required ? 'checked disabled' : 'checked'}>
                            ${f.label} ${f.required ? '<span class="text-red-500">*</span>' : ''}
                        </label>
                    `).join('')}
                </div>
                <div class="flex gap-2">
                    <button onclick="downloadExcelTemplate()" class="btn-primary text-white px-6 py-2 rounded-xl font-semibold">📥 Download Template</button>
                    <button onclick="closeModal()" class="btn-secondary py-2 px-6 rounded-xl">Cancel</button>
                </div>
                <p class="text-xs text-slate-400 font-medium mt-3">💡 The template will include the selected columns. Required fields are pre-selected.</p>
            `);
        }

        function downloadExcelTemplate() {
            const checkboxes = document.querySelectorAll('.template-field-check:checked');
            const selectedKeys = Array.from(checkboxes).map(cb => cb.dataset.key);
            const headers = STUDENT_FIELDS.filter(f => selectedKeys.includes(f.key)).map(f => f.label);
            if (!headers.length) { showToast('Please select at least one field', 'warning'); return; }
            const sampleRow = {};
            STUDENT_FIELDS.filter(f => selectedKeys.includes(f.key)).forEach(f => {
                if (f.key === 'surname') sampleRow[f.label] = 'Doe';
                else if (f.key === 'firstName') sampleRow[f.label] = 'John';
                else if (f.key === 'email') sampleRow[f.label] = 'john.doe@example.com';
                else if (f.key === 'phone') sampleRow[f.label] = '+233501234567';
                else if (f.key === 'class') sampleRow[f.label] = 'Science A';
                else if (f.key === 'house') sampleRow[f.label] = 'House 1';
                else if (f.key === 'password') sampleRow[f.label] = 'password123';
                else sampleRow[f.label] = '';
            });
            const wsData = [headers];
            wsData.push(Object.values(sampleRow));
            const ws = XLSX.utils.aoa_to_sheet(wsData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'Students');
            const wbout = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
            const blob = new Blob([wbout], { type: 'application/octet-stream' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'student_template.xlsx';
            a.click();
            URL.revokeObjectURL(url);
            showToast('📥 Template downloaded!', 'success');
            closeModal();
        }

                                            <td class="py-2 text-center"><span class="px-2 py-0.5 rounded-full text-xs font-bold ${grade.grade === 'A' ? 'bg-green-100 text-green-700' : grade.grade === 'B' ? 'bg-blue-100 text-blue-700' : grade.grade === 'C' ? 'bg-amber-100 text-amber-700' : 'bg-red-100 text-red-700'}">${grade.grade}</span></td>

        function initGradeBook() {}

        function calculateFinalGrade(studentId) {
            const results = getResults().filter(r => r.studentId === studentId);
            const cats = GRADE_CATEGORIES;
            const grade = {};
            let totalWeighted = 0,
                totalWeight = 0;
            cats.forEach(c => {
                const rs = results.filter(r => r.category === c.name);
                if (rs.length) {
                    const avg = Math.round(rs.reduce((a, b) => a + b.percentage, 0) / rs.length);
                    grade[c.id] = avg + '%';
                    totalWeighted += avg * c.weight;
                    totalWeight += c.weight;
                } else {
                    grade[c.id] = '—';
                }
            });
            const weighted = totalWeight ? Math.round(totalWeighted / totalWeight) : 0;
            const g = getGrade(weighted);
            return { ...grade, weighted, grade: g.grade || '—' };
        }

        function importData(file) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                try {
                    const data = JSON.parse(ev.target.result);
                    if (data.type === 'student_results') {
                        const results = getResults();
                        const filtered = results.filter(r => r.studentId !== data.studentId);
                        const merged = [...filtered, ...data.results];
                        localStorage.setItem('bio_results', JSON.stringify(merged));
                        showToast(`✅ Imported ${data.results.length} results for ${data.studentName}`, 'success');
                        if (currentUser && currentUser.role === 'admin') navigateTo('gradebook');
                        else navigateTo('dashboard');
                    } else if (data.type === 'student_quiz_pack') {
                        const existingQuizzes = getQuizzes();
                        const existingQuestions = getQuestions();
                        const newQuizzes = data.quizzes.filter(q => !existingQuizzes.some(e => e.id === q.id));
                        const newQuestions = data.questions.filter(q => !existingQuestions.some(e => e.id === q.id));
                        localStorage.setItem('bio_quizzes', JSON.stringify([...existingQuizzes, ...newQuizzes]));
                        localStorage.setItem('bio_questions', JSON.stringify([...existingQuestions, ...newQuestions]));
                        showToast(`✅ Imported ${newQuizzes.length} quizzes and ${newQuestions.length} questions`,
                            'success');
                        navigateTo('quizlink');
                    } else {
                        if (data.questions) localStorage.setItem('bio_questions', JSON.stringify(data.questions));
                        if (data.students) localStorage.setItem('bio_students', JSON.stringify(data.students));
                        if (data.quizzes) localStorage.setItem('bio_quizzes', JSON.stringify(data.quizzes));
                        if (data.results) localStorage.setItem('bio_results', JSON.stringify(data.results));
                        if (data.users) localStorage.setItem('bio_users', JSON.stringify(data.users));

                        if (data.lessons) localStorage.setItem('bio_lessons', JSON.stringify(data.lessons));

        let selectedPDFFile = null;

        function handlePDFFileSelect(e) {
            const file = e.target.files[0];

            if (file.type !== 'application/pdf') { showToast('Please select a PDF file', 'error'); return; }

        function handlePDFUpload() {
            const title = document.getElementById('pdfTitle').value.trim();
            const topic = document.getElementById('pdfTopic').value;
            const year = document.getElementById('pdfYear').value.trim();
            const description = document.getElementById('pdfDescription').value.trim();
            if (!title) { showToast('Please enter a title', 'warning'); return; }
            if (!selectedPDFFile) { showToast('Please select a PDF file', 'warning'); return; }
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const pdfData = { id: 'pdf_' + Date.now(), title, topic: topic || 'General', year, description,
                        data: e.target.result, fileName: selectedPDFFile.name, size: selectedPDFFile.size / 1024,
